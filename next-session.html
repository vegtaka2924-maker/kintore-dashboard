<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="manifest" href="card.webmanifest">
<meta name="theme-color" content="#F3EDE2">
<link rel="apple-touch-icon" href="icon-card-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="筋トレ">
<title>筋トレ｜セッションカード</title>

<!-- このページは生成り版カードの入口です。
     表示本体は skin-paper.html、メニューと記録の正本は src/data.js に分離しています。 -->

<style>
  html, body { margin: 0; height: 100%; background: #F3EDE2; overflow: hidden; }
  .frame {
    position: fixed; inset: 0; width: 100%; height: 100%; border: 0;
    background: transparent;
  }
</style>
</head>
<body>
  <iframe id="f-paper" class="frame" title="筋トレ セッションカード"></iframe>

<script>
(function () {
  function start() {
    var frame = document.getElementById('f-paper');
    if (!frame.src) frame.src = 'skin-paper.html';
  }

  /* 最新化：このセッションで初回だけ、GitHub Pages(CDN)の古いキャッシュを避けて
     土台が読み込む2点（画面・data.js）を取り直しておく。以降はブラウザキャッシュでOK。 */
  if (sessionStorage.getItem('ks_shell_v2')) {
    start();
  } else {
    Promise.all([
      fetch('skin-paper.html',        { cache: 'reload' }),
      fetch('src/data.js',            { cache: 'reload' })
    ]).then(function () {
      sessionStorage.setItem('ks_shell_v2', '1');
      start();
    }).catch(function () { start(); });          // 通信に失敗（オフライン等）でも普通に表示する
  }
})();
</script>
</body>
</html>
