<script src="src/data.js"></script>
<script>
  var D = window.KINTORE_DATA;

  /* =========================================================================
     0. 小さな道具たち
     ========================================================================= */
  function fmtDate(d) { var p = d.split('-'); return (+p[1]) + '/' + (+p[2]); }
  function pad2(x) { return x < 10 ? '0' + x : '' + x; }
  function todayStr() {
    var n = new Date();
    return n.getFullYear() + '-' + pad2(n.getMonth() + 1) + '-' + pad2(n.getDate());
  }
  var DOW = ['日', '月', '火', '水', '木', '金', '土'];
  function clampNum(v, min, max) { return Math.max(min, Math.min(max, v)); }

  /* SVGの進捗リング。pct=0〜1。sizeは直径px。 */
  function ringSVG(pct, size, stroke, centerHtml) {
    var r = (size - stroke) / 2, c = 2 * Math.PI * r;
    var off = c * (1 - clampNum(pct, 0, 1));
    return '<div class="ring" style="width:' + size + 'px;height:' + size + 'px">'
      + '<svg width="' + size + '" height="' + size + '">'
      + '<circle class="tr" cx="' + size / 2 + '" cy="' + size / 2 + '" r="' + r + '" fill="none" stroke-width="' + stroke + '"/>'
      + '<circle class="pr" cx="' + size / 2 + '" cy="' + size / 2 + '" r="' + r + '" fill="none" stroke-width="' + stroke
      + '" stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '"/>'
      + '</svg><div class="c">' + centerHtml + '</div></div>';
  }

  /* =========================================================================
     1. コーチ（kaikaiくん）吹き出し ※データ形式は従来と互換
     ========================================================================= */
  var COACH_AVATAR = '<img src="coach-kaikai.png" width="46" height="46" alt="" aria-hidden="true">';
  function coachBlock(text, exerciseReviews) {
    var items = Array.isArray(text) ? text : [text];
    var body = items.map(function (it) {
      if (it && typeof it === 'object') return '<p class="coach-h">' + it.h + '</p><p>' + it.p + '</p>';
      return '<p>' + it + '</p>';
    }).join('');
    if (Array.isArray(exerciseReviews) && exerciseReviews.length) {
      body += '<div class="coach-exercise-list"><p class="coach-h">実施メニューごと</p>'
        + exerciseReviews.map(function (r) {
          return '<div class="coach-exercise"><div class="coach-exercise-name">' + r.name + '</div><p>' + r.p + '</p></div>';
        }).join('') + '</div>';
    }
    return '<div class="card coach"><div class="coach-av">' + COACH_AVATAR + '</div>'
      + '<div class="coach-bubble"><div class="coach-name">kaikaiくん</div>' + body + '</div></div>';
  }

  /* =========================================================================
     2. 実行モード（セット完了チェック＋実績の記録）
        ・保存先は localStorage（この端末の今日ぶんだけ）。日付が変わると自動リセット。
        ・実績は「回数」を入れるのが主目的（重量はメニュー通りのことが多い）。
     ========================================================================= */
  var RUN_KEY = 'ksRun:' + todayStr() + ':' + D.currentKey;
  var RUN = { done: {}, skip: {}, act: {}, extra: [], total: 0, planned: 0, memo: '' };
  /* セットの静的情報（コピー文・完遂判定に使う）。core=true のメインセットだけで完遂を判定する。 */
  var SETINFO = {};
  var EXINFO = {};

  function runLoad() {
    try {
      var del = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf('ksRun:') === 0 && k !== RUN_KEY) del.push(k);
      }
      del.forEach(function (k) { localStorage.removeItem(k); });
      var raw = localStorage.getItem(RUN_KEY);
      if (raw) {
        var o = JSON.parse(raw);
        (o.d || []).forEach(function (id) { RUN.done[id] = true; });
        (o.s || []).forEach(function (id) { RUN.skip[id] = true; });
        RUN.act = o.a || {};
        RUN.extra = o.x || [];
        RUN.memo = o.m || '';
      }
    } catch (e) {}
  }
  function runSave() {
    try { localStorage.setItem(RUN_KEY, JSON.stringify({ d: Object.keys(RUN.done), s: Object.keys(RUN.skip), a: RUN.act, x: RUN.extra, m: RUN.memo || '' })); } catch (e) {}
  }
  /* メニュー変更メモの保存（入力のたびに呼ばれる） */
  function memoSave(v) { RUN.memo = v; runSave(); }
  function runCount() { return Object.keys(RUN.done).length; }
  function skipCount() { return Object.keys(RUN.skip).length; }
  function coreIds() {
    return Object.keys(SETINFO).filter(function (id) { return SETINFO[id].core; });
  }
  function coreDoneCount() {
    return coreIds().filter(function (id) { return RUN.done[id]; }).length;
  }
  function coreSkipCount() {
    return coreIds().filter(function (id) { return RUN.skip[id]; }).length;
  }
  function optionalDoneCount() {
    return Object.keys(SETINFO).filter(function (id) { return SETINFO[id].optional && RUN.done[id]; }).length;
  }

  function updateRunUI() {
    var box = document.getElementById('runBox');
    if (!box) return;
    var done = runCount(), cDone = coreDoneCount(), cSkipped = coreSkipCount();
    var decided = cDone + cSkipped, total = RUN.total || 1, oDone = optionalDoneCount();
    document.getElementById('runCount').innerHTML = 'メイン ' + cDone + '実施' + (cSkipped ? '・' + cSkipped + 'スキップ' : '')
      + ' <small>/ ' + total + '</small>' + (oDone ? ' <small>＋余力' + oDone + '</small>' : '');
    document.getElementById('runFill').style.width = Math.round(decided / total * 100) + '%';
    box.classList.toggle('complete', decided >= total && total > 0);
    document.getElementById('copyBtn').disabled = done === 0;
  }

  /* セット行タップ：チェックを切り替え。付けた時は実績行を出し、レストタイマーを自動起動 */
  function toggleSet(btn) {
    var id = btn.getAttribute('data-sid');
    var on = !RUN.done[id];
    if (on) { RUN.done[id] = true; delete RUN.skip[id]; }
    else delete RUN.done[id];
    btn.classList.toggle('done', on);
    btn.classList.remove('skipped');
    var skipBtn = document.querySelector('.set-skip[data-sid="' + id + '"]');
    if (skipBtn) skipBtn.classList.remove('active');
    var act = document.getElementById('act-' + id);
    if (act) { act.hidden = !on; if (on) renderAct(id); }
    runSave(); updateRunUI();
    if (on) {
      var sec = +btn.getAttribute('data-rest') || 0;
      var decided = coreDoneCount() + coreSkipCount();
      if (sec > 0 && decided < RUN.total) startRest(sec, nextSetLabel(btn));
      else if (decided >= RUN.total) { stopRest(); vibrate([120, 80, 120, 80, 240]); }
    }
  }

  /* 明示スキップ。未チェックとの違いを報告文に残す。 */
  function skipSet(btn) {
    var id = btn.getAttribute('data-sid');
    var on = !RUN.skip[id];
    if (on) { RUN.skip[id] = true; delete RUN.done[id]; delete RUN.act[id]; }
    else delete RUN.skip[id];
    var setBtn = document.querySelector('.set[data-sid="' + id + '"]');
    if (setBtn) {
      setBtn.classList.toggle('skipped', on);
      setBtn.classList.remove('done');
    }
    btn.classList.toggle('active', on);
    var act = document.getElementById('act-' + id); if (act) act.hidden = true;
    runSave(); updateRunUI();
  }

  function nextSetLabel(btn) {
    var all = document.querySelectorAll('#next-sheet .set');
    var found = false;
    for (var i = 0; i < all.length; i++) {
      if (all[i] === btn) { found = true; continue; }
      if (found && !all[i].classList.contains('done') && !all[i].classList.contains('skipped')) {
        var ex = all[i].getAttribute('data-ex') || '';
        var lb = all[i].querySelector('.s-label');
        return '次は ' + ex + (lb ? ' ' + lb.textContent : '');
      }
    }
    return '次の種目へ';
  }

  /* --- 実績ステッパー ------------------------------------------------------
     重量：メニューの値が初期値（±2.5kg）。数値で読めない種目（自重・片側マシン等）は固定表示。
     回数：初期は「未記録」。＋を1回押すとメニュー上限から始まる（誤った数字を勝手に残さないため）。 */
  function actOf(id) { return RUN.act[id] || (RUN.act[id] = {}); }

  function actAdj(id, kind, dir) {
    var info = SETINFO[id] || {}, a = actOf(id);
    if (kind === 'w') {
      var base = (a.w != null) ? a.w : (info.weightKg != null ? info.weightKg : 0);
      a.w = Math.max(0, +(base + dir * 2.5).toFixed(2));
    } else {
      if (a.r == null) a.r = Math.max(1, (info.upper || 8) + (dir < 0 ? -1 : 0));
      else a.r = Math.max(1, a.r + dir);
    }
    runSave(); renderAct(id);
  }

  function renderAct(id) {
    var el = document.getElementById('act-' + id);
    if (!el) return;
    var info = SETINFO[id] || {}, a = RUN.act[id] || {};
    var h = '<span class="k">実績</span>';
    if (info.weightKg != null) {
      var w = (a.w != null) ? a.w : info.weightKg;
      h += '<span class="stp"><button onclick="actAdj(\'' + id + '\',\'w\',-1)" aria-label="重量を減らす">−</button>'
        + '<b class="val" tabindex="0" role="button" onclick="actEdit(this,\'' + id + '\',\'w\')" aria-label="重量をタップして入力">' + (+w) + 'kg</b>'
        + '<button onclick="actAdj(\'' + id + '\',\'w\',1)" aria-label="重量を増やす">＋</button></span>';
    } else if (info.weightText) {
      h += '<b style="font-size:13px">' + info.weightText + '</b>';
    }
    h += '<span class="x2">×</span>';
    h += '<span class="stp"><button onclick="actAdj(\'' + id + '\',\'r\',-1)" aria-label="回数を減らす">−</button>'
      + (a.r != null
          ? '<b class="val" tabindex="0" role="button" onclick="actEdit(this,\'' + id + '\',\'r\')" aria-label="回数をタップして入力">' + a.r + '回</b>'
          : '<b class="val empty" tabindex="0" role="button" onclick="actEdit(this,\'' + id + '\',\'r\')" aria-label="回数をタップして入力">回数？</b>')
      + '<button onclick="actAdj(\'' + id + '\',\'r\',1)" aria-label="回数を増やす">＋</button></span>';
    el.innerHTML = h;
  }

  /* 数値（重量・回数）をタップ → その場で入力欄に切り替えて手入力する（＋/−ボタンはそのまま残る）。
     Enter か フォーカスを外すと確定。回数を空欄で確定すると「未記録」に戻す。Escで取り消し。 */
  function actEdit(el, id, kind) {
    var info = SETINFO[id] || {}, a = actOf(id);
    var cur = (kind === 'w') ? (a.w != null ? a.w : (info.weightKg != null ? info.weightKg : ''))
                             : (a.r != null ? a.r : '');
    var inp = document.createElement('input');
    inp.type = 'number'; inp.inputMode = 'decimal'; inp.className = 'val-input';
    inp.value = (cur === '' ? '' : cur);
    inp.step = (kind === 'w' ? '0.5' : '1');
    inp.min = '0';
    inp.setAttribute('aria-label', kind === 'w' ? '重量(kg)を入力' : '回数を入力');
    el.replaceWith(inp);
    inp.focus();
    try { inp.select(); } catch (e) {}
    var done = false;
    function commit() {
      if (done) return; done = true;
      var raw = String(inp.value).trim();
      if (raw === '') {
        if (kind === 'r') delete a.r;              // 回数は空欄なら未記録に戻す（重量は変更しない）
      } else {
        var v = parseFloat(raw);
        if (!isNaN(v)) {
          if (kind === 'w') a.w = Math.max(0, +v.toFixed(2));
          else a.r = Math.max(1, Math.round(v));
        }
      }
      runSave(); renderAct(id);
    }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
      else if (e.key === 'Escape') { done = true; renderAct(id); }
    });
  }

  /* --- 今日の結果をコピー（あとでClaudeに貼ってトレ報告する用のテキスト） --- */
  function buildReport() {
    var cur = D.sessions[D.currentKey];
    var d = new Date();
    var lines = ['【トレ報告】' + todayStr() + '（' + DOW[d.getDay()] + '） ' + cur.name + '・' + cur.titleJp];
    var order = [];  /* 種目名の登場順を保つ */
    var byEx = {};
    Object.keys(SETINFO).forEach(function (id) {
      var info = SETINFO[id];
      if (!byEx[info.ex]) { byEx[info.ex] = []; order.push(info.ex); }
      byEx[info.ex].push(id);
    });
    order.forEach(function (ex) {
      var ids = byEx[ex];
      var done = ids.filter(function (id) { return RUN.done[id]; });
      var parts = done.map(function (id) {
        var info = SETINFO[id], a = RUN.act[id] || {};
        var w = (a.w != null) ? (+a.w + 'kg') : (info.weightKg != null ? info.weightKg + 'kg' : (info.weightText || ''));
        var r = (a.r != null) ? a.r : '?';
        return info.label + ' ' + (w ? w + '×' : '×') + r + (info.amrap ? '（AMRAP）' : '') + (info.extra ? '（追加）' : '');
      });
      var skipped = ids.filter(function (id) { return RUN.skip[id]; })
        .map(function (id) { return SETINFO[id].label + ' スキップ'; });
      var pending = ids.filter(function (id) { return !RUN.done[id] && !RUN.skip[id]; })
        .map(function (id) { return SETINFO[id].label; });
      var notes = skipped.concat(pending.length ? [pending.join('・') + ' 未入力'] : []);
      if (parts.length) lines.push('・' + ex + '：' + parts.join('｜') + (notes.length ? '（' + notes.join('／') + '）' : ''));
      else lines.push('・' + ex + '：' + (notes.length ? notes.join('／') : '未入力'));
    });
    if (RUN.memo && RUN.memo.trim()) lines.push('・メモ：' + RUN.memo.trim());
    lines.push('※「×?」は回数メモなし。「スキップ」は意図的な未実施、「未入力」は未判定。セッションカードから自動生成。');
    return lines.join('\n');
  }

  function copyReport() {
    var text = buildReport();
    var note = document.getElementById('copyNote');
    function ok() { note.textContent = 'コピーしました。あとでClaudeに貼り付ければ、そのままトレ報告になります。'; }
    function ng() { note.textContent = 'コピーできませんでした。もう一度お試しください。'; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(ok, function () { fallbackCopy(text) ? ok() : ng(); });
    } else {
      fallbackCopy(text) ? ok() : ng();
    }
  }
  function fallbackCopy(text) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) { return false; }
  }

  /* =========================================================================
     3. レストタイマー
     ========================================================================= */
  var REST = { until: 0, total: 0, iv: 0, over: false };

  function vibrate(pat) { try { if (navigator.vibrate) navigator.vibrate(pat); } catch (e) {} }

  function beep() {
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      if (!beep.ctx) beep.ctx = new AC();
      var ctx = beep.ctx;
      if (ctx.state === 'suspended') ctx.resume();
      var t = ctx.currentTime;
      [0, .22, .44].forEach(function (off, i) {
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = i === 2 ? 1175 : 880;
        g.gain.setValueAtTime(.0001, t + off);
        g.gain.exponentialRampToValueAtTime(.28, t + off + .02);
        g.gain.exponentialRampToValueAtTime(.0001, t + off + .18);
        o.connect(g); g.connect(ctx.destination);
        o.start(t + off); o.stop(t + off + .2);
      });
    } catch (e) {}
  }

  function fmtSec(s) { s = Math.max(0, Math.round(s)); return Math.floor(s / 60) + ':' + pad2(s % 60); }

  function startRest(sec, label) {
    REST.until = Date.now() + sec * 1000;
    REST.total = sec; REST.over = false;
    document.getElementById('rest').hidden = false;
    document.getElementById('rest').classList.remove('over');
    document.getElementById('restLbl').textContent = '休憩 ' + fmtSec(sec) + ' ・ ' + (label || '');
    try { var AC = window.AudioContext || window.webkitAudioContext; if (AC && !beep.ctx) beep.ctx = new AC(); } catch (e) {}
    if (REST.iv) clearInterval(REST.iv);
    REST.iv = setInterval(restTick, 250);
    restTick();
  }

  function restTick() {
    if (!REST.until) return;
    var left = (REST.until - Date.now()) / 1000;
    if (left <= 0 && !REST.over) {
      REST.over = true;
      document.getElementById('rest').classList.add('over');
      document.getElementById('restT').textContent = '0:00';
      document.getElementById('restLbl').textContent = '休憩おわり。次のセットへ。';
      document.getElementById('restFill').style.width = '100%';
      vibrate([220, 110, 220]); beep();
      setTimeout(function () { if (REST.over) stopRest(); }, 4000);
      return;
    }
    if (left <= 0) return;
    document.getElementById('restT').textContent = fmtSec(left);
    document.getElementById('restFill').style.width = ((1 - left / REST.total) * 100).toFixed(1) + '%';
  }

  function stopRest() {
    REST.until = 0; REST.over = false;
    if (REST.iv) { clearInterval(REST.iv); REST.iv = 0; }
    document.getElementById('rest').hidden = true;
    document.getElementById('restFill').style.width = '0%';
  }

  document.getElementById('restAdd').onclick = function () {
    if (!REST.until) return;
    if (REST.over) { REST.over = false; document.getElementById('rest').classList.remove('over'); REST.until = Date.now(); }
    REST.until += 30000; REST.total += 30;
    if (!REST.iv) REST.iv = setInterval(restTick, 250);
    restTick();
  };
  document.getElementById('restStop').onclick = stopRest;
  document.addEventListener('visibilitychange', function () { if (!document.hidden && REST.until) restTick(); });

  /* =========================================================================
     4. プレート計算（バーベル種目の重量タップで内訳を表示）
     ========================================================================= */
  var PLATES = [25, 20, 15, 10, 5, 2.5, 1.25];

  /* "75kg" "77.5kg" → 数値。"追加35kg/side" "自重" "60〜70kg" 等は対象外(null) */
  function parseWeightKg(str) {
    if (!str || /side|自重|アシスト|追加|〜|~|軽め/.test(str)) return null;
    var m = String(str).match(/^(\d+(?:\.\d+)?)\s*kg$/);
    return m ? +m[1] : null;
  }
  /* バーベルで扱う種目か（バー重量も返す）。マシン・自重は対象外。 */
  function barbellOf(name) {
    var n = String(name);
    if (/EZバー/.test(n)) return 10;                       // EZバーはうちのジム基準で10kg
    if (/ハック|マシン|ケーブル|レッグ|カーフ|ペック|プレスダウン|ラット|シーテッド|アイソラテラル/.test(n)) return null;
    if (/バーベル|ベンチプレス|スクワット|RDL|デッドリフト/.test(n)) return 20;   // オリンピックバー20kg
    return null;
  }

  function openPlates(total, bar) {
    var side = (total - bar) / 2;
    var rows = '', visual = '<div class="barend"></div><div class="collar"></div>';
    if (side < -1e-9) {
      rows = '<div class="prow"><span>バー（' + bar + 'kg）より軽い重量です</span></div>';
    } else {
      var rest = side, used = [];
      PLATES.forEach(function (p) {
        while (rest >= p - 1e-9) { used.push(p); rest -= p; }
      });
      used.forEach(function (p) {
        var h = 22 + Math.sqrt(p / 25) * 40;
        visual += '<div class="pl" style="height:' + h.toFixed(0) + 'px">' + (p >= 10 ? p : String(p).replace('0.', '.')) + '</div>';
      });
      rows += '<div class="prow"><span>バー</span><b>' + bar + 'kg</b></div>';
      rows += '<div class="prow"><span>片側に付けるプレート</span><b>' + (used.length ? used.join(' + ') : 'なし') + '</b></div>';
      rows += '<div class="prow"><span>片側合計</span><b>' + (+(side - rest).toFixed(2)) + 'kg</b></div>';
      if (rest > 1e-9) rows += '<div class="prow"><span class="warn">あと片側 ' + (+rest.toFixed(2)) + 'kg は標準プレートで作れない端数です</span></div>';
    }
    document.getElementById('pwTotal').innerHTML = (+total) + '<small>kg</small>';
    document.getElementById('platesV').innerHTML = visual;
    document.getElementById('plateRows').innerHTML = rows;
    document.getElementById('veil').hidden = false;
  }
  document.getElementById('veil').addEventListener('click', function (e) {
    if (!document.getElementById('psheet').contains(e.target)) this.hidden = true;
  });

  /* =========================================================================
     5. セット行・種目カードの描画
     ========================================================================= */
  /* "rest 2–3 min" → 120秒、"rest 90 sec" → 90秒。読めなければ0（タイマーなし） */
  function parseRestSec(str) {
    if (!str) return 0;
    var s = String(str);
    var m = s.match(/(\d+(?:\.\d+)?)\s*(?:–|〜|-)?\s*(?:\d+(?:\.\d+)?)?\s*min/);
    if (m) return Math.round(+m[1] * 60);
    m = s.match(/(\d+)\s*sec/);
    if (m) return +m[1];
    return 0;
  }
  function shortRest(str) {
    if (!str) return '';
    return String(str).replace(/rest\s*/i, '').replace(/\s*min/, '分').replace(/\s*sec/, '秒');
  }
  /* "6〜8回" → 8（レンジ上限）。"AMRAP ★" 等はnull */
  function parseUpperReps(str) {
    var m = String(str || '').match(/(\d+)\s*(?:〜|–|-)\s*(\d+)\s*回/);
    if (m) return +m[2];
    m = String(str || '').match(/(\d+)\s*回/);
    return m ? +m[1] : null;
  }

  var SID = 0; /* セットにふる通し番号（チェック保存のID） */
  function setRow(s, exName, checkable, fixedId, isExtra, optionalGroup) {
    var restSec = parseRestSec(s.rest);
    var exPlain = exName.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
    var wkg = parseWeightKg(s.weight), bar = wkg != null ? barbellOf(exName) : null;
    var wHtml = '';
    if (s.weight) {
      if (bar != null && wkg != null) {
        wHtml = '<span class="s-w plate" onclick="event.stopPropagation();openPlates(' + wkg + ',' + bar + ')">' + s.weight + '</span><span class="x">×</span>';
      } else {
        wHtml = '<span class="s-w">' + s.weight + '</span><span class="x">×</span>';
      }
    }
    if (!checkable) {
      return '<div class="set" style="cursor:default">'
        + '<span class="s-check">✓</span>'
        + '<span class="s-label' + (s.warm ? ' warm' : '') + '">' + s.label + '</span>'
        + '<span class="s-main">' + wHtml
        + '<span class="' + (s.accent ? 'accent' : 'reps') + '">' + s.reps + '</span></span>'
        + '<span class="s-rest">' + shortRest(s.rest) + '</span></div>';
    }
    var id = fixedId || ('s' + (SID++));
    var isOptional = !!s.optional || !!optionalGroup || !!isExtra;
    SETINFO[id] = {
      ex: exPlain, label: s.label,
      weightText: s.weight || '', weightKg: wkg,
      upper: parseUpperReps(s.reps), amrap: /AMRAP/i.test(String(s.reps)), extra: !!isExtra,
      optional: isOptional,
      core: !s.warm && !isOptional
    };
    var isDone = !!RUN.done[id];
    var isSkipped = !!RUN.skip[id];
    var row = '<button type="button" class="set' + (isDone ? ' done' : '') + (isSkipped ? ' skipped' : '') + (isOptional ? ' optional-set' : '')
      + '" data-sid="' + id + '" data-rest="' + restSec + '" data-ex="' + exPlain + '" data-extra="' + (!!isExtra) + '"'
      + (checkable ? ' onclick="toggleSet(this)"' : '') + '>'
      + '<span class="s-check">✓</span>'
      + '<span class="s-label' + (s.warm ? ' warm' : '') + '">' + s.label + '</span>'
      + '<span class="s-main">' + wHtml
      + '<span class="' + (s.accent ? 'accent' : 'reps') + '">' + s.reps + '</span></span>'
      + '<span class="s-rest">' + shortRest(s.rest) + '</span>'
      + '</button>';
    if (checkable) {
      row = '<div class="set-line">' + row
        + '<button type="button" class="set-skip' + (isSkipped ? ' active' : '') + '" data-sid="' + id + '" '
        + (isExtra ? 'onclick="removeExtraSet(\'' + id + '\')">削除' : 'onclick="skipSet(this)">スキップ')
        + '</button></div>'
        + '<div class="act" id="act-' + id + '"' + (isDone ? '' : ' hidden') + '></div>';
    }
    return row;
  }
  function setsBlock(sets, exName, checkable, optionalGroup) {
    return '<div class="sets">' + sets.map(function (s) { return setRow(s, exName, checkable, null, false, optionalGroup); }).join('') + '</div>';
  }

  function lastWorkSet(ex) {
    var sets = ex.sets || [];
    if (ex.subgroups) {
      sets = [];
      ex.subgroups.forEach(function (g) { sets = sets.concat(g.sets || []); });
    }
    var work = sets.filter(function (s) { return !s.warm; });
    return work.length ? work[work.length - 1] : (sets[sets.length - 1] || null);
  }

  function addExtraSet(exKey) {
    var info = EXINFO[exKey]; if (!info || !info.base) return;
    var count = RUN.extra.filter(function (x) { return x.key === exKey; }).length + 1;
    var s = JSON.parse(JSON.stringify(info.base));
    s.label = '追加' + count; s.warm = false; s.accent = false; s.optional = true;
    RUN.extra.push({ id: 'x:' + exKey + ':' + Date.now(), key: exKey, set: s });
    runSave(); buildNext();
  }

  function removeExtraSet(id) {
    RUN.extra = RUN.extra.filter(function (x) { return x.id !== id; });
    delete RUN.done[id]; delete RUN.skip[id]; delete RUN.act[id];
    runSave(); buildNext();
  }

  function extraSetsBlock(exKey, exName, checkable, buttonLabel) {
    if (!checkable) return '';
    var rows = RUN.extra.filter(function (x) { return x.key === exKey; })
      .map(function (x) { return setRow(x.set, exName, true, x.id, true, true); }).join('');
    return (rows ? '<div class="sets">' + rows + '</div>' : '')
      + '<button type="button" class="set-add" onclick="addExtraSet(\'' + exKey + '\')">' + (buttonLabel || '＋ セットを追加') + '</button>';
  }

  function priorityClass(p) {
    return p === '必須' ? 'core' : (p === '補助' ? 'support' : 'optional');
  }

  function renderExercise(ex, checkable, sessionKey) {
    var exKey = (sessionKey || D.currentKey) + '-' + ex.no;
    if (!ex.subgroups) EXINFO[exKey] = { name: ex.name, base: lastWorkSet(ex) };
    var h = '<article class="card ex"><div class="ex-head"><div class="ex-no">' + ex.no + '</div>'
      + '<div class="ex-titles"><div class="ex-name">' + ex.name + '</div>'
      + (ex.priority ? '<span class="ex-priority ' + priorityClass(ex.priority) + '">' + ex.priority + '</span>' : '')
      + (ex.tag ? '<span class="ex-tag">' + ex.tag + '</span>' : '') + '</div></div>';
    if (ex.last) h += '<div class="ex-last"><span class="lbl">前回</span><b>' + ex.last + '</b><span class="beat">今日はこれを超える</span></div>';
    if (ex.superset) {
      h += '<div class="ss-flow"><span class="step">' + ex.superset.steps[0] + '</span>'
        + '<span class="arrow">↓ 休まずそのまま</span>'
        + '<span class="step">' + ex.superset.steps[1] + '</span>'
        + '<span class="arrow">↓ ' + ex.superset.note + '</span></div>';
    }
    if (ex.subgroups) {
      ex.subgroups.forEach(function (sg, sgIndex) {
        var sgName = sg.exerciseName || ex.name;
        var sgKey = exKey + '-' + (sg.key || ('group' + sgIndex));
        EXINFO[sgKey] = { name: sgName, base: lastWorkSet({ sets: sg.sets || [] }) };
        h += '<div class="subhead">' + sg.subhead + '</div>'
          + setsBlock(sg.sets, sgName, checkable, ex.priority === '余力')
          + extraSetsBlock(sgKey, sgName, checkable, '＋ ' + sgName + 'を追加');
        if (sg.tip) h += '<details class="fold tip"><summary>コツ <span class="chev">▾</span></summary><div class="fold-body">' + sg.tip + '</div></details>';
      });
    } else if (ex.sets) {
      h += setsBlock(ex.sets, ex.name, checkable, ex.priority === '余力');
      h += extraSetsBlock(exKey, ex.name, checkable);
    }
    var folds = '';
    if (ex.why) folds += '<details class="fold"><summary>なぜこのメニュー？ <span class="chev">▾</span></summary><div class="fold-body">' + ex.why + '</div></details>';
    if (ex.tip) folds += '<details class="fold tip"><summary>' + (ex.subgroups ? '進め方' : 'フォームのコツ') + ' <span class="chev">▾</span></summary><div class="fold-body">' + ex.tip + '</div></details>';
    if (folds) h += '<div class="ex-fold">' + folds + '</div>';
    return h + '</article>';
  }

  function sessionInner(s, checkable) {
    var h = '';
    var rank = { "必須": 0, "補助": 1, "余力": 2 };
    s.exercises.slice().sort(function (a, b) {
      return (rank[a.priority] == null ? 9 : rank[a.priority]) - (rank[b.priority] == null ? 9 : rank[b.priority]);
    }).forEach(function (ex) { h += renderExercise(ex, checkable, s.key); });
    return h;
  }

  /* =========================================================================
     6. 「今日」タブ
     ========================================================================= */
  function heroBlock(s) {
    var m = D.meta, done = m.sessionsDone || 0, total = m.sessionsTotal || 36;
    var ring = ringSVG(done / total, 68, 5, '<b>' + done + '</b><small>/' + total + '</small>');
    var h = '<section class="card hero">'
      + '<div class="hero-top"><div style="min-width:0">'
      + '<span class="kicker">Next Session <span class="jp">・ 次回</span></span>'
      + '<h1 class="hero-name">' + s.name + '</h1>'
      + '<div class="hero-sub">' + s.titleJp + '</div>'
      + '</div>' + ring + '</div>'
      + '<div class="hero-lede">' + s.lede + '</div>'
      + '<div class="hero-meta">'
      + '<span class="chip">目安 ' + s.minutes + '分</span>'
      + '<span class="chip">' + (s.coreSets ? '基本' + s.coreSets + 'メインセット' : s.exercises.length + '種目') + '</span>'
      + '<span class="chip oxc">' + m.phaseLabel + '</span>'
      + '</div>';
    if (s.payoff && s.payoff.length) {
      h += '<details class="payoff"><summary>今日つくる身体（仕上がり予告）<span class="chev">▾</span></summary>';
      s.payoff.forEach(function (p) {
        h += '<div class="payoff-item"><span class="po-target">' + p.target + '</span><span class="po-text">' + p.text + '</span></div>';
      });
      h += '</details>';
    }
    return h + '</section>';
  }

  function runBlock() {
    return '<section class="card run" id="runBox">'
      + '<div class="run-head"><span class="t">今日の進捗</span><b id="runCount">0</b></div>'
      + '<div class="run-bar"><div class="run-fill" id="runFill"></div></div>'
      + '<div class="run-msg">基本メインセットは完遂です。余力セットは未実施でも失敗ではありません。</div>'
      + '<textarea class="run-memo" id="runMemo" rows="2" placeholder="メモ（器具が空かず種目を変えた・調子など。コピーにも入ります）" oninput="memoSave(this.value)"></textarea>'
      + '<div class="run-actions">'
      + '<button class="copybtn" id="copyBtn" onclick="copyReport()" disabled>今日の結果をコピー</button>'
      + '<span class="copy-note" id="copyNote">コピーした文をClaudeに貼ると、そのままトレ報告できます。</span>'
      + '</div></section>';
  }

  function buildNext() {
    var cur = D.sessions[D.currentKey];
    SID = 0; SETINFO = {}; EXINFO = {};
    var h = heroBlock(cur)
      + runBlock()
      + (cur.coachIntro ? coachBlock(cur.coachIntro) : '')
      + '<div style="margin-top:20px"><span class="kicker">Workout <span class="jp">・ 今日のメニュー</span></span></div>'
      + sessionInner(cur, true);
    if (cur.rule) h += '<div class="card" style="padding:12px 16px"><span class="kicker">2-up rule</span>'
      + '<p style="font-size:12.5px;color:var(--muted);margin-top:4px">' + cur.rule + '</p></div>';
    var last = D.log && D.log[0];
    if (last) {
      var i = D.rotation.indexOf(D.currentKey);
      var nn = D.sessions[D.rotation[(i + 1) % D.rotation.length]];
      var lastName = D.sessions[last.sessionKey] ? D.sessions[last.sessionKey].name : last.sessionKey;
      h += '<footer class="card colophon">'
        + '<span class="kicker">Last Session <span class="jp">・ 前回 ' + lastName + '（' + fmtDate(last.date) + '）</span></span>'
        + '<p class="colo-hl">' + last.highlights + '</p>'
        + '<p class="next">次の次は <b>' + nn.name + '</b>（' + nn.titleJp + '）</p></footer>';
    }
    document.getElementById('next-sheet').innerHTML = h;
    /* Program変更後に古いセットIDが端末へ残っても、別セットとして数えない。 */
    Object.keys(RUN.done).forEach(function (id) { if (!SETINFO[id]) delete RUN.done[id]; });
    Object.keys(RUN.skip).forEach(function (id) { if (!SETINFO[id]) delete RUN.skip[id]; });
    Object.keys(RUN.act).forEach(function (id) { if (!SETINFO[id]) delete RUN.act[id]; });
    /* ウォームアップ・余力・追加は分母にせず、基本メインセットだけで完遂を判定する。 */
    RUN.total = coreIds().length;
    RUN.planned = document.querySelectorAll('#next-sheet .set[data-sid][data-extra="false"]').length;
    /* 復元したチェック済みセットの実績表示を描き直す */
    Object.keys(RUN.done).forEach(function (id) { renderAct(id); });
    var memoEl = document.getElementById('runMemo'); if (memoEl) memoEl.value = RUN.memo || '';
    runSave(); updateRunUI();
  }

  /* =========================================================================
     7. 「プログラム」タブ
     ========================================================================= */
  function programMapCard() {
    var m = D.meta;
    var done = clampNum(m.sessionsDone || 0, 0, m.sessionsTotal || 36);
    var total = m.sessionsTotal || 36;
    var nextNo = clampNum(done + 1, 1, total);
    var phaseSize = Math.max(1, Math.round(total / 3));
    var phaseNo = done >= total ? 3 : clampNum(Math.floor(done / phaseSize) + 1, 1, 3);
    var phaseEnd = phaseNo === 3 ? total : phaseNo * phaseSize;
    var cur = D.sessions[D.currentKey];
    var phaseNames = ['土台づくり', '重量を伸ばす', '仕上げと確認'];
    var phaseNotes = ['フォーム習得・基準づくり', '主役種目を少しずつ更新', '疲労を見ながら定着'];

    var marks = [Math.ceil(total * .25), phaseEnd, Math.ceil(total * .5), Math.ceil(total * .75), total];
    var seen = {}, uniq = [];
    marks.forEach(function (x) { if (x > done && !seen[x]) { seen[x] = true; uniq.push(x); } });
    uniq.sort(function (a, b) { return a - b; });
    var milestone = uniq[0] || total;
    var mLabel = milestone === total ? '36回完了' : (milestone === phaseEnd ? 'Phase完了' : Math.round(milestone / total * 100) + '%到達');

    var h = '<section class="card">'
      + '<span class="kicker">Program Map <span class="jp">・ 現在地</span></span>'
      + '<div class="bigring-card" style="margin-top:10px">'
      + ringSVG(done / total, 94, 7, '<b style="font-size:23px">' + done + '</b><small>/' + total + '回</small>')
      + '<div class="bigring-copy"><span class="ph">Phase ' + phaseNo + ' ・ ' + phaseNames[phaseNo - 1] + '</span>'
      + '<p>次は<b>' + nextNo + '回目</b>、' + (cur ? '<b>' + cur.name + '</b>' : '次のメニュー') + '。'
      + mLabel + 'まであと<b>' + Math.max(0, milestone - done) + '回</b>。</p></div></div>';

    h += '<div class="pm-track">';
    for (var i = 1; i <= 3; i++) {
      var st = (i - 1) * phaseSize + 1;
      var en = i === 3 ? total : i * phaseSize;
      var state = done >= en ? ' done' : (i === phaseNo ? ' now' : '');
      h += '<div class="pm-phase' + state + '"><span class="num">Phase ' + i + '</span>'
        + '<span class="name">' + phaseNames[i - 1] + '</span>'
        + '<span class="range">' + st + '–' + en + '回 ・ ' + phaseNotes[i - 1] + '</span></div>';
    }
    h += '</div>';

    h += '<div class="pm-next">'
      + '<div class="pm-next-item"><span class="k">Next Milestone</span><div class="v"><b>' + milestone + '回目</b>で' + mLabel + '。あと' + Math.max(0, milestone - done) + '回。</div></div>'
      + '<div class="pm-next-item"><span class="k">Current Focus</span><div class="v">' + m.phaseNote + '</div></div>'
      + '</div></section>';
    return h;
  }

  /* records の "× 9（AMRAP）" から回数を拾って推定1RM（Epley式）を出す */
  function e1rmOf(rec) {
    if (rec.unit.indexOf('kg') !== 0) return null;
    if (/side|相当/.test(rec.unit + rec.reps)) return null;
    var w = parseFloat(rec.weight);
    var m = String(rec.reps).match(/×?\s*(\d+)/);
    if (!w || !m) return null;
    var reps = +m[1];
    if (reps <= 1) return w;
    return Math.round(w * (1 + reps / 30));
  }

  function buildProgram() {
    var m = D.meta;
    var h = '<header class="head-plain">'
      + '<span class="kicker">Program</span>'
      + '<h1>' + m.programName + '</h1>'
      + '<div class="sub">' + m.splitName + ' ・ ' + m.phaseLabel + '</div>'
      + '</header>';

    h += programMapCard();

    /* ローテーション（タップで中身） */
    h += '<section class="card rot-card"><span class="kicker" style="display:block;padding:12px 2px 2px">Rotation <span class="jp">・ 4分割（タップで中身）</span></span>';
    D.rotation.forEach(function (k, idx) {
      var s = D.sessions[k], now = (k === D.currentKey);
      h += '<div class="rot-item"><button class="rot-h" id="rh-' + k + '" onclick="toggleSession(\'' + k + '\')">'
        + '<span class="ord">' + (idx + 1) + '</span>'
        + '<span class="rn">' + s.name + '<span class="rj">' + s.titleJp + '</span></span>'
        + (now ? '<span class="rmark">次</span>' : '')
        + '<span class="chev">▾</span></button>'
        + '<div class="rot-body" id="rb-' + k + '"><div class="inner">'
        + '<p class="acc-lede">' + s.lede + '　／　目安 ' + s.minutes + '分</p>'
        + sessionInner(s, false) + '</div></div></div>';
    });
    h += '</section>';

    /* 主要種目の伸び */
    h += '<section class="card"><span class="kicker">Progress <span class="jp">・ 主要種目の伸び</span></span>';
    D.progress.forEach(function (p) {
      var gain = p.current - p.start;
      var pct = clampNum(gain / (p.start * .5), 0, 1);  /* 開始比+50%でバー満タン */
      h += '<div class="grow-row"><div class="grow-top"><span class="gl">' + p.lift + '</span>'
        + '<span class="gv"><span class="from">' + p.start + ' →</span> <b>' + p.current + '</b>' + p.unit
        + (gain > 0 ? '<span class="up">+' + gain + '</span>' : '') + '</span></div>'
        + '<div class="grow-bar"><div class="grow-fill" style="width:' + (pct * 100).toFixed(0) + '%"></div></div></div>';
    });
    h += '</section>';

    /* PRボード（推定1RMつき） */
    if (D.records && D.records.length) {
      h += '<section class="card"><span class="kicker">Personal Records <span class="jp">・ 自己ベスト</span></span>';
      D.records.forEach(function (r) {
        var e1 = e1rmOf(r);
        h += '<div class="rec-row"><div class="rec-l"><div class="rl-name">' + r.lift
          + (r.isNew ? '<span class="rl-new">NEW</span>' : '') + '</div>'
          + '<div class="rl-date">' + r.date.replace(/-/g, '/') + '</div>'
          + (e1 ? '<div class="rl-e1rm">推定1RM ' + e1 + 'kg</div>' : '')
          + '</div>'
          + '<div class="rec-v"><span class="rv-num">' + r.weight + '<small>' + r.unit + '</small></span>'
          + '<span class="rv-reps">' + r.reps + '</span></div></div>';
      });
      h += '</section>';
    }

    /* InBody（体組成） */
    h += inbodySection();

    /* このプログラムについて */
    if (m.about && m.about.length) {
      h += '<section class="card"><span class="kicker">About <span class="jp">・ このプログラムについて</span></span>';
      m.about.forEach(function (a) { h += '<div class="about-item"><span class="ai-h">' + a.h + '</span><p class="ai-p">' + a.p + '</p></div>'; });
      h += '</section>';
    }

    document.getElementById('prog-sheet').innerHTML = h;
  }

  /* =========================================================================
     8. InBody（体組成）セクション
     ========================================================================= */
  /* 2つの日付の間の月数（YYYY-MM-DD）。C案のヘッダー「◯ヶ月」に使う。 */
  function monthsBetween(d0, d1) {
    var a = d0.split('-'), b = d1.split('-');
    return Math.max(1, (b[0] - a[0]) * 12 + (b[1] - a[1]));
  }
  /* 符号つきの差分文字列。＋/− を全角で、絶対値は小数1桁。 */
  function signStr(v) { return (v >= 0 ? '＋' : '−') + Math.abs(v).toFixed(1); }
  /* 変化の良し悪し → クラス名。lowerBetter=true なら「下がるほど良い」（体脂肪率）。 */
  function dirClass(delta, lowerBetter) {
    if (Math.abs(delta) < 0.05) return 'flat';
    var good = lowerBetter ? delta < 0 : delta > 0;
    return good ? 'good' : 'bad';
  }
  /* ヒーローカード用の極小スパークライン（1系列）。最新点だけドット。 */
  function ibSpark(series, color) {
    var W = 140, H = 32, p = 4, n = series.length;
    var mn = Math.min.apply(null, series), mx = Math.max.apply(null, series), rg = (mx - mn) || 1;
    var X = function (i) { return p + (W - 2 * p) * i / (n - 1); };
    var Y = function (v) { return p + (H - 2 * p) * (1 - (v - mn) / rg); };
    var pts = series.map(function (v, i) { return [X(i), Y(v)]; });
    var d = 'M' + pts.map(function (q) { return q[0].toFixed(1) + ' ' + q[1].toFixed(1); }).join(' L');
    var area = d + ' L' + X(n - 1).toFixed(1) + ' ' + (H - p) + ' L' + p + ' ' + (H - p) + ' Z';
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-hidden="true">'
      + '<path d="' + area + '" fill="' + color + '" fill-opacity="0.10"/>'
      + '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2"/>'
      + '<circle cx="' + X(n - 1).toFixed(1) + '" cy="' + Y(series[n - 1]).toFixed(1) + '" r="3" fill="' + color + '" stroke="var(--card)" stroke-width="1.3"/></svg>';
  }

  function inbodySection() {
    var arr = D.inbody || [];
    if (arr.length < 2) return '';
    var cur = arr[arr.length - 1], prev = arr[arr.length - 2], first = arr[0];
    var months = monthsBetween(first.date, cur.date);
    var h = '<section class="card"><span class="kicker">Body Composition <span class="jp">・ InBody（体組成）</span></span>';

    /* C案のビフォー→アフター見出し（開始月 →◯ヶ月→ 最新月） */
    h += '<div class="ib-head"><span class="then">' + first.date.slice(0, 7).replace('-', '.') + '</span>'
      + '<span class="ar"></span><span class="span">' + months + 'ヶ月</span>'
      + '<span class="now">' + cur.date.slice(0, 7).replace('-', '.') + '</span></div>';

    /* 主指標2枚（骨格筋量＝赤／体脂肪率＝サンド）。前回比バッジ＋開始からの差＋スパークライン。 */
    var dM = cur.muscle - prev.muscle, sM = cur.muscle - first.muscle;
    var dF = cur.fat - prev.fat, sF = cur.fat - first.fat;
    h += '<div class="ib-heroes">'
      + '<div class="ib-hc m"><div class="l">骨格筋量</div><div class="v">' + cur.muscle.toFixed(1) + '<small>kg</small></div>'
      + '<div class="bd ' + dirClass(dM, false) + '">前回比 ' + signStr(dM) + 'kg</div>'
      + '<div class="fromstart">開始から <b class="' + dirClass(sM, false) + '">' + signStr(sM) + 'kg</b></div>'
      + '<div class="spark">' + ibSpark(arr.map(function (r) { return r.muscle; }), '#7C2A22') + '</div></div>'
      + '<div class="ib-hc f"><div class="l">体脂肪率</div><div class="v">' + cur.fat.toFixed(1) + '<small>%</small></div>'
      + '<div class="bd ' + dirClass(dF, true) + '">前回比 ' + signStr(dF) + '%</div>'
      + '<div class="fromstart">開始から <b class="' + dirClass(sF, true) + '">' + signStr(sF) + '%</b></div>'
      + '<div class="spark">' + ibSpark(arr.map(function (r) { return r.fat; }), '#B08A45') + '</div></div>'
      + '</div>';

    /* サブ指標の帯（体重＝開始比つき／基礎代謝／腹囲）。参考値として格下げ表示。 */
    var withBmr = arr.filter(function (r) { return r.bmr != null; });
    var withWaist = arr.filter(function (r) { return r.waist != null; });
    var bmr = withBmr.length ? withBmr[withBmr.length - 1].bmr : null;
    var waist = withWaist.length ? withWaist[withWaist.length - 1].waist : null;
    h += '<div class="ib-band">'
      + '<div><div class="k">体重</div><div class="v">' + cur.weight.toFixed(1) + '<small>kg</small></div><div class="fs">開始 ' + signStr(cur.weight - first.weight) + '</div></div>'
      + '<div><div class="k">基礎代謝</div><div class="v">' + (bmr != null ? bmr.toLocaleString() : '—') + '<small>kcal</small></div></div>'
      + '<div><div class="k">腹囲</div><div class="v">' + (waist != null ? waist.toFixed(1) : '—') + '<small>cm</small></div></div>'
      + '</div>';

    /* InBody点数ゲージ（現在値まで塗り＋最高点にマーカー） */
    var scored = arr.filter(function (r) { return r.score != null; });
    if (scored.length) {
      var sc = scored[scored.length - 1].score;
      var mx = Math.max.apply(null, scored.map(function (r) { return r.score; }));
      h += '<div class="ib-gauge"><div class="gn">' + sc + '<small>/100</small></div>'
        + '<div class="gb"><div class="gt">InBody 点数（体成分の総合評価）</div>'
        + '<div class="gtrack"><i style="width:' + sc + '%"></i><b style="left:' + mx + '%"><span>最高' + mx + '</span></b></div></div></div>';
    }

    /* 推移グラフは畳んでおく（普段は一覧性優先、見たい時だけ開く） */
    h += '<details class="ib-trend"><summary>推移をくわしく見る（' + arr.length + '回分） <span class="chev">▾</span></summary>'
      + inbodySVG(arr)
      + '<div class="ib-legend"><span><span class="ib-sw" style="background:var(--ox)"></span>骨格筋量 (kg)</span>'
      + '<span><span class="ib-sw" style="background:var(--sand)"></span>体脂肪率 (%)</span>'
      + '<span style="margin-left:auto;color:var(--faint)">左軸 筋肉kg ・ 右軸 脂肪%</span></div></details>';
    h += '</section>';

    /* 部位別筋肉量の成長（部位別があるデータの最初 → 最新） */
    var seg = arr.filter(function (r) { return r.armR != null; });
    if (seg.length >= 2) {
      var s0 = seg[0], s1 = seg[seg.length - 1];
      var parts = [
        ['右腕', 'armR'], ['左腕', 'armL'], ['体幹', 'trunk'], ['右脚', 'legR'], ['左脚', 'legL']
      ];
      h += '<section class="card"><span class="kicker">Segmental <span class="jp">・ 部位別筋肉量の成長</span></span>';
      parts.forEach(function (p) {
        var v0 = s0[p[1]], v1 = s1[p[1]];
        var pct = (v1 - v0) / v0 * 100;
        var bar = clampNum(pct / 20, 0, 1);  /* +20%でバー満タン */
        h += '<div class="seg-row"><span class="seg-name">' + p[0] + '</span>'
          + '<div class="seg-bar"><div class="seg-fill" style="width:' + (bar * 100).toFixed(0) + '%"></div></div>'
          + '<span class="seg-v"><span class="from">' + v0.toFixed(2) + ' →</span> <b>' + v1.toFixed(2) + '</b>kg'
          + '<span class="up">' + (pct >= 0 ? '+' : '') + pct.toFixed(0) + '%</span></span></div>';
      });
      h += '<p class="seg-note">' + s0.date.replace(/-/g, '.') + '（トレ開始期）→ ' + s1.date.replace(/-/g, '.') + ' の比較。バーは +20% で満タン。</p></section>';
    }
    return h;
  }

  /* InBody 推移の折れ線（v2）。骨格筋量＝面塗りのメイン、体脂肪率＝破線のサブ。
     グリッドと軸ラベルを整え、点の座標は測定日の実時間に比例させる。 */
  function inbodySVG(arr) {
    var W = 340, H = 210, padL = 34, padR = 34, padT = 18, padB = 26;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var n = arr.length;
    var mus = arr.map(function (d) { return d.muscle; }), fat = arr.map(function (d) { return d.fat; });
    /* 軸はキリのいい整数に丸める（グリッドの値が読めるように） */
    var muLo = Math.floor(Math.min.apply(null, mus)), muHi = Math.ceil(Math.max.apply(null, mus));
    var faLo = Math.floor(Math.min.apply(null, fat)), faHi = Math.ceil(Math.max.apply(null, fat));
    if (muHi === muLo) muHi++;
    if (faHi === faLo) faHi++;
    var ts = arr.map(function (d) { return new Date(d.date).getTime(); });
    var t0 = ts[0], t1 = ts[n - 1];
    function x(i) { return padL + plotW * (n === 1 || t1 === t0 ? 0.5 : (ts[i] - t0) / (t1 - t0)); }
    function ym(v) { return padT + plotH * (1 - (v - muLo) / (muHi - muLo)); }
    function yf(v) { return padT + plotH * (1 - (v - faLo) / (faHi - faLo)); }

    /* なめらかな曲線（Catmull-Rom をベジェに変換） */
    function smoothPath(pts) {
      if (pts.length < 3) return 'M' + pts.map(function (p) { return p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join('L');
      var d = 'M' + pts[0][0].toFixed(1) + ',' + pts[0][1].toFixed(1);
      for (var i = 0; i < pts.length - 1; i++) {
        var p0 = pts[Math.max(0, i - 1)], p1 = pts[i], p2 = pts[i + 1], p3 = pts[Math.min(pts.length - 1, i + 2)];
        d += 'C' + (p1[0] + (p2[0] - p0[0]) / 6).toFixed(1) + ',' + (p1[1] + (p2[1] - p0[1]) / 6).toFixed(1)
          + ' ' + (p2[0] - (p3[0] - p1[0]) / 6).toFixed(1) + ',' + (p2[1] - (p3[1] - p1[1]) / 6).toFixed(1)
          + ' ' + p2[0].toFixed(1) + ',' + p2[1].toFixed(1);
      }
      return d;
    }
    var mpts = arr.map(function (d, i) { return [x(i), ym(d.muscle)]; });
    var fpts = arr.map(function (d, i) { return [x(i), yf(d.fat)]; });
    var mPath = smoothPath(mpts);
    var areaPath = mPath + 'L' + mpts[n - 1][0].toFixed(1) + ',' + (H - padB) + 'L' + mpts[0][0].toFixed(1) + ',' + (H - padB) + 'Z';

    var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;margin-top:10px" xmlns="http://www.w3.org/2000/svg">';
    s += '<defs><linearGradient id="ibg" x1="0" y1="0" x2="0" y2="1">'
      + '<stop offset="0" stop-color="#7C2A22" stop-opacity=".16"/>'
      + '<stop offset="1" stop-color="#7C2A22" stop-opacity="0"/></linearGradient></defs>';

    /* 水平グリッド（筋肉kg基準・3本）＋左軸ラベル。右軸は体脂肪% */
    [muLo, (muLo + muHi) / 2, muHi].forEach(function (v) {
      var y = ym(v);
      s += '<line x1="' + padL + '" y1="' + y.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + y.toFixed(1) + '" stroke="#E6DDCB" stroke-width="1"/>';
      s += '<text x="' + (padL - 6) + '" y="' + (y + 3.5).toFixed(1) + '" text-anchor="end" font-family="Noto Sans JP,sans-serif" font-size="9.5" fill="#A99D8A">' + (v % 1 ? v.toFixed(1) : v) + '</text>';
    });
    [faLo, faHi].forEach(function (v) {
      var y = yf(v);
      s += '<text x="' + (W - padR + 6) + '" y="' + (y + 3.5).toFixed(1) + '" text-anchor="start" font-family="Noto Sans JP,sans-serif" font-size="9.5" fill="#C4A672">' + v + '%</text>';
    });

    /* 面＋線 */
    s += '<path d="' + areaPath + '" fill="url(#ibg)"/>';
    s += '<path d="' + smoothPath(fpts) + '" fill="none" stroke="#B08A45" stroke-width="2" stroke-dasharray="5 4" opacity=".85"/>';
    s += '<path d="' + mPath + '" fill="none" stroke="#7C2A22" stroke-width="2.6"/>';

    /* 点（最新は大きく・白縁） */
    arr.forEach(function (d, i) {
      var last = i === n - 1;
      s += '<circle cx="' + x(i).toFixed(1) + '" cy="' + yf(d.fat).toFixed(1) + '" r="' + (last ? 3.4 : 2.6) + '" fill="#B08A45" stroke="#FDFBF6" stroke-width="1.4"/>';
      s += '<circle cx="' + x(i).toFixed(1) + '" cy="' + ym(d.muscle).toFixed(1) + '" r="' + (last ? 4.4 : 3.2) + '" fill="#7C2A22" stroke="#FDFBF6" stroke-width="1.6"/>';
    });

    /* 値ラベル（最初と最新のみ。散らかさない） */
    s += '<text x="' + x(n - 1).toFixed(1) + '" y="' + (ym(mus[n - 1]) - 10).toFixed(1) + '" text-anchor="end" font-family="Playfair Display,Georgia,serif" font-size="13.5" font-weight="700" fill="#7C2A22">' + mus[n - 1].toFixed(1) + 'kg</text>';
    s += '<text x="' + x(n - 1).toFixed(1) + '" y="' + (yf(fat[n - 1]) + 15).toFixed(1) + '" text-anchor="end" font-family="Playfair Display,Georgia,serif" font-size="12" font-weight="700" fill="#B08A45">' + fat[n - 1].toFixed(1) + '%</text>';
    s += '<text x="' + x(0).toFixed(1) + '" y="' + (ym(mus[0]) + 16).toFixed(1) + '" text-anchor="start" font-family="Noto Sans JP,sans-serif" font-size="10" fill="#A99D8A">' + mus[0].toFixed(1) + '</text>';

    /* x軸：年の変わり目と最新だけラベルを打つ（重なり防止） */
    var lastYear = '';
    arr.forEach(function (d, i) {
      var y4 = d.date.slice(0, 4);
      if (y4 !== lastYear) {
        lastYear = y4;
        s += '<text x="' + x(i).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-family="Noto Sans JP,sans-serif" font-size="9.5" fill="#A99D8A">' + y4 + '</text>';
      } else if (i === n - 1) {
        s += '<text x="' + x(i).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-family="Noto Sans JP,sans-serif" font-size="9.5" fill="#7A7060">' + (+d.date.slice(5, 7)) + '/' + (+d.date.slice(8, 10)) + '</text>';
      }
    });
    s += '</svg>';
    return s;
  }

  /* =========================================================================
     9. 「記録」タブ（継続カレンダー＋その日の記録）
     ========================================================================= */
  var CAL = { idx: 0, months: [], sel: null };
  var MON_LATIN = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

  function calBuildMonths() {
    var map = {};
    (D.attendance || []).forEach(function (a) {
      var p = a.date.split('-'), key = p[0] + '-' + p[1];
      (map[key] = map[key] || {})[parseInt(p[2], 10)] = a.part;
    });
    var keys = Object.keys(map).sort(), now = new Date();
    var sy, sm, ey = now.getFullYear(), em = now.getMonth() + 1;
    if (keys.length) { var f = keys[0].split('-'); sy = +f[0]; sm = +f[1]; } else { sy = ey; sm = em; }
    if (keys.length) { var l = keys[keys.length - 1].split('-'); if (+l[0] > ey || (+l[0] === ey && +l[1] > em)) { ey = +l[0]; em = +l[1]; } }
    var list = [], y = sy, mth = sm;
    while (y < ey || (y === ey && mth <= em)) {
      list.push({ y: y, m: mth, t: map[y + '-' + pad2(mth)] || {} });
      mth++; if (mth > 12) { mth = 1; y++; }
    }
    return list;
  }

  /* 今週（日曜はじまり）のトレ回数。ヘッダーの週ドットにも使う。 */
  function weekStatus() {
    var now = new Date();
    var wstart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
    var cnt = 0;
    (D.attendance || []).forEach(function (a) {
      var p = a.date.split('-');
      var d = new Date(+p[0], +p[1] - 1, +p[2]);
      if (d >= wstart && d <= now) cnt++;
    });
    return { count: cnt, left: Math.max(0, 3 - cnt) };
  }

  function renderWeekchip() {
    var w = weekStatus(), dots = '';
    for (var i = 0; i < 3; i++) dots += '<span class="d' + (i < w.count ? ' on' : '') + '"></span>';
    document.getElementById('weekchip').innerHTML =
      '<span class="wk-t">今週</span><span class="dots">' + dots + '</span>'
      + (w.left > 0 ? '<span>あと<b>' + w.left + '</b>回</span>' : '<b>週3達成</b>');
  }

  function calShell() {
    return '<section class="card">'
      + '<span class="kicker">Continuity <span class="jp">・ つづけた記録</span></span>'
      + '<div class="cal-nav" style="margin-top:8px"><button onclick="calStep(-1)" aria-label="前の月" id="cal-prev">‹</button>'
      + '<div><span class="mlabel" id="cal-mlabel"></span><span class="mlatin" id="cal-mlatin"></span></div>'
      + '<button onclick="calStep(1)" aria-label="次の月" id="cal-next">›</button></div>'
      + '<div class="cal-week" id="cal-week" style="display:none"></div>'
      + '<div class="cal-dow"><span class="sun">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="sat">土</span></div>'
      + '<div class="cal-grid" id="cal-grid"></div>'
      + '<div class="cal-legend">'
      + '<span><span class="sw" style="background:#F0DFD4"></span>行った日</span>'
      + '<span><span class="sw" style="border:2px solid var(--ox)"></span>今日</span>'
      + '<span style="color:var(--faint)">上＝上半身 / 下＝下半身</span></div>'
      + '<div class="cal-stats" id="cal-stats"></div></section>';
  }

  function calRender() {
    var o = CAL.months[CAL.idx], now = new Date();
    var isCur = (o.y === now.getFullYear() && o.m === now.getMonth() + 1), todayD = now.getDate();
    var lead = new Date(o.y, o.m - 1, 1).getDay(), days = new Date(o.y, o.m, 0).getDate();

    document.getElementById('cal-mlabel').textContent = o.y + '年 ' + o.m + '月';
    document.getElementById('cal-mlatin').textContent = MON_LATIN[o.m - 1];
    document.getElementById('cal-prev').style.visibility = CAL.idx > 0 ? 'visible' : 'hidden';
    document.getElementById('cal-next').style.visibility = CAL.idx < CAL.months.length - 1 ? 'visible' : 'hidden';

    var g = '';
    for (var i = 0; i < lead; i++) g += '<div></div>';
    for (var d = 1; d <= days; d++) {
      var part = o.t[d], isToday = isCur && d === todayD, ds = o.y + '-' + pad2(o.m) + '-' + pad2(d);
      var cls = 'cal-cell' + (part ? ' went' : '') + (isToday ? ' today' : '') + (part && CAL.sel === ds ? ' sel' : '');
      var mk = part ? '<span class="part">' + (part === 'U' ? '上' : '下') + '</span>' : '';
      g += '<div class="' + cls + '"' + (part ? ' onclick="calPick(\'' + ds + '\')"' : '') + '>' + mk + d + '</div>';
    }
    document.getElementById('cal-grid').innerHTML = g;

    var cnt = 0; for (var key in o.t) if (o.t.hasOwnProperty(key)) cnt++;
    var weeks = (isCur ? todayD : days) / 7, avg = (cnt / weeks).toFixed(1);
    document.getElementById('cal-stats').innerHTML =
      '<div><div class="num">' + cnt + '</div><div class="lbl2">通った回数</div></div>'
      + '<div><div class="num">' + avg + '</div><div class="lbl2">週平均</div></div>';

    var wk = document.getElementById('cal-week');
    if (isCur) {
      var w = weekStatus(), dots = '';
      for (var j = 0; j < 3; j++) dots += '<span class="dot' + (j < w.count ? ' on' : '') + '"></span>';
      wk.innerHTML = '<span>今週</span><span class="dots">' + dots + '</span><span class="left">'
        + (w.left > 0 ? 'あと' + w.left + '回' : '週3達成') + '</span>';
      wk.style.display = 'flex';
    } else { wk.style.display = 'none'; }
  }

  function calStep(dir) {
    var n = CAL.idx + dir;
    if (n < 0 || n >= CAL.months.length) return;
    CAL.idx = n; calRender();
  }

  var LOGMAP = {}, ATTMAP = {};
  function calBuildMaps() {
    LOGMAP = {}; ATTMAP = {};
    (D.log || []).forEach(function (l) { LOGMAP[l.date] = l; });
    (D.attendance || []).forEach(function (a) { ATTMAP[a.date] = a.part; });
  }

  function calDetail(date) {
    var l = LOGMAP[date], part = ATTMAP[date];
    var name = (l && D.sessions[l.sessionKey]) ? D.sessions[l.sessionKey].name
      : (part === 'U' ? '上半身' : part === 'L' ? '下半身' : '—');
    var h = '<div class="cal-det-head"><span class="cal-det-date">' + fmtDate(date) + '</span>'
      + '<span class="cal-det-name">' + name + '</span></div>';
    if (l) {
      if (l.highlights) h += '<p class="cal-det-hl">' + l.highlights + '</p>';
      if (l.detail) h += '<div class="log-detail">' + l.detail + '</div>';
      if (l.coach) h += coachBlock(l.coach, l.exerciseReviews);
    } else {
      h += '<p class="cal-det-none">この日はジムに通った記録のみ（詳細メモはありません）。</p>';
    }
    document.getElementById('cal-detail').innerHTML = h;
  }

  function calPick(date) {
    CAL.sel = date;
    calRender();
    calDetail(date);
  }

  function buildLog() {
    var h = calShell()
      + '<div style="margin-top:20px"><span class="kicker">Session Detail <span class="jp">・ その日の記録</span></span></div>'
      + '<div class="cal-detail" id="cal-detail"></div>';
    document.getElementById('log-sheet').innerHTML = h;
    calBuildMaps();
    CAL.months = calBuildMonths();
    CAL.idx = CAL.months.length - 1;
    var dates = Object.keys(ATTMAP).sort();
    CAL.sel = dates.length ? dates[dates.length - 1] : null;
    calRender();
    if (CAL.sel) calDetail(CAL.sel);
  }

  /* =========================================================================
     10. タブ切替＋横スワイプ（指追従）
     ========================================================================= */
  var TAB_ORDER = ['program', 'next', 'log'];
  var currentTab = 'next';
  var isTabAnimating = false;
  var tabAnimationTimer = null;

  function tabIndex(name) { return TAB_ORDER.indexOf(name); }
  function panelByName(name) { return document.getElementById('tab-' + name); }
  function prefersReducedMotion() {
    return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }
  function panelX(x) { return 'translate3d(' + x + 'px, 0, 0)'; }

  function setTabButton(name) {
    var btns = document.querySelectorAll('.tabbar button');
    for (var j = 0; j < btns.length; j++) btns[j].classList.toggle('active', btns[j].getAttribute('data-tab') === name);
  }

  function resetPanel(p) {
    p.classList.remove('show', 'slide-layer', 'slide-anim');
    p.style.transform = '';
    p.style.opacity = '';
  }

  function settleTab(panel, name, keepScroll) {
    var panels = document.querySelectorAll('.panel');
    for (var i = 0; i < panels.length; i++) resetPanel(panels[i]);
    panel.classList.add('show');
    document.querySelector('main').style.minHeight = '';
    currentTab = name;
    setTabButton(name);
    try { sessionStorage.setItem('ks_tab', name); } catch (e) {}
    if (!keepScroll) window.scrollTo(0, 0);
    isTabAnimating = false;
  }

  function setSlideHeight(main, a, b) {
    var h = a ? a.scrollHeight : 0;
    if (b) h = Math.max(h, b.scrollHeight);
    main.style.minHeight = h + 'px';
  }

  function prepareSlideLayer(panel) {
    panel.classList.add('show', 'slide-layer');
    panel.classList.remove('slide-anim');
  }

  function showTab(name) {
    if (TAB_ORDER.indexOf(name) === -1) name = 'next';
    if (name === currentTab && panelByName(name).classList.contains('show')) return;
    if (isTabAnimating) return;
    if (tabAnimationTimer) window.clearTimeout(tabAnimationTimer);
    var oldName = currentTab;
    var oldPanel = panelByName(oldName);
    var newPanel = panelByName(name);
    var oldIndex = tabIndex(oldName), newIndex = tabIndex(name);
    var reduceMotion = prefersReducedMotion();
    var canAnimate = oldPanel && newPanel && oldPanel.classList.contains('show') && oldIndex !== -1 && newIndex !== -1 && !reduceMotion;
    currentTab = name;
    setTabButton(name);
    try { sessionStorage.setItem('ks_tab', name); } catch (e) {}
    if (canAnimate) {
      isTabAnimating = true;
      var dir = newIndex > oldIndex ? 1 : -1;
      var main = document.querySelector('main');
      var width = Math.max(1, main.getBoundingClientRect().width || window.innerWidth || 1);
      prepareSlideLayer(newPanel);
      prepareSlideLayer(oldPanel);
      setSlideHeight(main, oldPanel, newPanel);
      oldPanel.style.transform = panelX(0);
      oldPanel.style.opacity = '1';
      newPanel.style.transform = panelX(dir * width);
      newPanel.style.opacity = '1';
      requestAnimationFrame(function () {
        oldPanel.classList.add('slide-anim');
        newPanel.classList.add('slide-anim');
        oldPanel.style.transform = panelX(-dir * width);
        oldPanel.style.opacity = '1';
        newPanel.style.transform = panelX(0);
        newPanel.style.opacity = '1';
      });
      tabAnimationTimer = window.setTimeout(function () { settleTab(newPanel, name); }, 300);
      return;
    }
    var panels = document.querySelectorAll('.panel');
    for (var i = 0; i < panels.length; i++) resetPanel(panels[i]);
    panelByName(name).classList.add('show');
    window.scrollTo(0, 0);
  }

  /* スワイプを遮る要素：タブバー・タイマー・シート・実績ステッパー・フォーム類。
     セット行やアコーディオンの上でもスワイプできる（タップとは移動量10pxで区別）。 */
  function isSwipeBlockedTarget(el) {
    return !!(el && el.closest && el.closest('.tabbar, .rest, .veil, .act, a, input, textarea, select'));
  }

  function setupSwipeTabs() {
    var main = document.querySelector('main'), swipe = null, raf = 0;
    if (!main) return;
    var useTouchEvents = ('ontouchstart' in window) || (window.navigator && window.navigator.maxTouchPoints > 0);

    function nowMs() {
      return (window.performance && performance.now) ? performance.now() : Date.now();
    }

    function trackPoint(x) {
      if (!swipe) return;
      var t = nowMs();
      swipe.samples.push({ x: x, t: t });
      while (swipe.samples.length > 6) swipe.samples.shift();
    }

    function swipeVelocity() {
      if (!swipe || swipe.samples.length < 2) return 0;
      var last = swipe.samples[swipe.samples.length - 1];
      var first = swipe.samples[0];
      for (var i = swipe.samples.length - 2; i >= 0; i--) {
        if (last.t - swipe.samples[i].t > 120) break;
        first = swipe.samples[i];
      }
      return (last.x - first.x) / Math.max(1, last.t - first.t);
    }

    function clearSwipeLayers(keepName) {
      var panels = document.querySelectorAll('.panel');
      for (var i = 0; i < panels.length; i++) resetPanel(panels[i]);
      panelByName(keepName).classList.add('show');
      main.style.minHeight = '';
    }
    function startSwipe(x, y, target, id) {
      if (isTabAnimating || isSwipeBlockedTarget(target)) { swipe = null; return; }
      var idx = tabIndex(currentTab);
      if (idx === -1) return;
      swipe = {
        id: id, startX: x, startY: y, dx: 0, width: 0,
        fromName: currentTab, fromIndex: idx, fromPanel: panelByName(currentTab),
        toName: null, toPanel: null, dir: 0, edge: false,
        horizontal: false, vertical: false, captured: false,
        samples: [{ x: x, t: nowMs() }]
      };
    }
    function prepareDragPanels(dir) {
      if (!swipe || swipe.dir === dir) return;
      var targetIndex = swipe.fromIndex + dir;
      swipe.dir = dir;
      swipe.toName = TAB_ORDER[targetIndex] || null;
      swipe.toPanel = swipe.toName ? panelByName(swipe.toName) : null;
      swipe.edge = !swipe.toPanel;
      swipe.width = Math.max(1, main.getBoundingClientRect().width || window.innerWidth || 1);
      clearSwipeLayers(swipe.fromName);
      prepareSlideLayer(swipe.fromPanel);
      if (swipe.toPanel) prepareSlideLayer(swipe.toPanel);
      setSlideHeight(main, swipe.fromPanel, swipe.toPanel);
    }

    function applyDragPosition() {
      raf = 0;
      if (!swipe || !swipe.horizontal) return;
      var dx = swipe.dx;
      if (swipe.edge) {
        dx = dx * .28;
        swipe.fromPanel.style.transform = panelX(dx);
        swipe.fromPanel.style.opacity = '1';
        return;
      }
      var width = swipe.width || Math.max(1, main.getBoundingClientRect().width || window.innerWidth || 1);
      var maxDrag = width * .98;
      dx = Math.max(-maxDrag, Math.min(maxDrag, dx));
      swipe.fromPanel.style.transform = panelX(dx);
      swipe.fromPanel.style.opacity = '1';
      swipe.toPanel.style.transform = panelX(swipe.dir * width + dx);
      swipe.toPanel.style.opacity = '1';
    }

    function moveSwipe(x, y, e) {
      if (!swipe) return;
      var rawDx = x - swipe.startX;
      var rawDy = y - swipe.startY;
      var ax = Math.abs(rawDx), ay = Math.abs(rawDy);
      if (!swipe.horizontal && !swipe.vertical) {
        if (ay > 10 && ay > ax * 1.15) { swipe.vertical = true; swipe = null; return; }
        if (ax > 10 && ax > ay * 1.25) {
          swipe.horizontal = true;
          isTabAnimating = true;
        } else {
          return;
        }
      }
      if (!swipe || !swipe.horizontal) return;
      if (e && e.cancelable) e.preventDefault();
      if (rawDx === 0) return;
      prepareDragPanels(rawDx < 0 ? 1 : -1);
      swipe.dx = rawDx;
      trackPoint(x);
      if (!raf) raf = requestAnimationFrame(applyDragPosition);
    }

    function snapSwipe(commit) {
      if (raf) { cancelAnimationFrame(raf); raf = 0; applyDragPosition(); }
      var s = swipe;
      swipe = null;
      if (!s || !s.fromPanel) { isTabAnimating = false; return; }
      var reduceMotion = prefersReducedMotion();
      var duration = reduceMotion ? 0 : 260;
      s.fromPanel.classList.add('slide-anim');
      if (s.toPanel) s.toPanel.classList.add('slide-anim');
      requestAnimationFrame(function () {
        if (commit && s.toPanel) {
          s.fromPanel.style.transform = panelX(-s.dir * s.width);
          s.fromPanel.style.opacity = '1';
          s.toPanel.style.transform = panelX(0);
          s.toPanel.style.opacity = '1';
          tabAnimationTimer = window.setTimeout(function () { settleTab(s.toPanel, s.toName); }, duration + 30);
        } else {
          s.fromPanel.style.transform = panelX(0);
          s.fromPanel.style.opacity = '1';
          if (s.toPanel) {
            s.toPanel.style.transform = panelX(s.dir * s.width);
            s.toPanel.style.opacity = '1';
          }
          tabAnimationTimer = window.setTimeout(function () { settleTab(s.fromPanel, s.fromName, true); }, duration + 30);
        }
      });
    }

    function finishSwipe(x, y) {
      if (!swipe) return;
      moveSwipe(x, y, null);
      if (!swipe || !swipe.horizontal) { swipe = null; isTabAnimating = false; return; }
      var width = swipe.width || Math.max(1, main.getBoundingClientRect().width || window.innerWidth || 1);
      var progress = Math.abs(swipe.dx) / width;
      var velocity = swipeVelocity();
      var velocityMatches = (swipe.dir === 1 && velocity < -.45) || (swipe.dir === -1 && velocity > .45);
      var commit = !swipe.edge && (progress >= .33 || (Math.abs(swipe.dx) > 24 && velocityMatches));
      snapSwipe(commit);
    }

    function cancelSwipe() {
      if (!swipe) return;
      if (swipe.horizontal) snapSwipe(false);
      else { swipe = null; isTabAnimating = false; }
    }

    if (window.PointerEvent && !useTouchEvents) {
      main.addEventListener('pointerdown', function (e) {
        if (swipe && e.pointerId !== swipe.id) { cancelSwipe(); return; }
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        startSwipe(e.clientX, e.clientY, e.target, e.pointerId);
        /* ここでは capture しない：pointerdown 直後に capture すると、
           セット行などボタンへの通常クリックが main に吸われて反応しなくなるため。
           横スワイプと確定した瞬間（下の pointermove）で初めて capture する。 */
      }, { passive: true });
      main.addEventListener('pointermove', function (e) {
        if (!swipe || e.pointerId !== swipe.id) return;
        moveSwipe(e.clientX, e.clientY, e);
        if (swipe && swipe.horizontal && !swipe.captured && main.setPointerCapture) {
          try { main.setPointerCapture(e.pointerId); swipe.captured = true; } catch (err) {}
        }
      }, { passive: false });
      main.addEventListener('pointerup', function (e) {
        if (!swipe || e.pointerId !== swipe.id) return;
        if (main.releasePointerCapture) {
          try { main.releasePointerCapture(e.pointerId); } catch (err) {}
        }
        finishSwipe(e.clientX, e.clientY);
      }, { passive: true });
      main.addEventListener('pointercancel', function (e) {
        if (main.releasePointerCapture) {
          try { main.releasePointerCapture(e.pointerId); } catch (err) {}
        }
        if (!swipe || e.pointerId === swipe.id) cancelSwipe();
      }, { passive: true });
      return;
    }

    if (!useTouchEvents) {
      main.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        startSwipe(e.clientX, e.clientY, e.target, 'mouse');
      }, { passive: true });
      window.addEventListener('mousemove', function (e) {
        if (!swipe || swipe.id !== 'mouse') return;
        moveSwipe(e.clientX, e.clientY, e);
      }, { passive: false });
      window.addEventListener('mouseup', function (e) {
        if (!swipe || swipe.id !== 'mouse') return;
        finishSwipe(e.clientX, e.clientY);
      }, { passive: true });
      return;
    }

    main.addEventListener('touchstart', function (e) {
      if (!e.touches || e.touches.length !== 1) { cancelSwipe(); return; }
      var t = e.touches[0];
      startSwipe(t.clientX, t.clientY, e.target, 'touch');
    }, { passive: true });
    main.addEventListener('touchmove', function (e) {
      if (!swipe) return;
      if (!e.touches || e.touches.length !== 1) { cancelSwipe(); return; }
      var t = e.touches[0];
      moveSwipe(t.clientX, t.clientY, e);
    }, { passive: false });
    main.addEventListener('touchend', function (e) {
      if (!swipe || !e.changedTouches || e.changedTouches.length !== 1) return;
      var t = e.changedTouches[0];
      finishSwipe(t.clientX, t.clientY);
    }, { passive: true });
    main.addEventListener('touchcancel', cancelSwipe, { passive: true });
  }

  /* ローテーション：その場で開閉（同時に開くのは1つ） */
  function toggleSession(k) {
    var b = document.getElementById('rb-' + k), open = b.classList.contains('open');
    document.querySelectorAll('.rot-body.open').forEach(function (x) { x.classList.remove('open'); });
    document.querySelectorAll('.rot-h.open').forEach(function (x) { x.classList.remove('open'); });
    if (!open) { b.classList.add('open'); document.getElementById('rh-' + k).classList.add('open'); }
  }

  /* =========================================================================
     10.5 スクロール演出（v3）
     ・カードが視界に入ったら1回だけ「ふわっと出現」＋中の数字・バー・線を動かす
     ・上端の進捗バー／ヒーロー名の視差は scroll イベント（rAFで間引き）
     ・IntersectionObserver が無い環境や reduced-motion では何もしない（素の表示）
     ========================================================================= */
  var FX = { io: null, on: false };

  /* 数字を0から巻き上げる。最初のテキストノードだけ差し替え（<small>kg等は保持） */
  function countUp(el) {
    if (el.getAttribute('data-fxc')) return;
    el.setAttribute('data-fxc', '1');
    var node = el.firstChild;
    if (!node || node.nodeType !== 3) return;
    var txt = node.nodeValue, m = txt.match(/^(\d+(?:\.\d+)?)/);
    if (!m || !+m[1]) return;
    var target = +m[1], dec = (m[1].split('.')[1] || '').length, t0 = 0;
    function step(ts) {
      if (!t0) t0 = ts;
      var k = Math.min(1, (ts - t0) / 850);
      k = 1 - Math.pow(1 - k, 3);  /* ease-out：最後ほどゆっくり */
      node.nodeValue = (target * k).toFixed(dec);
      if (k < 1) requestAnimationFrame(step); else node.nodeValue = txt;
    }
    requestAnimationFrame(step);
  }

  /* カード出現時：巻き戻しておいたバー・リング・スパークラインを本来の値まで動かす */
  function fxAnimateInside(c) {
    c.querySelectorAll('[data-fxw]').forEach(function (b) {
      b.style.transition = 'width 1s cubic-bezier(.22,.61,.36,1) .15s';
      requestAnimationFrame(function () { b.style.width = b.getAttribute('data-fxw'); });
    });
    c.querySelectorAll('[data-fxo]').forEach(function (p) {
      p.style.transition = 'stroke-dashoffset 1.1s cubic-bezier(.22,.61,.36,1) .1s';
      requestAnimationFrame(function () { p.setAttribute('stroke-dashoffset', p.getAttribute('data-fxo')); });
    });
    c.querySelectorAll('[data-fxd]').forEach(function (p) {
      p.style.transition = 'stroke-dashoffset 1.2s ease .25s';
      requestAnimationFrame(function () { p.style.strokeDashoffset = '0'; });
    });
    c.querySelectorAll('.rv-num, .ib-hc .v, .ib-gauge .gn, .cal-stats .num, .ring .c b, .gv b').forEach(countUp);
  }

  function fxOnEnter(entries) {
    entries.forEach(function (en, i) {
      if (!en.isIntersecting) return;
      var el = en.target;
      FX.io.unobserve(el);  /* 出現は1回だけ */
      el.style.transitionDelay = Math.min(i * 70, 280) + 'ms';  /* 同時に入った分は時間差で */
      el.classList.add('in');
      setTimeout(function () { el.style.transitionDelay = ''; }, 1000);
      fxAnimateInside(el);
    });
  }

  /* カードに .fx を付け、中のバー・リング・線の「到達値」を覚えて0に巻き戻す */
  function fxPrepare(root) {
    if (!FX.on || !root) return;
    root.querySelectorAll('.card, .head-plain').forEach(function (c) {
      if (c.classList.contains('fx')) return;
      c.classList.add('fx');
      c.querySelectorAll('.grow-fill, .seg-fill, .ib-gauge .gtrack i').forEach(function (b) {
        b.setAttribute('data-fxw', b.style.width); b.style.width = '0%';
      });
      c.querySelectorAll('.ring .pr').forEach(function (p) {
        p.setAttribute('data-fxo', p.getAttribute('stroke-dashoffset'));
        p.setAttribute('stroke-dashoffset', p.getAttribute('stroke-dasharray'));
      });
      c.querySelectorAll('.spark path[fill="none"]').forEach(function (p) {
        var L = 0; try { L = p.getTotalLength(); } catch (e) {}
        if (L) { p.style.strokeDasharray = L; p.style.strokeDashoffset = L; p.setAttribute('data-fxd', '1'); }
      });
      FX.io.observe(c);
    });
  }

  function fxSetup() {
    if (prefersReducedMotion() || !('IntersectionObserver' in window)) return;
    FX.on = true;
    FX.io = new IntersectionObserver(fxOnEnter, { rootMargin: '0px 0px -9% 0px', threshold: 0.08 });
    /* 上端の読み進みバー＋トップバーの影＋ヒーロー名の視差（rAFで1フレーム1回に間引く） */
    var sb = document.createElement('div'); sb.id = 'scrollbar'; document.body.appendChild(sb);
    var topbar = document.querySelector('.topbar'), ticking = false;
    function onScroll() {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(function () {
        ticking = false;
        var doc = document.documentElement;
        var max = Math.max(1, doc.scrollHeight - window.innerHeight);
        sb.style.transform = 'scaleX(' + Math.min(1, window.scrollY / max).toFixed(4) + ')';
        topbar.classList.toggle('scrolled', window.scrollY > 6);
        var hn = document.querySelector('.panel.show .hero-name');
        if (hn) {
          /* ヒーロー名だけ少し遅れて動く＝奥行き。動きは最大22pxで控えめに、薄くなって消える */
          var y = Math.min(22, window.scrollY * 0.13);
          hn.style.transform = 'translateY(' + y.toFixed(1) + 'px)';
          hn.style.opacity = Math.max(0.25, 1 - window.scrollY / 480).toFixed(3);
        }
      });
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  /* =========================================================================
     11. 起動
     ========================================================================= */
  runLoad();
  buildNext();
  buildProgram();
  buildLog();
  renderWeekchip();
  setupSwipeTabs();
  fxSetup();
  fxPrepare(document);
  var start = 'next';
  try { start = sessionStorage.getItem('ks_tab') || D.meta.defaultTab || 'next'; } catch (e) { start = D.meta.defaultTab || 'next'; }
  showTab(start);
</script>
