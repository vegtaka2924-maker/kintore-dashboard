<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="manifest" href="card.webmanifest">
<meta name="theme-color" content="#F3EDE2">
<link rel="apple-touch-icon" href="icon-card-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="筋トレ">

<!-- このファイルは土台ページ next-session.html に iframe で埋め込まれる生成り版の表示本体。 -->
<title>筋トレ｜プログラム・今日・記録</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  /* =========================================================================
     デザイン方針（2026-07 モダンカード版）
     ・配色は前の紙面から継承：生成り×オックスブラッド（温かく落ち着いた大人の色）。
     ・レイアウトは新聞ではなくモダンなカードUI（角丸・やわらかい影・余白）。
     ・絵文字は使わない。質はタイポグラフィと余白で出す。
     ・ジムで使う道具として：数字は大きく、タップ範囲は広く。
     ========================================================================= */
  :root {
    --bg: #F3EDE2;             /* 生成りの背景 */
    --card: #FDFBF6;           /* 温かみのある白カード */
    --card2: #F5EFE3;          /* カード内の一段沈んだ面 */
    --border: #E6DDCB;
    --border-hi: #D3C6AD;
    --ink: #2B241B;            /* 温かい黒 */
    --muted: #7A7060;
    --faint: #A99D8A;
    --ox: #7C2A22;             /* オックスブラッド＝筋肉・達成・アクション */
    --ox-deep: #5E1F19;
    --ox-dim: rgba(124, 42, 34, .08);
    --sand: #B08A45;           /* 体脂肪・注意（落ち着いた琥珀） */
    --radius: 18px;
    --shadow: 0 1px 2px rgba(74, 58, 38, .05), 0 6px 20px rgba(74, 58, 38, .08);
    --sans: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    --serif: "Playfair Display", Georgia, serif;   /* 英字・飾り数字用 */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--sans);
    font-size: 15px; line-height: 1.7; font-feature-settings: "tnum" 1;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(86px + env(safe-area-inset-bottom));
  }
  main { touch-action: pan-y; overscroll-behavior-x: contain; position: relative; overflow-x: hidden; }
  .panel { display: none; width: 100%; }
  .panel.show { display: block; }
  .panel.slide-layer { display: block; position: absolute; inset: 0 auto auto 0; width: 100%; backface-visibility: hidden; will-change: transform, opacity; }
  .panel.slide-anim { transition: transform .26s cubic-bezier(.22,.61,.36,1), opacity .26s ease; }
  .sheet-wrap { max-width: 620px; margin: 0 auto; padding: 14px 14px 30px; }

  .kicker { font-family: var(--serif); font-size: 11px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--ox); }
  .kicker .jp { font-family: var(--sans); font-weight: 700; letter-spacing: .08em; color: var(--muted); text-transform: none; }

  /* ---------- 上部ヘッダー（今週の状況つき） ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    background: rgba(243, 237, 226, .88); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .topbar .in { max-width: 620px; margin: 0 auto; height: 52px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand .t { font-family: var(--serif); font-weight: 700; font-size: 18px; letter-spacing: .02em; color: var(--ox); }
  .brand small { font-weight: 700; font-size: 11px; color: var(--muted); }
  .weekchip { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: var(--muted); }
  /* 開いた瞬間の白いチラつきを防ぎながら、本文を短くフェードインする。 */
  @keyframes ks-fadein { from { opacity: 0; } to { opacity: 1; } }
  body { animation: ks-fadein .26s ease both; }
  /* 動きが苦手な設定の端末ではフェードもオフ */
  @media (prefers-reduced-motion: reduce) { body { animation: none; } }
  .weekchip .dots { display: inline-flex; gap: 4px; }
  .weekchip .d { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid var(--ox); box-sizing: border-box; }
  .weekchip .d.on { background: var(--ox); }
  .weekchip b { color: var(--ox); font-weight: 700; }

  /* ---------- カード共通 ---------- */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 16px; margin-top: 14px;
  }

  /* ---------- ヒーロー（今日のセッション） ---------- */
  .hero { padding: 20px 18px; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
  .hero-name { font-family: var(--serif); font-weight: 700; font-size: clamp(38px, 11vw, 50px); line-height: 1.05; letter-spacing: -.005em; margin-top: 8px; color: var(--ox); }
  .hero-sub { font-size: 16px; font-weight: 900; margin-top: 2px; }
  .hero-lede { font-size: 12.5px; color: var(--muted); margin-top: 8px; }
  .hero-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .chip { display: inline-flex; align-items: center; font-size: 12px; font-weight: 700; color: var(--ink);
    background: var(--card2); border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px; }
  .chip.oxc { color: var(--ox); border-color: rgba(124,42,34,.3); background: var(--ox-dim); }

  /* リング（進捗円環） */
  .ring { position: relative; flex-shrink: 0; }
  .ring svg { display: block; transform: rotate(-90deg); }
  .ring .tr { stroke: #E9E0CE; }
  .ring .pr { stroke: var(--ox); stroke-linecap: round; }
  .ring .c { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .c b { font-family: var(--serif); font-weight: 700; font-size: 18px; line-height: 1; color: var(--ink); }
  .ring .c small { font-size: 9px; color: var(--muted); margin-top: 2px; }

  /* 仕上がり予告（折りたたみ） */
  .payoff { margin-top: 14px; border-top: 1px solid var(--border); }
  .payoff summary { list-style: none; cursor: pointer; padding: 10px 0 2px; display: flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 700; color: var(--muted); }
  .payoff summary::-webkit-details-marker { display: none; }
  .payoff summary .chev { color: var(--ox); font-size: 10px; transition: transform .25s; }
  .payoff[open] summary .chev { transform: rotate(180deg); }
  .payoff-item { display: grid; grid-template-columns: auto 1fr; gap: 12px; padding: 8px 0; align-items: baseline; }
  .po-target { font-weight: 900; font-size: 14px; color: var(--ox); white-space: nowrap; }
  .po-text { font-size: 12.5px; color: var(--muted); line-height: 1.65; }

  /* ---------- 今日の進捗（実行モード） ---------- */
  .run { padding: 14px 16px; }
  .run-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .run-head .t { font-size: 12px; font-weight: 700; color: var(--muted); }
  .run-head b { font-family: var(--sans); font-weight: 800; font-size: 13px; white-space: nowrap; }
  .run-head b small { font-family: var(--sans); font-size: 12px; color: var(--muted); font-weight: 500; margin-left: 2px; }
  .run-bar { height: 9px; border-radius: 99px; background: var(--card2); border: 1px solid var(--border); overflow: hidden; margin-top: 10px; }
  .run-fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, #9A3A2E, var(--ox));
    transition: width .35s cubic-bezier(.22,.61,.36,1); }
  .run.complete { background: var(--ox); border-color: var(--ox-deep); }
  .run.complete .t, .run.complete b, .run.complete b small { color: #F6E9E0; }
  .run.complete .run-bar { background: rgba(0,0,0,.18); border-color: transparent; }
  .run.complete .run-fill { background: #F3EDE2; }
  .run-msg { display: none; font-size: 13px; font-weight: 700; color: #F6E9E0; margin-top: 8px; }
  .run.complete .run-msg { display: block; }
  .run-actions { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .copybtn { border: 1px solid var(--ox); background: none; color: var(--ox); font-family: var(--sans);
    font-size: 12.5px; font-weight: 700; border-radius: 99px; padding: 8px 16px; cursor: pointer; }
  .copybtn:disabled { border-color: var(--border-hi); color: var(--faint); }
  .copybtn:not(:disabled):active { background: var(--ox); color: #F6E9E0; }
  .run.complete .copybtn { border-color: #F3EDE2; color: #F6E9E0; }
  .copy-note { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .run.complete .copy-note { color: #EBD9CE; }

  /* ---------- コーチ（kaikaiくん）カード ---------- */
  .coach { display: flex; gap: 12px; align-items: flex-start; }
  .coach-av { flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%; overflow: hidden;
    border: 2px solid var(--ox); background: var(--card2); }
  .coach-av img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .coach-bubble { flex: 1; min-width: 0; }
  .coach-name { font-family: var(--serif); font-size: 11px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; color: var(--ox); margin-bottom: 6px; }
  .coach-bubble p { font-size: 13.5px; line-height: 1.85; color: var(--ink); }
  .coach-bubble p b { color: var(--ox); font-weight: 700; }
  .coach-bubble p + p { margin-top: 10px; }
  .coach-bubble .coach-h { color: var(--ox); font-weight: 700; font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; margin-top: 13px; }
  .coach-bubble .coach-h::before { content: "— "; }
  .coach-bubble .coach-h + p { margin-top: 3px; }
  .coach-exercise-list { margin-top: 14px; border-top: 1px solid var(--border); }
  .coach-exercise { padding-top: 10px; }
  .coach-exercise + .coach-exercise { margin-top: 10px; border-top: 1px solid var(--border); }
  .coach-exercise-name { color: var(--ox); font-size: 11px; font-weight: 700; letter-spacing: .08em; }
  .coach-exercise p { margin-top: 2px; }

  /* ---------- 種目カード ---------- */
  .ex { padding: 16px; }
  .ex-head { display: flex; align-items: flex-start; gap: 12px; }
  .ex-no { font-family: var(--serif); font-weight: 700; font-size: 15px; color: var(--ox);
    background: var(--ox-dim); border: 1px solid rgba(124,42,34,.22); border-radius: 10px;
    min-width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ex-titles { flex: 1; min-width: 0; }
  .ex-name { font-size: 17.5px; font-weight: 900; line-height: 1.35; }
  .ex-tag { display: inline-block; margin-top: 3px; font-size: 10.5px; font-weight: 700; letter-spacing: .1em; color: var(--muted); }
  .ex-priority { display: inline-block; margin: 4px 7px 0 0; padding: 2px 8px; border-radius: 99px;
    font-size: 10px; font-weight: 800; letter-spacing: .08em; }
  .ex-priority.core { color: #F8F1E8; background: var(--ox); }
  .ex-priority.support { color: var(--ox); background: var(--ox-dim); border: 1px solid rgba(124,42,34,.2); }
  .ex-priority.optional { color: var(--muted); background: var(--card2); border: 1px solid var(--border); }
  .ex-last { margin-top: 10px; font-size: 12px; color: var(--muted); background: var(--card2);
    border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; line-height: 1.6; }
  .ex-last .lbl { font-family: var(--serif); font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ox); margin-right: 7px; }
  .ex-last b { color: var(--ink); font-weight: 700; }
  .ex-last .beat { display: inline-block; color: var(--ox); font-weight: 700; font-size: 11px; margin-left: 6px; }

  /* セット行（タップで完了チェック） */
  .sets { margin-top: 12px; }
  .set-line { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 6px; align-items: stretch; }
  .set { width: 100%; display: grid; grid-template-columns: 26px 44px 1fr auto; align-items: center; gap: 10px;
    padding: 11px 4px; border: 0; border-bottom: 1px solid var(--border); background: none; color: var(--ink);
    font-family: var(--sans); font-size: 15.5px; text-align: left; cursor: pointer; border-radius: 10px;
    transition: background .15s; }
  .set:active { background: var(--card2); }
  .s-check { width: 23px; height: 23px; border-radius: 50%; border: 2px solid var(--border-hi);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900;
    color: transparent; transition: all .18s; flex-shrink: 0; background: #fff; }
  .s-label { font-size: 11.5px; font-weight: 700; letter-spacing: .07em; color: var(--muted); }
  .s-label.warm { color: var(--faint); }
  .s-main { font-weight: 500; min-width: 0; }
  .s-main .x { color: var(--faint); font-weight: 400; padding: 0 2px; }
  .s-main .reps { color: var(--muted); font-weight: 400; font-size: 14px; }
  .s-main .accent { color: var(--ox); font-weight: 800; letter-spacing: .04em; font-size: 14px; }
  .s-w { color: var(--ink); font-weight: 800; font-size: 16px; }
  .s-w.plate { text-decoration: underline dotted var(--faint) 1.5px; text-underline-offset: 4px; }
  .s-rest { font-size: 11px; color: var(--faint); white-space: nowrap; font-weight: 500; }
  .set.done .s-check { background: var(--ox); border-color: var(--ox); color: #F6E9E0; }
  .set.done .s-main, .set.done .s-label, .set.done .s-rest { opacity: .45; }
  .set.done { background: rgba(124,42,34,.04); }
  .set.skipped { background: var(--card2); }
  .set.skipped .s-check { border-color: var(--border-hi); color: var(--muted); background: transparent; }
  .set.skipped .s-main, .set.skipped .s-label, .set.skipped .s-rest { opacity: .38; text-decoration: line-through; }
  /* 余力セットは、未実施でも完遂率を下げない。見た目でも「義務ではない」と分かるようにする。 */
  .set.optional-set { background: rgba(176,138,69,.05); }
  .set.optional-set .s-label { color: #8A6A32; }
  .set-skip { min-width: 52px; border: 1px solid var(--border); border-radius: 10px; background: none;
    color: var(--muted); font: 700 10px var(--sans); padding: 0 7px; cursor: pointer; }
  .set-skip.active { border-color: var(--ox); color: var(--ox); background: var(--ox-dim); }
  .set-add { width: 100%; margin-top: 8px; min-height: 42px; border: 1px dashed var(--border-hi); border-radius: 12px;
    background: none; color: var(--ox); font: 700 12px var(--sans); cursor: pointer; }

  /* 実績の記録（チェックすると現れる。回数だけでも入れておくと転記が楽） */
  .act { display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin: 2px 4px 6px 36px; padding: 7px 10px; background: var(--card2);
    border: 1px solid var(--border); border-radius: 12px; font-size: 12.5px; color: var(--muted); }
  .act[hidden] { display: none; }
  .act .k { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; color: var(--ox); }
  .stp { display: inline-flex; align-items: center; gap: 2px; }
  .stp button { width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--border-hi); background: #fff;
    color: var(--ink); font-size: 16px; line-height: 1; cursor: pointer; font-family: var(--sans); }
  .stp button:active { background: var(--ox); color: #fff; border-color: var(--ox); }
  .stp b { min-width: 56px; text-align: center; font-size: 14px; font-weight: 800; color: var(--ink); }
  .stp b.empty { color: var(--faint); font-weight: 500; }
  /* 実績の数値はタップで手入力できる（点線＝タップできる合図）。＋/−も併用できる。 */
  .stp b.val { cursor: pointer; border-bottom: 1px dashed var(--border-hi); }
  .stp b.val:active { color: var(--ox); border-color: var(--ox); }
  .stp .val-input { width: 60px; height: 30px; box-sizing: border-box; text-align: center;
    font-size: 14px; font-weight: 800; color: var(--ink); background: #fff;
    border: 1px solid var(--ox); border-radius: 9px; padding: 0 2px; -moz-appearance: textfield; }
  .stp .val-input::-webkit-outer-spin-button, .stp .val-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  /* メニュー変更メモ欄（器具が空かず種目を変えた等を自由記入。コピー文にも入る） */
  .run-memo { display: block; width: 100%; box-sizing: border-box; margin-top: 12px; resize: vertical;
    font-family: inherit; font-size: 13px; line-height: 1.5; color: var(--ink); background: var(--card2);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px; min-height: 42px; }
  .run-memo::placeholder { color: var(--faint); }
  .run-memo:focus { outline: none; border-color: var(--ox); }
  .act .x2 { color: var(--faint); }
  @media (max-width: 370px) { .act { margin-left: 0; } }

  /* スーパーセットの流れ */
  .ss-flow { margin-top: 12px; padding: 12px 14px; border: 1px solid var(--border-hi); border-radius: 14px; background: var(--card2); }
  .ss-flow .step { font-weight: 800; font-size: 14px; }
  .ss-flow .arrow { display: block; font-size: 11px; letter-spacing: .08em; color: var(--ox); margin: 4px 0; }
  .subhead { margin: 14px 0 0; font-size: 11px; font-weight: 700; letter-spacing: .1em; color: var(--ox); }

  /* なぜ・コツ（折りたたみ） */
  .ex-fold { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .fold { flex: 1; min-width: 100%; }
  .fold summary { list-style: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 700; color: var(--muted); background: var(--card2);
    border: 1px solid var(--border); border-radius: 99px; padding: 5px 13px; }
  .fold summary::-webkit-details-marker { display: none; }
  .fold summary .chev { font-size: 9px; color: var(--ox); transition: transform .25s; }
  .fold[open] summary { color: var(--ink); border-color: var(--border-hi); }
  .fold[open] summary .chev { transform: rotate(180deg); }
  .fold .fold-body { font-size: 12.5px; line-height: 1.85; color: var(--muted); padding: 10px 4px 2px; }
  .fold .fold-body b { color: var(--ink); }
  .fold.tip .fold-body { border-left: 2px solid var(--ox); padding-left: 12px; color: var(--ink); opacity: .85; }

  /* ---------- 前回の記録 ---------- */
  .colophon .colo-hl { font-size: 13.5px; line-height: 1.8; margin-top: 8px; }
  .colophon .next { margin-top: 12px; padding-top: 11px; border-top: 1px solid var(--border); font-size: 12.5px; color: var(--muted); }
  .colophon .next b { color: var(--ox); font-weight: 700; }

  /* ---------- プログラムタブ ---------- */
  .head-plain { padding: 16px 4px 2px; }
  .head-plain h1 { font-weight: 900; font-size: 26px; line-height: 1.2; margin-top: 6px; }
  .head-plain .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .bigring-card { display: flex; align-items: center; gap: 18px; }
  .bigring-copy { flex: 1; min-width: 0; }
  .bigring-copy .ph { font-family: var(--serif); font-size: 11.5px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ox); }
  .bigring-copy p { font-size: 13px; line-height: 1.8; color: var(--muted); margin-top: 5px; }
  .bigring-copy p b { color: var(--ink); }

  .pm-track { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
  .pm-phase { min-height: 76px; padding: 10px 10px 8px; border-radius: 14px; border: 1px solid var(--border); background: var(--card2); }
  .pm-phase.done { opacity: .7; }
  .pm-phase.now { border-color: rgba(124,42,34,.45); background: #FBF3EC; }
  .pm-phase .num { font-family: var(--serif); font-weight: 700; font-size: 13px; color: var(--muted); }
  .pm-phase.now .num { color: var(--ox); }
  .pm-phase.done .num::after { content: " ✓"; color: var(--ox); }
  .pm-phase .name { display: block; font-size: 12.5px; font-weight: 700; line-height: 1.4; margin-top: 3px; }
  .pm-phase .range { display: block; font-size: 10px; color: var(--faint); margin-top: 3px; }
  .pm-next { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; padding-top: 13px; border-top: 1px solid var(--border); }
  .pm-next-item .k { display: block; font-family: var(--serif); font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ox); margin-bottom: 3px; }
  .pm-next-item .v { font-size: 12.5px; line-height: 1.7; color: var(--muted); }
  .pm-next-item .v b { color: var(--ink); }
  @media (max-width: 420px) { .pm-next { grid-template-columns: 1fr; } }

  /* ローテーション（アコーディオン） */
  .rot-card { padding: 6px 16px 10px; }
  .rot-h { width: 100%; display: flex; align-items: center; gap: 10px; border: 0; border-bottom: 1px solid var(--border);
    background: none; cursor: pointer; padding: 15px 2px; text-align: left; color: var(--ink); font-family: var(--sans); }
  .rot-h .ord { font-family: var(--serif); font-weight: 700; font-size: 12px; color: var(--faint); min-width: 16px; }
  .rot-h .rn { flex: 1; font-family: var(--serif); font-weight: 700; font-size: 17px; }
  .rot-h .rj { font-family: var(--sans); font-weight: 500; font-size: 12px; color: var(--muted); margin-left: 8px; }
  .rot-h .rmark { font-size: 10px; font-weight: 700; letter-spacing: .1em; color: #F6E9E0; background: var(--ox); padding: 2px 9px; border-radius: 99px; }
  .rot-h .chev { color: var(--ox); font-size: 11px; transition: transform .3s; }
  .rot-h.open .chev { transform: rotate(180deg); }
  .rot-body { max-height: 0; overflow: hidden; transition: max-height .4s ease; border-bottom: 1px solid var(--border); }
  .rot-body.open { max-height: 9000px; }
  .rot-body .inner { padding: 4px 0 18px; }
  .acc-lede { font-size: 12.5px; color: var(--muted); margin: 6px 0 2px; }
  .rot-body .card, .rot-body .ex { box-shadow: none; border-color: var(--border); }

  /* 主要種目の伸び（バー付き） */
  .grow-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .grow-row:last-child { border-bottom: none; padding-bottom: 4px; }
  .grow-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .gl { font-size: 14px; font-weight: 700; }
  .gv { font-size: 13.5px; white-space: nowrap; }
  .gv .from { color: var(--faint); font-size: 12px; }
  .gv b { font-family: var(--serif); font-weight: 700; font-size: 16.5px; }
  .gv .up { color: var(--ox); font-weight: 800; font-size: 12px; margin-left: 5px; }
  .grow-bar { height: 6px; border-radius: 99px; background: var(--card2); border: 1px solid var(--border); overflow: hidden; margin-top: 8px; }
  .grow-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #9A3A2E, var(--ox)); }

  /* PRボード */
  .rec-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .rec-row:last-child { border-bottom: none; padding-bottom: 4px; }
  .rec-l .rl-name { font-size: 14.5px; font-weight: 700; }
  .rec-l .rl-new { font-family: var(--serif); font-size: 9px; font-weight: 700; letter-spacing: .12em; color: #F6E9E0; background: var(--ox); padding: 2px 8px; border-radius: 99px; margin-left: 7px; vertical-align: 2px; }
  .rec-l .rl-date { font-size: 10.5px; color: var(--faint); margin-top: 2px; }
  .rec-l .rl-e1rm { font-size: 10.5px; color: var(--muted); margin-top: 1px; font-weight: 500; }
  .rec-v { text-align: right; white-space: nowrap; }
  .rec-v .rv-num { font-family: var(--serif); font-weight: 700; font-size: 23px; color: var(--ox); }
  .rec-v .rv-num small { font-family: var(--sans); font-size: 11px; color: var(--muted); font-weight: 500; margin-left: 2px; }
  .rec-v .rv-reps { display: block; font-size: 11px; color: var(--muted); }

  /* ---------- InBody（体組成）セクション ---------- */
  /* C案のビフォー→アフター見出し（開始 →◯ヶ月→ 最新） */
  .ib-head { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .ib-head .then { font-family: var(--serif); font-size: 13px; color: var(--faint); }
  .ib-head .ar { flex: 1; height: 1px; background: var(--border-hi); position: relative; }
  .ib-head .ar::after { content: ""; position: absolute; right: 0; top: -3px; border: 4px solid transparent; border-left-color: var(--border-hi); }
  .ib-head .span { font-family: var(--serif); font-weight: 700; font-size: 16px; color: var(--ox); }
  .ib-head .now { font-family: var(--serif); font-weight: 700; font-size: 14px; color: var(--ink); }
  /* 主指標2枚 */
  .ib-heroes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .ib-hc { position: relative; border: 1px solid var(--border); border-radius: 14px; padding: 12px 12px 10px; overflow: hidden; background: var(--card2); }
  .ib-hc::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .ib-hc.m::before { background: var(--ox); }
  .ib-hc.f::before { background: var(--sand); }
  .ib-hc .l { font-size: 11px; color: var(--muted); font-weight: 700; }
  .ib-hc .v { font-family: var(--serif); font-weight: 700; font-size: 34px; line-height: 1; margin-top: 3px; }
  .ib-hc .v small { font-family: var(--sans); font-size: 12px; color: var(--muted); font-weight: 500; margin-left: 2px; }
  .ib-hc .bd { display: inline-block; font-size: 10.5px; font-weight: 700; border-radius: 99px; padding: 2px 8px; margin-top: 6px; }
  .ib-hc .bd.good { background: var(--ox); color: #F6E9E0; }
  .ib-hc .bd.bad { background: #EFE3CE; color: #8A6A2A; }
  .ib-hc .bd.flat { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .ib-hc .fromstart { font-size: 10.5px; color: var(--muted); margin-top: 5px; }
  .ib-hc .fromstart b { font-weight: 700; }
  .ib-hc .fromstart b.good { color: var(--ox); }
  .ib-hc .fromstart b.bad { color: var(--sand); }
  .ib-hc .fromstart b.flat { color: var(--muted); }
  .ib-hc .spark { margin-top: 6px; height: 32px; }
  .ib-hc .spark svg { width: 100%; height: 32px; display: block; }
  /* サブ帯 */
  .ib-band { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 12px; }
  .ib-band > div { background: var(--card2); padding: 9px 11px; }
  .ib-band .k { font-size: 10px; color: var(--muted); }
  .ib-band .v { font-family: var(--serif); font-weight: 600; font-size: 18px; margin-top: 1px; }
  .ib-band .v small { font-family: var(--sans); font-size: 10px; color: var(--muted); margin-left: 1px; }
  .ib-band .fs { font-size: 9.5px; color: var(--faint); margin-top: 1px; }
  /* 点数ゲージ */
  .ib-gauge { display: flex; align-items: center; gap: 14px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .ib-gauge .gn { font-family: var(--serif); font-weight: 700; font-size: 34px; line-height: 1; color: var(--ox); }
  .ib-gauge .gn small { font-family: var(--sans); font-size: 12px; color: var(--muted); font-weight: 500; }
  .ib-gauge .gb { flex: 1; min-width: 0; }
  .ib-gauge .gt { font-size: 11px; font-weight: 700; color: var(--muted); }
  .ib-gauge .gtrack { position: relative; height: 9px; border-radius: 99px; background: var(--card); border: 1px solid var(--border); margin-top: 10px; }
  .ib-gauge .gtrack i { display: block; height: 100%; border-radius: 99px; background: var(--ox); }
  .ib-gauge .gtrack b { position: absolute; top: -4px; width: 2px; height: 16px; background: var(--border-hi); }
  .ib-gauge .gtrack b span { position: absolute; top: -13px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 9px; color: var(--muted); }
  /* 推移（折りたたみ） */
  .ib-trend { margin-top: 12px; border-top: 1px solid var(--border); }
  .ib-trend summary { list-style: none; cursor: pointer; padding: 11px 0 2px; font-size: 12px; font-weight: 700; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .ib-trend summary::-webkit-details-marker { display: none; }
  .ib-trend summary .chev { font-size: 9px; color: var(--ox); transition: transform .25s; }
  .ib-trend[open] summary .chev { transform: rotate(180deg); }
  .ib-legend { display: flex; gap: 16px; margin-top: 8px; font-size: 11px; color: var(--muted); }
  .ib-sw { display: inline-block; width: 14px; height: 3px; border-radius: 2px; vertical-align: 3px; margin-right: 5px; }

  /* 部位別の成長 */
  .seg-row { display: grid; grid-template-columns: 52px 1fr auto; gap: 10px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .seg-row:last-child { border-bottom: none; padding-bottom: 4px; }
  .seg-name { font-size: 13px; font-weight: 700; }
  .seg-bar { height: 7px; border-radius: 99px; background: var(--card2); border: 1px solid var(--border); overflow: hidden; }
  .seg-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #9A3A2E, var(--ox)); }
  .seg-v { font-size: 12px; white-space: nowrap; text-align: right; }
  .seg-v .from { color: var(--faint); font-size: 11px; }
  .seg-v b { font-weight: 800; }
  .seg-v .up { color: var(--ox); font-weight: 800; font-size: 11px; margin-left: 4px; }
  .seg-note { font-size: 10.5px; color: var(--faint); margin-top: 10px; line-height: 1.6; }

  /* About */
  .about-item { padding: 11px 0; border-bottom: 1px solid var(--border); }
  .about-item:last-child { border-bottom: none; padding-bottom: 4px; }
  .ai-h { font-weight: 700; font-size: 13.5px; color: var(--ox); display: block; margin-bottom: 2px; }
  .ai-p { font-size: 12.5px; line-height: 1.8; color: var(--muted); }

  .card > .kicker { display: block; margin-bottom: 6px; }

  /* ---------- 記録タブ（カレンダー） ---------- */
  .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .cal-nav button { border: 0; background: none; cursor: pointer; color: var(--ox); font-size: 24px; line-height: 1; padding: 2px 14px; }
  .cal-nav .mlabel { font-weight: 900; font-size: 18px; }
  .cal-nav .mlatin { font-family: var(--serif); font-style: italic; font-size: 12px; color: var(--muted); margin-left: 7px; }
  .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 14px; font-size: 10px; text-align: center; color: var(--faint); }
  .cal-dow .sun { color: #B96A5E; }
  .cal-dow .sat { color: #6E88A0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 5px; }
  .cal-cell { position: relative; aspect-ratio: 1; min-height: 42px; display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-weight: 600; font-size: 14px; border-radius: 10px; color: var(--faint); }
  .cal-cell.went { background: #F0DFD4; color: var(--ox-deep); cursor: pointer; }
  .cal-cell.today { outline: 2px solid var(--ox); outline-offset: -2px; }
  .cal-cell.sel { background: var(--ox); color: #F6E9E0; }
  .cal-cell.sel .part { color: #EBD9CE; }
  .cal-cell .part { position: absolute; top: 3px; right: 5px; font-family: var(--sans); font-size: 8.5px; color: #9C5A50; }
  .cal-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 14px; font-size: 10.5px; color: var(--muted); }
  .cal-legend .sw { width: 13px; height: 13px; border-radius: 4px; display: inline-block; vertical-align: -2px; margin-right: 5px; box-sizing: border-box; }
  .cal-stats { display: flex; gap: 26px; margin-top: 14px; padding-top: 13px; border-top: 1px solid var(--border); }
  .cal-stats .num { font-family: var(--serif); font-size: 25px; font-weight: 700; color: var(--ox); line-height: 1.1; }
  .cal-stats .lbl2 { font-size: 10.5px; color: var(--muted); }
  .cal-week { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 11.5px; color: var(--muted); }
  .cal-week .dots { display: inline-flex; gap: 4px; }
  .cal-week .dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--ox); box-sizing: border-box; }
  .cal-week .dot.on { background: var(--ox); }
  .cal-week .left { color: var(--ox); font-weight: 700; }

  /* その日の記録 */
  .cal-det-head { display: flex; align-items: baseline; gap: 12px; padding-bottom: 9px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .cal-det-date { font-family: var(--serif); font-weight: 700; font-size: 27px; color: var(--ox); line-height: 1; }
  .cal-det-name { font-weight: 700; font-size: 15.5px; }
  .cal-det-hl { font-size: 13px; line-height: 1.75; margin-bottom: 6px; }
  .cal-det-none { font-size: 12.5px; color: var(--muted); padding: 2px 0; }
  .log-detail { font-size: 12.5px; line-height: 1.9; color: var(--muted); }
  #cal-detail .coach { background: var(--card2); border-radius: 14px; padding: 12px 14px; margin-top: 12px; border: 1px solid var(--border); box-shadow: none; }

  /* ---------- 下タブバー ---------- */
  .tabbar { position: fixed; left: 0; right: 0; bottom: 0; display: flex; z-index: 50;
    background: rgba(250, 246, 238, .92); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); }
  .tabbar button { flex: 1; border: 0; background: none; color: var(--faint); cursor: pointer;
    padding: 9px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: var(--sans); position: relative; }
  .tabbar button .lbl { font-size: 10.5px; letter-spacing: .05em; font-weight: 700; }
  .tabbar button.active { color: var(--ox); }
  .tabbar button.active::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 34px; height: 3px; border-radius: 0 0 4px 4px; background: var(--ox); }
  .tabbar svg { display: block; }

  /* ---------- レストタイマー（タブバー上に浮く） ---------- */
  .rest { position: fixed; left: 12px; right: 12px; bottom: calc(64px + env(safe-area-inset-bottom)); z-index: 55;
    max-width: 596px; margin: 0 auto; border-radius: 16px; overflow: hidden;
    background: rgba(253, 251, 246, .97); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(124,42,34,.45); box-shadow: 0 10px 30px rgba(74, 58, 38, .25); }
  .rest[hidden] { display: none; }
  .rest-fill { position: absolute; inset: 0 auto 0 0; width: 0%; background: rgba(124,42,34,.09); transition: width .3s linear; }
  .rest-body { position: relative; display: flex; align-items: center; gap: 12px; padding: 11px 14px; }
  .rest-t { font-weight: 900; font-size: 26px; line-height: 1; color: var(--ox); min-width: 84px; letter-spacing: .01em; }
  .rest-info { flex: 1; min-width: 0; }
  .rest-lbl { display: block; font-size: 11px; color: var(--muted); line-height: 1.45; }
  .rest-btns { display: flex; gap: 8px; }
  .rest-btns button { border: 1px solid var(--border-hi); background: #fff; color: var(--ink);
    font-family: var(--sans); font-size: 12px; font-weight: 700; border-radius: 10px; padding: 8px 12px; cursor: pointer; }
  .rest-btns button:active { transform: scale(.95); }
  .rest.over { border-color: var(--ox); background: #FBF1E9; }

  /* ---------- プレート計算シート ---------- */
  .veil { position: fixed; inset: 0; z-index: 70; background: rgba(43, 36, 27, .35); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    display: flex; align-items: flex-end; justify-content: center; }
  .veil[hidden] { display: none; }
  .psheet { width: 100%; max-width: 620px; background: var(--card);
    border: 1px solid var(--border-hi); border-bottom: none; border-radius: 24px 24px 0 0;
    padding: 10px 20px calc(24px + env(safe-area-inset-bottom)); animation: sheetup .25s cubic-bezier(.22,.61,.36,1);
    box-shadow: 0 -8px 30px rgba(74,58,38,.2); }
  @keyframes sheetup { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .psheet .grip { width: 42px; height: 4px; border-radius: 99px; background: var(--border-hi); margin: 4px auto 14px; }
  .psheet .pw { font-family: var(--serif); font-weight: 700; font-size: 40px; line-height: 1; margin-top: 4px; color: var(--ox); }
  .psheet .pw small { font-family: var(--sans); font-size: 15px; color: var(--muted); font-weight: 500; }
  .plates-v { display: flex; align-items: center; gap: 3px; margin: 18px 0 6px; min-height: 64px; }
  .plates-v .barend { width: 26px; height: 9px; border-radius: 3px; background: #8B8070; }
  .plates-v .collar { width: 7px; height: 17px; border-radius: 2px; background: #8B8070; }
  .plates-v .pl { border-radius: 5px; background: linear-gradient(180deg, #9A3A2E, var(--ox-deep)); color: #F6E9E0;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; width: 24px; }
  .psheet .prow { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-top: 1px solid var(--border); font-size: 13.5px; }
  .psheet .prow b { font-weight: 800; font-size: 15.5px; }
  .psheet .prow .warn { color: var(--sand); font-size: 12px; }
  .psheet .pnote { font-size: 11.5px; color: var(--faint); margin-top: 10px; line-height: 1.7; }

  /* ---------- スクロール演出（v3・2026-07 追加） ----------
     方針：飾りではなく「読み進みに画面が呼応する」ためのもの。
     ・出現は1要素1回だけ（うるさくしない）
     ・JSが動かない環境・reduced-motion設定では、素の表示のまま何も起きない */
  #scrollbar { position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 60;
    background: linear-gradient(90deg, #9A3A2E, var(--ox), var(--ox-deep));
    transform-origin: 0 50%; transform: scaleX(0); pointer-events: none; }
  .fx { opacity: 0; transform: translateY(18px); }
  .fx.in { opacity: 1; transform: none;
    transition: opacity .65s cubic-bezier(.22,.61,.36,1), transform .65s cubic-bezier(.22,.61,.36,1); }
  .topbar { transition: box-shadow .35s; }
  .topbar.scrolled { box-shadow: 0 8px 24px rgba(74, 58, 38, .12); }
  .hero-name { will-change: transform; }

  @media (prefers-reduced-motion: reduce) {
    .panel.slide-anim, .run-fill, .rest-fill { transition: none; }
    .psheet { animation: none; }
    .fx { opacity: 1; transform: none; }
    #scrollbar { display: none; }
  }

  /* 折りたたみスマホ（閉じた縦長画面）向け微調整 */
  @media (max-width: 370px) {
    .set { grid-template-columns: 24px 38px 1fr auto; gap: 8px; font-size: 14.5px; }
    .s-w { font-size: 15px; }
    .weekchip .wk-t { display: none; }
    .ib-grid { grid-template-columns: 1fr 1fr; }
  }
  /* 折りたたみスマホ（開いた大画面） */
  @media (min-width: 760px) {
    .sheet-wrap { max-width: 720px; }
  }
</style>
</head>
<body>

<header class="topbar"><div class="in">
  <div class="brand"><span class="t">GAINS</span><small>筋トレ</small></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="weekchip" id="weekchip"></div>
  </div>
</div></header>

<main>
  <section id="tab-program" class="panel"><div class="sheet-wrap" id="prog-sheet"></div></section>
  <section id="tab-next" class="panel"><div class="sheet-wrap" id="next-sheet"></div></section>
  <section id="tab-log" class="panel"><div class="sheet-wrap" id="log-sheet"></div></section>
</main>

<!-- レストタイマー：セット完了で自動起動。Date.now() 基準なので画面を消してもズレない -->
<div class="rest" id="rest" hidden>
  <div class="rest-fill" id="restFill"></div>
  <div class="rest-body">
    <div class="rest-t" id="restT">0:00</div>
    <div class="rest-info"><span class="rest-lbl" id="restLbl">休憩中</span></div>
    <div class="rest-btns">
      <button id="restAdd">+30秒</button>
      <button id="restStop">終了</button>
    </div>
  </div>
</div>

<!-- プレート計算シート：バーベル種目の重量タップで開く -->
<div class="veil" id="veil" hidden>
  <div class="psheet" id="psheet">
    <div class="grip"></div>
    <span class="kicker">Plate Math <span class="jp">・ プレート内訳</span></span>
    <div class="pw" id="pwTotal">75<small>kg</small></div>
    <div class="plates-v" id="platesV"></div>
    <div id="plateRows"></div>
    <p class="pnote">片側ずつ同じ枚数を付けます。ジムに無い枚数のときは、近い組み合わせに読み替えてください。</p>
  </div>
</div>

<nav class="tabbar">
  <button data-tab="program" onclick="showTab('program')" aria-label="プログラム">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4.5V3h6v1.5"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    <span class="lbl">プログラム</span>
  </button>
  <button data-tab="next" onclick="showTab('next')" aria-label="今日">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M7 8v8M4.5 9.5v5M17 8v8M19.5 9.5v5M7 12h10"/></svg>
    <span class="lbl">今日</span>

    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><line x1="4" y1="10" x2="20" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/><path d="M9 15l2 2 4-4"/></svg>
    <span class="lbl">記録</span>
  </button>
