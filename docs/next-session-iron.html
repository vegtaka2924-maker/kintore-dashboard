<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0C0D0E">

<link rel="manifest" href="card.webmanifest">
<link rel="apple-touch-icon" href="icon-card-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="筋トレ">

<!-- このファイルは土台ページ next-session.html に iframe で埋め込まれる「鉄（IRON GAUGE）スキン」。
     最新化（先読みリロード）とデザイン切替は土台ページ側がまとめて担当するので、ここには置かない。
     ※単体で直接開いても動くよう、下のトグルには土台ページへ戻すフォールバックを入れてある。 -->
<title>筋トレ｜IRON GAUGE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  /* =========================================================================
     デザイン提案A「IRON GAUGE ── 深夜のパワーラック」
     ・世界観：消灯後のジム。黒鉄（グラファイト）のプレートに、チョークの白と
       セーフティオレンジ（工事現場・バンパープレートの警告色）だけが浮かぶ。
     ・タイポ：見出しは Anton（陸上ポスターの縦長活字）、数字は Barlow Condensed
       （計器の等幅数字）、本文は Noto Sans JP。紫グラデ・ガラス風は一切使わない。
     ・レイアウトの律動：カードではなく「計器盤のパネル」。細い鋼色の罫線＋
       四隅のブラケット＋ハザードテープ（斜めストライプ）が章の区切り。
     ・ジムで使う道具として：黒地×チョーク白は照明ギラつきでも読める最強コントラスト。
       重量数字は最大サイズ、タップ行は高さ52px以上。
     ========================================================================= */
  :root {
    --bg: #0C0D0E;        /* 黒鉄（ほぼ黒のグラファイト） */
    --panel: #141618;     /* 一段浮いたパネル面 */
    --panel2: #1B1E21;    /* パネル内のさらに一段 */
    --line: #2A2E33;      /* 鋼色の罫線 */
    --line-hi: #3A4046;
    --chalk: #EFEAE0;     /* チョークの白（純白より目に優しい） */
    --dim: #8F8A80;       /* 補足テキスト */
    --faint: #5C5952;     /* さらに淡い */
    --org: #FF5C1A;       /* セーフティオレンジ＝力・達成・アクション */
    --org-soft: rgba(255, 92, 26, .12);
    --amber: #FFB02E;     /* ウォームアップ・注意 */
    --disp: "Anton", "Noto Sans JP", sans-serif;                 /* ポスター見出し */
    --num: "Barlow Condensed", "Noto Sans JP", sans-serif;       /* 計器の数字 */
    --sans: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    background: var(--bg); color: var(--chalk); font-family: var(--sans);
    font-size: 15px; line-height: 1.75; font-feature-settings: "tnum" 1;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(76px + env(safe-area-inset-bottom));
    overflow-x: hidden;   /* ヒーロー背後のゴースト文字（巨大）で横スクロールが生まれないように */
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 14px 40px; }
  .view { display: none; }
  .view.show { display: block; }

  /* ---------- 上部：読み進みゲージ（スクロール連動の背骨） ---------- */
  #sbar { position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 90;
    background: var(--org); transform-origin: 0 50%; transform: scaleX(0); pointer-events: none; }

  /* ---------- トップバー ---------- */
  .topbar { position: sticky; top: 0; z-index: 80;
    background: rgba(12, 13, 14, .92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line); }
  .topbar .in { max-width: 560px; margin: 0 auto; height: 50px; padding: 0 16px;
    display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand .t { font-family: var(--disp); font-size: 17px; letter-spacing: .06em; color: var(--chalk); }
  .brand .t i { font-style: normal; color: var(--org); }
  .brand small { font-size: 10px; font-weight: 700; letter-spacing: .2em; color: var(--dim); }
  .weekbox { display: flex; align-items: center; gap: 8px; font-family: var(--num); font-weight: 600;
    font-size: 12.5px; letter-spacing: .08em; color: var(--dim); text-transform: uppercase; }
  .weekbox .cells { display: inline-flex; gap: 3px; }
  .weekbox .c { width: 14px; height: 8px; background: var(--panel2); border: 1px solid var(--line-hi); }
  .weekbox .c.on { background: var(--org); border-color: var(--org); }
  .weekbox b { color: var(--org); font-weight: 700; }

  /* ---------- 共通パーツ ---------- */
  /* 章見出し：計器盤の刻印。橙のインデックス＋罫線 */
  .sec { display: flex; align-items: center; gap: 10px; margin: 30px 0 12px; }
  .sec .ix { font-family: var(--num); font-weight: 700; font-size: 13px; color: var(--org); letter-spacing: .1em; }
  .sec .en { font-family: var(--num); font-weight: 700; font-size: 14px; letter-spacing: .22em; text-transform: uppercase; color: var(--chalk); }
  .sec .jp { font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: .1em; }
  .sec .rule { flex: 1; height: 1px; background: var(--line); }

  /* パネル（カードの代わり）。四隅ブラケットは主役パネルのみ（うるさくしない） */
  .panel { background: var(--panel); border: 1px solid var(--line); padding: 18px 16px; margin-top: 12px; position: relative; }
  .panel.bracket::before, .panel.bracket::after {
    content: ""; position: absolute; width: 16px; height: 16px; pointer-events: none; }
  .panel.bracket::before { top: -1px; left: -1px; border-top: 2px solid var(--org); border-left: 2px solid var(--org); }
  .panel.bracket::after { bottom: -1px; right: -1px; border-bottom: 2px solid var(--org); border-right: 2px solid var(--org); }

  /* ハザードテープ（章の切れ目・完了演出のシグネチャ） */
  .tape { height: 6px; background: repeating-linear-gradient(-45deg, var(--org) 0 9px, #131416 9px 18px); }

  /* ---------- ヒーロー（今日のセッション） ---------- */
  .hero { margin-top: 18px; position: relative; }
  .hero .date-row { display: flex; align-items: baseline; gap: 10px;
    font-family: var(--num); font-weight: 600; font-size: 13px; letter-spacing: .24em;
    text-transform: uppercase; color: var(--dim); }
  .hero .date-row b { color: var(--org); font-weight: 700; }
  /* 巨大セッション名。背後に輪郭だけのゴースト文字（視差でゆっくり動く） */
  .hero-stage { position: relative; margin-top: 2px; }
  .ghost { position: absolute; top: -10px; left: 16%; z-index: 0;
    font-family: var(--disp); font-size: clamp(88px, 30vw, 150px); line-height: 1;
    letter-spacing: .02em; color: transparent; -webkit-text-stroke: 1px #1F2226;
    white-space: nowrap; pointer-events: none; user-select: none; will-change: transform; }
  .hero-name { position: relative; z-index: 1; font-family: var(--disp);
    font-size: clamp(58px, 18vw, 92px); line-height: .96; letter-spacing: .015em;
    color: var(--chalk); text-transform: uppercase; padding-top: 22px; }
  .hero-name .dot { color: var(--org); }
  .hero-sub { position: relative; z-index: 1; margin-top: 8px;
    font-size: 17px; font-weight: 900; letter-spacing: .04em; }
  .hero-lede { margin-top: 8px; font-size: 12.5px; color: var(--dim); line-height: 1.8; max-width: 34em; }
  /* 計器の帯：3つの読み値（回数・種目・時間） */
  .hero-dials { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--line); border: 1px solid var(--line); margin-top: 16px; }
  .dial { background: var(--panel); padding: 10px 12px 9px; }
  .dial .k { font-family: var(--num); font-weight: 600; font-size: 10.5px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--dim); }
  .dial .v { font-family: var(--num); font-weight: 700; font-size: 30px; line-height: 1.1; color: var(--chalk); }
  .dial .v small { font-size: 13px; color: var(--dim); font-weight: 600; margin-left: 2px; }
  .dial .v .of { color: var(--faint); font-size: 18px; }
  .dial.hot .v { color: var(--org); }
  .phase-line { display: flex; align-items: center; gap: 10px; margin-top: 12px;
    font-family: var(--num); font-weight: 600; font-size: 12.5px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--dim); }
  .phase-line .chipf { color: var(--org); border: 1px solid rgba(255,92,26,.5); padding: 1px 9px; font-weight: 700; }

  /* 仕上がり予告（折りたたみ） */
  .payoff { margin-top: 14px; border-top: 1px solid var(--line); }
  .payoff summary { list-style: none; cursor: pointer; padding: 11px 0 3px; display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 700; color: var(--dim); letter-spacing: .06em; }
  .payoff summary::-webkit-details-marker { display: none; }
  .payoff summary .en { font-family: var(--num); font-weight: 700; font-size: 12px; letter-spacing: .2em; color: var(--org); }
  .payoff summary .chev { color: var(--org); font-size: 10px; transition: transform .25s; margin-left: auto; }
  .payoff[open] summary .chev { transform: rotate(180deg); }
  .payoff-item { display: grid; grid-template-columns: 72px 1fr; gap: 10px; padding: 9px 0; align-items: baseline;
    border-bottom: 1px dashed #22262a; }
  .payoff-item:last-child { border-bottom: none; }
  .po-t { font-weight: 900; font-size: 13.5px; color: var(--org); }
  .po-x { font-size: 12.5px; color: var(--dim); line-height: 1.7; }

  /* ---------- 今日の進捗（計器メイン） ---------- */
  .run { padding: 16px; }
  .run-top { display: flex; justify-content: space-between; align-items: flex-end; gap: 10px; }
  .run-top .k { font-family: var(--num); font-weight: 600; font-size: 11px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--dim); }
  .run-top .k .jp { display: block; font-family: var(--sans); font-size: 11px; letter-spacing: .04em; margin-top: 2px; }
  .run-num { font-family: var(--num); font-weight: 700; font-size: 52px; line-height: .9; color: var(--chalk); }
  .run-num .of { font-size: 24px; color: var(--faint); font-weight: 600; }
  .run-num small { font-size: 13px; color: var(--dim); font-weight: 600; letter-spacing: .14em; margin-left: 4px; }
  /* セグメントバー＝ラックに掛けたプレート。1セット完了で1枚点灯 */
  .segs { display: flex; gap: 3px; margin-top: 12px; }
  .segs i { flex: 1; height: 14px; background: var(--panel2); border: 1px solid var(--line-hi);
    transition: background .2s, border-color .2s; }
  .segs i.on { background: var(--org); border-color: var(--org); }
  .run-msg { display: none; margin-top: 12px; font-weight: 900; font-size: 14px; letter-spacing: .04em; color: var(--org); }
  .run.complete .run-msg { display: block; }
  .run.complete .run-num { color: var(--org); }
  .run-tape { display: none; margin-top: 12px; }
  .run.complete .run-tape { display: block; }
  .run-actions { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .copybtn { font-family: var(--num); font-weight: 700; font-size: 14px; letter-spacing: .16em; text-transform: uppercase;
    border: 1px solid var(--org); background: none; color: var(--org); padding: 10px 18px; cursor: pointer; }
  .copybtn:disabled { border-color: var(--line-hi); color: var(--faint); }
  .copybtn:not(:disabled):active { background: var(--org); color: #0C0D0E; }
  .copy-note { font-size: 11px; color: var(--dim); line-height: 1.6; flex: 1; min-width: 140px; }

  /* ---------- コーチ（kaikaiくん） ---------- */
  .coach { display: flex; gap: 13px; align-items: flex-start; padding: 16px; }
  .coach-av { flex-shrink: 0; width: 52px; height: 52px; border-radius: 50%; overflow: hidden;
    border: 2px solid var(--org); box-shadow: 0 0 0 4px var(--org-soft); background: var(--panel2); }
  .coach-av img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .coach-body { flex: 1; min-width: 0; }
  .coach-name { display: flex; align-items: baseline; gap: 8px; margin-bottom: 7px; }
  .coach-name .en { font-family: var(--num); font-weight: 700; font-size: 13px; letter-spacing: .24em;
    text-transform: uppercase; color: var(--org); }
  .coach-name .jp { font-size: 11px; font-weight: 700; color: var(--dim); }
  .coach-body p { font-size: 13.5px; line-height: 1.9; color: var(--chalk); }
  .coach-body p b { color: var(--org); font-weight: 700; }
  .coach-body p + p { margin-top: 10px; }
  .coach-h { font-family: var(--num); font-weight: 700; font-size: 12px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--org); margin-top: 13px; }
  .coach-h::before { content: "// "; color: var(--faint); }
  .coach-h + p { margin-top: 3px !important; }

  /* ---------- 種目パネル ---------- */
  .ex { padding: 0; margin-top: 14px; }
  .ex-head { display: flex; align-items: stretch; border-bottom: 1px solid var(--line); }
  .ex-no { font-family: var(--disp); font-size: 26px; color: var(--org); min-width: 58px;
    display: flex; align-items: center; justify-content: center;
    border-right: 1px solid var(--line); background: var(--panel2); }
  .ex-tt { flex: 1; min-width: 0; padding: 12px 14px 10px; }
  .ex-name { font-size: 17.5px; font-weight: 900; line-height: 1.35; letter-spacing: .01em; }
  .ex-tag { display: block; margin-top: 2px; font-family: var(--num); font-weight: 600; font-size: 11.5px;
    letter-spacing: .2em; text-transform: uppercase; color: var(--dim); }
  /* 前回記録：超えるべきライン */
  .ex-last { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    padding: 9px 14px; border-bottom: 1px solid var(--line); background: var(--panel2);
    font-size: 12.5px; color: var(--dim); }
  .ex-last .k { font-family: var(--num); font-weight: 700; font-size: 11px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--amber); }
  .ex-last b { color: var(--chalk); font-weight: 700; }
  .ex-last .beat { color: var(--org); font-weight: 700; font-size: 11.5px; margin-left: auto; }

  /* セット行：タップで完了（黒地に大きな重量数字） */
  .sets { padding: 4px 10px 8px; }
  .set { width: 100%; display: grid; grid-template-columns: 30px 42px 1fr auto; align-items: center; gap: 10px;
    min-height: 54px; padding: 8px 4px; border: 0; border-bottom: 1px solid #1E2124; background: none;
    color: var(--chalk); font-family: var(--sans); text-align: left; cursor: pointer; }
  .sets .set:last-of-type { border-bottom: none; }
  .set:active { background: var(--panel2); }
  .chk { width: 26px; height: 26px; border: 2px solid var(--line-hi); display: flex; align-items: center;
    justify-content: center; font-weight: 900; font-size: 15px; color: transparent; transition: all .15s; }
  .s-lb { font-family: var(--num); font-weight: 700; font-size: 14px; letter-spacing: .1em; color: var(--dim); }
  .s-lb.warm { color: var(--amber); opacity: .8; }
  .s-main { min-width: 0; display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
  .s-w { font-family: var(--num); font-weight: 700; font-size: 27px; line-height: 1; letter-spacing: .01em; }
  .s-w small { font-size: 13px; color: var(--dim); font-weight: 600; margin-left: 1px; }
  .s-wt { font-weight: 800; font-size: 14.5px; }   /* 「自重」「追加35kg/side」など数値でない重量 */
  .s-x { color: var(--faint); font-size: 13px; }
  .s-r { color: var(--dim); font-size: 13px; font-weight: 500; }
  .s-r.accent { color: var(--org); font-weight: 800; }
  .s-rest { font-family: var(--num); font-weight: 600; font-size: 12px; letter-spacing: .06em;
    color: var(--faint); white-space: nowrap; text-transform: uppercase; }
  .set.done .chk { background: var(--org); border-color: var(--org); color: #0C0D0E; }
  .set.done .s-main, .set.done .s-lb, .set.done .s-rest { opacity: .38; }

  /* スーパーセットの流れ */
  .ss-flow { margin: 12px 14px 4px; border: 1px dashed var(--line-hi); padding: 11px 13px; }
  .ss-flow .step { font-weight: 800; font-size: 14px; display: block; }
  .ss-flow .arrow { display: block; font-family: var(--num); font-weight: 600; font-size: 11.5px;
    letter-spacing: .14em; color: var(--org); margin: 4px 0; }
  .subhead { margin: 12px 14px 0; font-family: var(--num); font-weight: 700; font-size: 12px;
    letter-spacing: .18em; text-transform: uppercase; color: var(--org); }

  /* なぜ・コツ（折りたたみ、フラットな刻印風） */
  .ex-folds { padding: 4px 14px 14px; display: flex; flex-direction: column; gap: 6px; }
  .fold summary { list-style: none; cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-family: var(--num); font-weight: 700; font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--dim); padding: 7px 0 3px; }
  .fold summary::-webkit-details-marker { display: none; }
  .fold summary .jp { font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: .04em; }
  .fold summary .chev { color: var(--org); font-size: 9px; transition: transform .25s; }
  .fold[open] summary { color: var(--chalk); }
  .fold[open] summary .chev { transform: rotate(180deg); }
  .fold-body { font-size: 12.5px; line-height: 1.9; color: var(--dim); padding: 4px 0 6px 14px;
    border-left: 2px solid var(--line-hi); }
  .fold.tip .fold-body { border-left-color: var(--org); color: #C9C3B7; }
  .fold-body b { color: var(--chalk); }

  /* 2-upルール・前回フッター */
  .rule-strip { margin-top: 14px; padding: 12px 16px; border: 1px solid var(--line); background: var(--panel);
    font-size: 12.5px; color: var(--dim); line-height: 1.8; }
  .rule-strip .k { font-family: var(--num); font-weight: 700; font-size: 12px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--org); display: block; margin-bottom: 2px; }
  .colo { margin-top: 14px; padding: 14px 16px; border: 1px solid var(--line); background: var(--panel); }
  .colo .k { font-family: var(--num); font-weight: 700; font-size: 12px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--dim); }
  .colo .k b { color: var(--chalk); }
  .colo p { font-size: 13px; line-height: 1.85; margin-top: 6px; }
  .colo .nx { margin-top: 10px; padding-top: 9px; border-top: 1px solid var(--line); font-size: 12px; color: var(--dim); }
  .colo .nx b { color: var(--org); }

  /* ---------- スクロール演出 ----------
     ・.fx：一度だけ下からせり上がる（IntersectionObserver）
     ・data-cu：見えた時に数字がカウントアップ
     ・.ghost：ヒーロー背後の輪郭文字がスクロールでゆっくり沈む（視差）
     ・reduced-motion 時はすべて無効化（CSS＋JS両方で止める） */
  .fx { opacity: 0; transform: translateY(22px); }
  .fx.in { opacity: 1; transform: none;
    transition: opacity .6s cubic-bezier(.22,.61,.36,1), transform .6s cubic-bezier(.22,.61,.36,1); }
  @media (prefers-reduced-motion: reduce) {
    .fx { opacity: 1; transform: none; }
    #sbar { display: none; }
    * { transition: none !important; animation: none !important; }
  }

  /* ---------- レストタイマー（計器の残り時間バー） ---------- */
  .rest { position: fixed; left: 0; right: 0; bottom: calc(58px + env(safe-area-inset-bottom)); z-index: 85;
    background: #101214; border-top: 2px solid var(--org); }
  .rest[hidden] { display: none; }
  .rest-fill { position: absolute; inset: 0 auto 0 0; width: 0%; background: rgba(255,92,26,.14); }
  .rest-in { position: relative; max-width: 560px; margin: 0 auto; display: flex; align-items: center;
    gap: 12px; padding: 9px 16px; }
  .rest-t { font-family: var(--num); font-weight: 700; font-size: 32px; line-height: 1; color: var(--org); min-width: 78px; }
  .rest-l { flex: 1; min-width: 0; font-size: 11px; color: var(--dim); line-height: 1.5; }
  .rest-btns { display: flex; gap: 8px; }
  .rest-btns button { font-family: var(--num); font-weight: 700; font-size: 13px; letter-spacing: .1em;
    border: 1px solid var(--line-hi); background: none; color: var(--chalk); padding: 8px 12px; cursor: pointer; }
  .rest-btns button:active { background: var(--org); border-color: var(--org); color: #0C0D0E; }
  .rest.over { background: #1A0E06; }
  .rest.over .rest-t { color: var(--amber); }

  /* ---------- 下タブバー ---------- */
  .tabbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 88; display: flex;
    background: rgba(12,13,14,.96); border-top: 1px solid var(--line);

  /* 鉄⇄紙の画面切替を「ふわっ」とつなぐフェードイン（JS/CSSのみ・全ブラウザ対応・実機でも確実に効く）。

        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 14.5A8 8 0 1 1 9.5 4 6.5 6.5 0 0 0 20 14.5z"/></svg>
      </span>
    </button>
  </div>
</div></header>

<main class="wrap">
  <section id="view-today" class="view"></section>
  <section id="view-program" class="view"></section>
  <section id="view-log" class="view"></section>
</main>

<!-- レストタイマー：セット完了で自動起動。Date.now()基準なので画面を消してもズレない -->
<div class="rest" id="rest" hidden>
  <div class="rest-fill" id="restFill"></div>
  <div class="rest-in">
    <div class="rest-t" id="restT">0:00</div>
    <div class="rest-l" id="restL">REST</div>
    <div class="rest-btns">
      <button id="restAdd">+30</button>
      <button id="restStop">終了</button>
    </div>
  </div>
</div>

<!-- プレート計算シート：バーベル種目の重量タップで開く -->
<div class="veil" id="veil" hidden>
  <div class="psheet" id="psheet">
    <div class="grip"></div>
    <span class="pk">Plate Math ── プレート内訳</span>
    <div class="pw" id="pwTotal">75<small>KG</small></div>
    <div class="plates-v" id="platesV"></div>
    <div id="plateRows"></div>
    <p class="pnote">片側ずつ同じ枚数を付けます。ジムに無い枚数のときは、近い組み合わせに読み替えてください。</p>
  </div>
</div>

<nav class="tabbar">
  <button data-v="program" onclick="showView('program')"><span class="en">Program</span><span class="jp">プログラム</span></button>
  <button data-v="today" onclick="showView('today')"><span class="en">Today</span><span class="jp">今日</span></button>
  <button data-v="log" onclick="showView('log')"><span class="en">Log</span><span class="jp">記録</span></button>
</nav>

<script src="src/data.js"></script>
<script>
  /* =========================================================================
     IRON GAUGE ── 表示ロジック
     データはすべて window.KINTORE_DATA（src/data.js）から読む。ハードコードしない。
     ========================================================================= */
  var D = window.KINTORE_DATA;
  var DOW = ['日', '月', '火', '水', '木', '金', '土'];
  var DOW_EN = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
  function pad2(x) { return x < 10 ? '0' + x : '' + x; }
  function todayStr() {
    var n = new Date();
    return n.getFullYear() + '-' + pad2(n.getMonth() + 1) + '-' + pad2(n.getDate());
  }
  function esc(s) { return String(s); } /* データは自分専用の信頼ソースなのでそのまま使う */

  /* ---------- 今日の実行状態（チェック＋実績）。localStorage に保存、日が変わればリセット。
       ★キーと形式は生成り版と完全互換（ksRun:日付:currentKey ＝ {d:[…], a:{…}}）。
         こうしておくと、ジムの途中でデザインを切り替えてもチェック状態が引き継がれる。 ---------- */
  var RUN_KEY = 'ksRun:' + todayStr() + ':' + D.currentKey;
  var RUN = { done: {}, act: {}, total: 0 };
  var SETINFO = {};   /* sid → { ex, label, weightText, weightKg, upper, amrap } */
  var SID = 0;

  function runLoad() {
    try {
      /* 古い日付のキーは掃除する（旧 ksRunA: 形式の残骸も一緒に消す） */
      var del = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && (k.indexOf('ksRunA:') === 0 || (k.indexOf('ksRun:') === 0 && k !== RUN_KEY))) del.push(k);
      }
      del.forEach(function (k) { localStorage.removeItem(k); });
      var raw = localStorage.getItem(RUN_KEY);
      if (raw) {
        var o = JSON.parse(raw);
        (o.d || []).forEach(function (id) { RUN.done[id] = true; });
        RUN.act = o.a || {};
      }
    } catch (e) {}
  }
  function runSave() {
    try { localStorage.setItem(RUN_KEY, JSON.stringify({ d: Object.keys(RUN.done), a: RUN.act })); } catch (e) {}
  }
  function runCount() { return Object.keys(RUN.done).length; }

  /* ---------- プレート計算（バーベル種目の重量タップで内訳） ---------- */
  var PLATES = [25, 20, 15, 10, 5, 2.5, 1.25];
  function parseWeightKg(str) {
    if (!str || /side|自重|アシスト|追加|〜|~|軽め/.test(str)) return null;
    var m = String(str).match(/^(\d+(?:\.\d+)?)\s*kg$/);
    return m ? +m[1] : null;
  }
  function barbellOf(name) {
    var n = String(name);
    if (/EZバー/.test(n)) return 10;
    if (/ハック|マシン|ケーブル|レッグ|カーフ|ペック|プレスダウン|ラット|シーテッド|アイソラテラル/.test(n)) return null;
    if (/バーベル|ベンチプレス|スクワット|RDL|デッドリフト/.test(n)) return 20;
    return null;
  }
  function parseUpperReps(str) {
    var m = String(str || '').match(/(\d+)\s*(?:〜|–|-)\s*(\d+)\s*回/);
    if (m) return +m[2];
    m = String(str || '').match(/(\d+)\s*回/);
    return m ? +m[1] : null;
  }
  function openPlates(total, bar) {
    var side = (total - bar) / 2;
    var rows = '', visual = '<div class="barend"></div><div class="collar"></div>';
    if (side < -1e-9) {
      rows = '<div class="prow"><span>バー（' + bar + 'kg）より軽い重量です</span></div>';
    } else {
      var rest = side, used = [];
      PLATES.forEach(function (p) { while (rest >= p - 1e-9) { used.push(p); rest -= p; } });
      used.forEach(function (p) {
        var hh = 22 + Math.sqrt(p / 25) * 40;
        visual += '<div class="pl" style="height:' + hh.toFixed(0) + 'px">' + (p >= 10 ? p : String(p).replace('0.', '.')) + '</div>';
      });
      rows += '<div class="prow"><span>バー</span><b>' + bar + 'kg</b></div>';
      rows += '<div class="prow"><span>片側に付けるプレート</span><b>' + (used.length ? used.join(' + ') : 'なし') + '</b></div>';
      rows += '<div class="prow"><span>片側合計</span><b>' + (+(side - rest).toFixed(2)) + 'kg</b></div>';
      if (rest > 1e-9) rows += '<div class="prow"><span class="warn">あと片側 ' + (+rest.toFixed(2)) + 'kg は標準プレートで作れない端数です</span></div>';
    }
    document.getElementById('pwTotal').innerHTML = (+total) + '<small>KG</small>';
    document.getElementById('platesV').innerHTML = visual;
    document.getElementById('plateRows').innerHTML = rows;
    document.getElementById('veil').hidden = false;
  }

  /* ---------- セット行 ---------- */
  /* "75kg" のような単純な数値だけ大きな計器数字にする。それ以外は文字のまま */
  function weightHtml(w) {
    if (!w) return '';
    var m = String(w).match(/^(\d+(?:\.\d+)?)\s*kg$/);
    if (m) return '<span class="s-w">' + (+m[1]) + '<small>KG</small></span>';
    return '<span class="s-wt">' + w + '</span>';
  }
  function shortRest(str) {
    if (!str) return '';
    return String(str).replace(/rest\s*/i, '').replace(/\s*min/, '分').replace(/\s*sec/, '秒');
  }
  function parseRestSec(str) {
    if (!str) return 0;
    var m = String(str).match(/(\d+(?:\.\d+)?)\s*(?:–|〜|-)?\s*(?:\d+(?:\.\d+)?)?\s*min/);
    if (m) return Math.round(+m[1] * 60);
    m = String(str).match(/(\d+)\s*sec/);
    return m ? +m[1] : 0;
  }

  function setRow(s, exName, checkable) {
    var exPlain = String(exName).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
    var wkg = parseWeightKg(s.weight), bar = wkg != null ? barbellOf(exName) : null;
    var wHtml = weightHtml(s.weight);
    /* バーベル種目の数値重量は、タップでプレート内訳を開けるようにする */
    if (bar != null && wkg != null) {
      wHtml = wHtml.replace('class="s-w"', 'class="s-w plate" onclick="event.stopPropagation();openPlates(' + wkg + ',' + bar + ')"');
    }
    var core = '<span class="chk">✓</span>'
      + '<span class="s-lb' + (s.warm ? ' warm' : '') + '">' + s.label + '</span>'
      + '<span class="s-main">' + wHtml
      + (s.weight ? '<span class="s-x">×</span>' : '')
      + '<span class="s-r' + (s.accent ? ' accent' : '') + '">' + s.reps + '</span></span>'
      + '<span class="s-rest">' + shortRest(s.rest) + '</span>';
    if (!checkable) return '<div class="set" style="cursor:default">' + core + '</div>';
    var id = 's' + (SID++);
    SETINFO[id] = { ex: exPlain, label: s.label, weightText: s.weight || '', weightKg: wkg,
      upper: parseUpperReps(s.reps), amrap: /AMRAP/i.test(String(s.reps)) };
    var isDone = !!RUN.done[id];
    return '<button class="set' + (isDone ? ' done' : '') + '" data-sid="' + id + '"'
      + ' data-rest="' + parseRestSec(s.rest) + '" data-ex="' + exPlain + '" onclick="toggleSet(this)">'
      + core + '</button>'
      + '<div class="act" id="act-' + id + '"' + (isDone ? '' : ' hidden') + '></div>';
  }

  /* --- 実績ステッパー（生成り版と同じ仕様・データ形式） --- */
  function actOf(id) { return RUN.act[id] || (RUN.act[id] = {}); }
  function actAdj(id, kind, dir) {
    var info = SETINFO[id] || {}, a = actOf(id);
    if (kind === 'w') {
      var base = (a.w != null) ? a.w : (info.weightKg != null ? info.weightKg : 0);
      a.w = Math.max(0, +(base + dir * 2.5).toFixed(2));
    } else {
      if (a.r == null) a.r = Math.max(1, (info.upper || 8) + (dir < 0 ? -1 : 0));
      else a.r = Math.max(1, a.r + dir);
    }
    runSave(); renderAct(id);
  }
  function renderAct(id) {
    var el = document.getElementById('act-' + id);
    if (!el) return;
    var info = SETINFO[id] || {}, a = RUN.act[id] || {};
    var h = '<span class="k">RESULT</span>';
    if (info.weightKg != null) {
      var w = (a.w != null) ? a.w : info.weightKg;
      h += '<span class="stp"><button onclick="actAdj(\'' + id + '\',\'w\',-1)" aria-label="重量を減らす">−</button>'
        + '<b>' + (+w) + 'kg</b>'
        + '<button onclick="actAdj(\'' + id + '\',\'w\',1)" aria-label="重量を増やす">＋</button></span>';
    } else if (info.weightText) {
      h += '<b style="font-size:13px">' + info.weightText + '</b>';
    }
    h += '<span class="x2">×</span>';
    h += '<span class="stp"><button onclick="actAdj(\'' + id + '\',\'r\',-1)" aria-label="回数を減らす">−</button>'
      + (a.r != null ? '<b>' + a.r + '回</b>' : '<b class="empty">回数？</b>')
      + '<button onclick="actAdj(\'' + id + '\',\'r\',1)" aria-label="回数を増やす">＋</button></span>';
    el.innerHTML = h;
  }

  function exercisePanel(ex, checkable) {
    var h = '<article class="panel ex fx">'
      + '<div class="ex-head"><div class="ex-no">' + ex.no + '</div>'
      + '<div class="ex-tt"><div class="ex-name">' + ex.name + '</div>'
      + (ex.tag ? '<span class="ex-tag">' + ex.tag + '</span>' : '') + '</div></div>';
    if (ex.last) {
      h += '<div class="ex-last"><span class="k">LAST</span><b>' + ex.last + '</b>'
        + '<span class="beat">↑ 今日はこれを超える</span></div>';
    }
    if (ex.superset) {
      h += '<div class="ss-flow"><span class="step">' + ex.superset.steps[0] + '</span>'
        + '<span class="arrow">↓ 休まずそのまま</span>'
        + '<span class="step">' + ex.superset.steps[1] + '</span>'
        + '<span class="arrow">↓ ' + ex.superset.note + '</span></div>';
    }
    if (ex.subgroups) {
      ex.subgroups.forEach(function (sg) {
        h += '<div class="subhead">' + sg.subhead + '</div>'
          + '<div class="sets">' + sg.sets.map(function (s) { return setRow(s, ex.name, checkable); }).join('') + '</div>';
      });
    } else if (ex.sets) {
      h += '<div class="sets">' + ex.sets.map(function (s) { return setRow(s, ex.name, checkable); }).join('') + '</div>';
    }
    var folds = '';
    if (ex.why) folds += '<details class="fold"><summary>Why <span class="jp">なぜこのメニュー？</span><span class="chev">▼</span></summary><div class="fold-body">' + ex.why + '</div></details>';
    if (ex.tip) folds += '<details class="fold tip"><summary>Form <span class="jp">フォームのコツ</span><span class="chev">▼</span></summary><div class="fold-body">' + ex.tip + '</div></details>';
    if (folds) h += '<div class="ex-folds">' + folds + '</div>';
    return h + '</article>';
  }

  /* ---------- コーチ（kaikaiくん） ---------- */
  function coachPanel(text) {
    var items = Array.isArray(text) ? text : [text];
    var body = items.map(function (it) {
      if (it && typeof it === 'object') return '<p class="coach-h">' + it.h + '</p><p>' + it.p + '</p>';
      return '<p>' + it + '</p>';
    }).join('');
    return '<div class="panel coach fx">'
      + '<div class="coach-av"><img src="coach-kaikai.png" width="52" height="52" alt="コーチ kaikaiくん"></div>'
      + '<div class="coach-body"><div class="coach-name"><span class="en">Kaikai</span><span class="jp">コーチ・kaikaiくん</span></div>'
      + body + '</div></div>';
  }

  /* ---------- 章見出し ---------- */
  function secHead(ix, en, jp) {
    return '<div class="sec fx"><span class="ix">' + ix + '</span><span class="en">' + en + '</span>'
      + '<span class="jp">' + jp + '</span><span class="rule"></span></div>';
  }

  /* ---------- 「今日」タブ ---------- */
  function buildToday() {
    var cur = D.sessions[D.currentKey];
    var m = D.meta;
    SID = 0; SETINFO = {};
    var n = new Date();
    var sessionNo = (m.sessionsDone || 0) + 1;

    /* ヒーロー：日付＋巨大セッション名＋計器3連 */
    var h = '<div class="hero fx">'
      + '<div class="date-row"><b>' + DOW_EN[n.getDay()] + '</b>'
      + '<span>' + n.getFullYear() + '.' + pad2(n.getMonth() + 1) + '.' + pad2(n.getDate()) + '</span>'
      + '<span>TODAY\'S SESSION</span></div>'
      + '<div class="hero-stage">'
      + '<div class="ghost" id="ghost" aria-hidden="true">' + cur.name + '</div>'
      + '<h1 class="hero-name">' + cur.name.replace('-', '<span class="dot">-</span>') + '</h1>'
      + '</div>'
      + '<div class="hero-sub">' + cur.titleJp + '</div>'
      + '<p class="hero-lede">' + cur.lede + '</p>'
      + '<div class="hero-dials">'
      + '<div class="dial hot"><div class="k">Session</div><div class="v"><span data-cu="' + sessionNo + '" data-pad="2">0</span><span class="of">/' + (m.sessionsTotal || 36) + '</span></div></div>'
      + '<div class="dial"><div class="k">Lifts</div><div class="v"><span data-cu="' + cur.exercises.length + '">0</span><small>種目</small></div></div>'
      + '<div class="dial"><div class="k">Time</div><div class="v"><span data-cu="' + cur.minutes + '">0</span><small>分</small></div></div>'
      + '</div>'
      + '<div class="phase-line"><span class="chipf">' + m.phaseLabel + '</span></div>';

    /* 仕上がり予告 */
    if (cur.payoff && cur.payoff.length) {
      h += '<details class="payoff"><summary><span class="en">Payoff</span>今日つくる身体<span class="chev">▼</span></summary>';
      cur.payoff.forEach(function (p) {
        h += '<div class="payoff-item"><span class="po-t">' + p.target + '</span><span class="po-x">' + p.text + '</span></div>';
      });
      h += '</details>';
    }
    h += '</div>';

    /* 今日の進捗（計器） */
    h += secHead('01', 'Progress', '今日の進捗 — セットをタップで完了');
    h += '<div class="panel bracket run fx" id="runBox">'
      + '<div class="run-top"><div class="k">Sets Completed<span class="jp">完了セット</span></div>'
      + '<div class="run-num"><span id="runN">0</span><span class="of">/<span id="runT">0</span></span><small>SETS</small></div></div>'
      + '<div class="segs" id="segs"></div>'
      + '<div class="run-msg">ALL SETS COMPLETE ── 今日も一枚、確実に厚くなった。</div>'
      + '<div class="run-tape tape"></div>'
      + '<div class="run-actions">'
      + '<button class="copybtn" id="copyBtn" onclick="copyReport()" disabled>Copy Report</button>'
      + '<span class="copy-note" id="copyNote">コピーした文をClaudeに貼ると、そのままトレ報告になります。</span>'
      + '</div></div>';

    /* コーチ */
    if (cur.coachIntro) {
      h += secHead('02', 'Coach', 'kaikaiくんから');
      h += coachPanel(cur.coachIntro);
    }

    /* 種目 */
    h += secHead('03', 'Workout', '今日のメニュー');
    cur.exercises.forEach(function (ex) { h += exercisePanel(ex, true); });

    /* 2-upルール */
    if (cur.rule) {
      h += '<div class="rule-strip fx"><span class="k">2-up Rule</span>' + cur.rule + '</div>';
    }

    /* 前回の記録＋次の次 */
    var last = D.log && D.log[0];
    if (last) {
      var idx = D.rotation.indexOf(D.currentKey);
      var nn = D.sessions[D.rotation[(idx + 1) % D.rotation.length]];
      var lastName = D.sessions[last.sessionKey] ? D.sessions[last.sessionKey].name : last.sessionKey;
      var p = last.date.split('-');
      h += '<div class="colo fx"><span class="k">Last Session — <b>' + lastName + '</b> ' + (+p[1]) + '/' + (+p[2]) + '</span>'
        + '<p>' + last.highlights + '</p>'
        + '<div class="nx">次の次は <b>' + nn.name + '</b>（' + nn.titleJp + '）</div></div>';
    }

    document.getElementById('view-today').innerHTML = h;

    /* セグメントバー（1セット＝1枚のプレート）を組む */
    RUN.total = document.querySelectorAll('#view-today .set[data-sid]').length;
    var segs = '';
    for (var i = 0; i < RUN.total; i++) segs += '<i></i>';
    document.getElementById('segs').innerHTML = segs;
    document.getElementById('runT').textContent = RUN.total;
    /* 復元したチェック済みセットの実績欄を描き直す */
    Object.keys(RUN.done).forEach(function (id) { renderAct(id); });
    updateRunUI();
  }

  function updateRunUI() {
    var done = runCount();
    var nEl = document.getElementById('runN');
    if (!nEl) return;
    nEl.textContent = done;
    var cells = document.querySelectorAll('#segs i');
    for (var i = 0; i < cells.length; i++) cells[i].classList.toggle('on', i < done);
    document.getElementById('runBox').classList.toggle('complete', done >= RUN.total && RUN.total > 0);
    document.getElementById('copyBtn').disabled = done === 0;
  }

  function toggleSet(btn) {
    var id = btn.getAttribute('data-sid');
    var on = !RUN.done[id];
    if (on) RUN.done[id] = true; else delete RUN.done[id];
    btn.classList.toggle('done', on);
    var act = document.getElementById('act-' + id);
    if (act) { act.hidden = !on; if (on) renderAct(id); }
    runSave(); updateRunUI();
    if (on) {
      var sec = +btn.getAttribute('data-rest') || 0;
      if (sec > 0 && runCount() < RUN.total) startRest(sec, nextSetLabel(btn));
      else if (runCount() >= RUN.total) { stopRest(); vibrate([120, 80, 120, 80, 240]); }
    }
  }
  function nextSetLabel(btn) {
    var all = document.querySelectorAll('#view-today .set');
    var found = false;
    for (var i = 0; i < all.length; i++) {
      if (all[i] === btn) { found = true; continue; }
      if (found && !all[i].classList.contains('done')) {
        var lb = all[i].querySelector('.s-lb');
        return 'NEXT — ' + (all[i].getAttribute('data-ex') || '') + (lb ? ' ' + lb.textContent : '');
      }
    }
    return 'NEXT — 次の種目へ';
  }

  /* ---------- トレ報告のコピー（チェック済みセットから自動生成） ---------- */
  function buildReport() {
    var cur = D.sessions[D.currentKey];
    var d = new Date();
    var lines = ['【トレ報告】' + todayStr() + '（' + DOW[d.getDay()] + '） ' + cur.name + '・' + cur.titleJp];
    var order = [], byEx = {};
    Object.keys(SETINFO).forEach(function (id) {
      var info = SETINFO[id];
      if (!byEx[info.ex]) { byEx[info.ex] = []; order.push(info.ex); }
      byEx[info.ex].push(id);
    });
    var skipped = [];
    order.forEach(function (ex) {
      var ids = byEx[ex];
      var done = ids.filter(function (id) { return RUN.done[id]; });
      if (!done.length) { skipped.push(ex); return; }
      var parts = done.map(function (id) {
        var info = SETINFO[id], a = RUN.act[id] || {};
        var w = (a.w != null) ? (+a.w + 'kg') : (info.weightKg != null ? info.weightKg + 'kg' : (info.weightText || ''));
        var r = (a.r != null) ? a.r : '?';
        return info.label + ' ' + (w ? w + '×' : '×') + r + (info.amrap ? '（AMRAP）' : '');
      });
      var undone = ids.filter(function (id) { return !RUN.done[id]; }).map(function (id) { return SETINFO[id].label; });
      lines.push('・' + ex + '：' + parts.join('｜') + (undone.length ? '（' + undone.join('・') + ' 未実施）' : ''));
    });
    if (skipped.length) lines.push('・未実施：' + skipped.join('、'));
    lines.push('※「×?」は回数メモなし。セッションカードのチェックから自動生成。');
    return lines.join('\n');
  }
  function copyReport() {
    var text = buildReport();
    var note = document.getElementById('copyNote');
    function ok() { note.textContent = 'コピーしました。Claudeに貼り付ければ、そのままトレ報告になります。'; }
    function ng() { note.textContent = 'コピーできませんでした。もう一度お試しください。'; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(ok, function () { fallbackCopy(text) ? ok() : ng(); });
    } else { fallbackCopy(text) ? ok() : ng(); }
  }
  function fallbackCopy(text) {
    try {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) { return false; }
  }

  /* ---------- レストタイマー ---------- */
  var REST = { until: 0, total: 0, iv: 0, over: false };
  function vibrate(pat) { try { if (navigator.vibrate) navigator.vibrate(pat); } catch (e) {} }
  function fmtSec(s) { s = Math.max(0, Math.round(s)); return Math.floor(s / 60) + ':' + pad2(s % 60); }
  function startRest(sec, label) {
    REST.until = Date.now() + sec * 1000; REST.total = sec; REST.over = false;
    var el = document.getElementById('rest');
    el.hidden = false; el.classList.remove('over');
    document.getElementById('restL').textContent = 'REST ' + fmtSec(sec) + ' ・ ' + (label || '');
    if (REST.iv) clearInterval(REST.iv);
    REST.iv = setInterval(restTick, 250);
    restTick();
  }
  function restTick() {
    if (!REST.until) return;
    var left = (REST.until - Date.now()) / 1000;
    if (left <= 0 && !REST.over) {
      REST.over = true;
      document.getElementById('rest').classList.add('over');
      document.getElementById('restT').textContent = '0:00';
      document.getElementById('restL').textContent = '休憩おわり。次のセットへ。';
      document.getElementById('restFill').style.width = '100%';
      vibrate([220, 110, 220]);
      setTimeout(function () { if (REST.over) stopRest(); }, 4000);
      return;
    }
    if (left <= 0) return;
    document.getElementById('restT').textContent = fmtSec(left);
    document.getElementById('restFill').style.width = ((1 - left / REST.total) * 100).toFixed(1) + '%';
  }
  function stopRest() {
    REST.until = 0; REST.over = false;
    if (REST.iv) { clearInterval(REST.iv); REST.iv = 0; }
    document.getElementById('rest').hidden = true;
    document.getElementById('restFill').style.width = '0%';
  }
  document.getElementById('restAdd').onclick = function () {
    if (!REST.until) return;
    if (REST.over) { REST.over = false; document.getElementById('rest').classList.remove('over'); REST.until = Date.now(); }
    REST.until += 30000; REST.total += 30;
    if (!REST.iv) REST.iv = setInterval(restTick, 250);
    restTick();
  };
  document.getElementById('restStop').onclick = stopRest;
  document.addEventListener('visibilitychange', function () { if (!document.hidden && REST.until) restTick(); });

  /* ---------- InBody（体組成）セクション。色だけIRON文法（橙＝筋肉／琥珀＝脂肪）に置換 ---------- */
  function monthsBetween(d0, d1) {
    var a = d0.split('-'), b = d1.split('-');
    return Math.max(1, (b[0] - a[0]) * 12 + (b[1] - a[1]));
  }
  function signStr(v) { return (v >= 0 ? '＋' : '−') + Math.abs(v).toFixed(1); }
  function dirClass(delta, lowerBetter) {
    if (Math.abs(delta) < 0.05) return 'flat';
    return (lowerBetter ? delta < 0 : delta > 0) ? 'good' : 'bad';
  }
  function ibSpark(series, color) {
    var W = 140, H = 32, p = 4, n = series.length;
    var mn = Math.min.apply(null, series), mx = Math.max.apply(null, series), rg = (mx - mn) || 1;
    var X = function (i) { return p + (W - 2 * p) * i / (n - 1); };
    var Y = function (v) { return p + (H - 2 * p) * (1 - (v - mn) / rg); };
    var pts = series.map(function (v, i) { return [X(i), Y(v)]; });
    var d = 'M' + pts.map(function (q) { return q[0].toFixed(1) + ' ' + q[1].toFixed(1); }).join(' L');
    var area = d + ' L' + X(n - 1).toFixed(1) + ' ' + (H - p) + ' L' + p + ' ' + (H - p) + ' Z';
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" aria-hidden="true">'
      + '<path d="' + area + '" fill="' + color + '" fill-opacity="0.12"/>'
      + '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2"/>'
      + '<circle cx="' + X(n - 1).toFixed(1) + '" cy="' + Y(series[n - 1]).toFixed(1) + '" r="3" fill="' + color + '" stroke="#141618" stroke-width="1.3"/></svg>';
  }
  function inbodySection() {
    var arr = D.inbody || [];
    if (arr.length < 2) return '';
    var cur = arr[arr.length - 1], prev = arr[arr.length - 2], first = arr[0];
    var h = secHead('05', 'Body Comp', 'InBody（体組成）');
    h += '<div class="panel fx">';
    h += '<div class="ib-head"><span class="then">' + first.date.slice(0, 7).replace('-', '.') + '</span>'
      + '<span class="ar"></span><span class="span">' + monthsBetween(first.date, cur.date) + 'ヶ月</span>'
      + '<span class="now">' + cur.date.slice(0, 7).replace('-', '.') + '</span></div>';
    var dM = cur.muscle - prev.muscle, sM = cur.muscle - first.muscle;
    var dF = cur.fat - prev.fat, sF = cur.fat - first.fat;
    h += '<div class="ib-heroes">'
      + '<div class="ib-hc m"><div class="l">骨格筋量</div><div class="v">' + cur.muscle.toFixed(1) + '<small>kg</small></div>'
      + '<div class="bd ' + dirClass(dM, false) + '">前回比 ' + signStr(dM) + 'kg</div>'
      + '<div class="fromstart">開始から <b>' + signStr(sM) + 'kg</b></div>'
      + '<div class="spark">' + ibSpark(arr.map(function (r) { return r.muscle; }), '#FF5C1A') + '</div></div>'
      + '<div class="ib-hc f"><div class="l">体脂肪率</div><div class="v">' + cur.fat.toFixed(1) + '<small>%</small></div>'
      + '<div class="bd ' + dirClass(dF, true) + '">前回比 ' + signStr(dF) + '%</div>'
      + '<div class="fromstart">開始から <b>' + signStr(sF) + '%</b></div>'
      + '<div class="spark">' + ibSpark(arr.map(function (r) { return r.fat; }), '#FFB02E') + '</div></div>'
      + '</div>';
    var withBmr = arr.filter(function (r) { return r.bmr != null; });
    var withWaist = arr.filter(function (r) { return r.waist != null; });
    var bmr = withBmr.length ? withBmr[withBmr.length - 1].bmr : null;
    var waist = withWaist.length ? withWaist[withWaist.length - 1].waist : null;
    h += '<div class="ib-band">'
      + '<div><div class="k">体重</div><div class="v">' + cur.weight.toFixed(1) + '<small>kg</small></div><div class="fs">開始 ' + signStr(cur.weight - first.weight) + '</div></div>'
      + '<div><div class="k">基礎代謝</div><div class="v">' + (bmr != null ? bmr.toLocaleString() : '—') + '<small>kcal</small></div></div>'
      + '<div><div class="k">腹囲</div><div class="v">' + (waist != null ? waist.toFixed(1) : '—') + '<small>cm</small></div></div>'
      + '</div>';
    var scored = arr.filter(function (r) { return r.score != null; });
    if (scored.length) {
      var sc = scored[scored.length - 1].score;
      var mx = Math.max.apply(null, scored.map(function (r) { return r.score; }));
      h += '<div class="ib-gauge"><div class="gn"><span data-cu="' + sc + '">0</span><small>/100</small></div>'
        + '<div class="gb"><div class="gt">InBody 点数（体成分の総合評価）</div>'
        + '<div class="gtrack"><i style="width:' + sc + '%"></i><b style="left:' + mx + '%"><span>最高' + mx + '</span></b></div></div></div>';
    }
    h += '<details class="ib-trend"><summary>推移をくわしく見る（' + arr.length + '回分） <span class="chev">▼</span></summary>'
      + inbodySVG(arr)
      + '<div class="ib-legend"><span><span class="ib-sw" style="background:#FF5C1A"></span>骨格筋量 (kg)</span>'
      + '<span><span class="ib-sw" style="background:#FFB02E"></span>体脂肪率 (%)</span>'
      + '<span style="color:var(--faint)">左軸 筋肉kg ・ 右軸 脂肪%</span></div></details>';
    h += '</div>';
    /* 部位別筋肉量の成長 */
    var seg = arr.filter(function (r) { return r.armR != null; });
    if (seg.length >= 2) {
      var s0 = seg[0], s1 = seg[seg.length - 1];
      var parts = [['右腕', 'armR'], ['左腕', 'armL'], ['体幹', 'trunk'], ['右脚', 'legR'], ['左脚', 'legL']];
      h += '<div class="panel fx" style="margin-top:12px"><div style="font-family:var(--num);font-weight:700;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--org);margin-bottom:4px">Segmental ── 部位別筋肉量</div>';
      parts.forEach(function (p) {
        var v0 = s0[p[1]], v1 = s1[p[1]];
        var pct = (v1 - v0) / v0 * 100;
        var bar = Math.max(0, Math.min(1, pct / 20));
        h += '<div class="seg-row"><span class="seg-name">' + p[0] + '</span>'
          + '<div class="seg-bar"><div class="seg-fill" style="width:' + (bar * 100).toFixed(0) + '%"></div></div>'
          + '<span class="seg-v"><span class="from">' + v0.toFixed(2) + ' →</span> <b>' + v1.toFixed(2) + '</b>kg'
          + '<span class="up">' + (pct >= 0 ? '+' : '') + pct.toFixed(0) + '%</span></span></div>';
      });
      h += '<p class="note-dim" style="margin-top:10px">' + s0.date.replace(/-/g, '.') + '（トレ開始期）→ ' + s1.date.replace(/-/g, '.') + ' の比較。バーは +20% で満タン。</p></div>';
    }
    return h;
  }
  /* InBody推移の折れ線（IRON配色）。座標は測定日の実時間に比例 */
  function inbodySVG(arr) {
    var W = 340, H = 210, padL = 34, padR = 34, padT = 18, padB = 26;
    var plotW = W - padL - padR, plotH = H - padT - padB, n = arr.length;
    var mus = arr.map(function (d) { return d.muscle; }), fat = arr.map(function (d) { return d.fat; });
    var muLo = Math.floor(Math.min.apply(null, mus)), muHi = Math.ceil(Math.max.apply(null, mus));
    var faLo = Math.floor(Math.min.apply(null, fat)), faHi = Math.ceil(Math.max.apply(null, fat));
    if (muHi === muLo) muHi++;
    if (faHi === faLo) faHi++;
    var ts = arr.map(function (d) { return new Date(d.date).getTime(); });
    var t0 = ts[0], t1 = ts[n - 1];
    function x(i) { return padL + plotW * (n === 1 || t1 === t0 ? 0.5 : (ts[i] - t0) / (t1 - t0)); }
    function ym(v) { return padT + plotH * (1 - (v - muLo) / (muHi - muLo)); }
    function yf(v) { return padT + plotH * (1 - (v - faLo) / (faHi - faLo)); }
    function smoothPath(pts) {
      if (pts.length < 3) return 'M' + pts.map(function (p) { return p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join('L');
      var d = 'M' + pts[0][0].toFixed(1) + ',' + pts[0][1].toFixed(1);
      for (var i = 0; i < pts.length - 1; i++) {
        var p0 = pts[Math.max(0, i - 1)], p1 = pts[i], p2 = pts[i + 1], p3 = pts[Math.min(pts.length - 1, i + 2)];
        d += 'C' + (p1[0] + (p2[0] - p0[0]) / 6).toFixed(1) + ',' + (p1[1] + (p2[1] - p0[1]) / 6).toFixed(1)
          + ' ' + (p2[0] - (p3[0] - p1[0]) / 6).toFixed(1) + ',' + (p2[1] - (p3[1] - p1[1]) / 6).toFixed(1)
          + ' ' + p2[0].toFixed(1) + ',' + p2[1].toFixed(1);
      }
      return d;
    }
    var mpts = arr.map(function (d, i) { return [x(i), ym(d.muscle)]; });
    var fpts = arr.map(function (d, i) { return [x(i), yf(d.fat)]; });
    var mPath = smoothPath(mpts);
    var areaPath = mPath + 'L' + mpts[n - 1][0].toFixed(1) + ',' + (H - padB) + 'L' + mpts[0][0].toFixed(1) + ',' + (H - padB) + 'Z';
    var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;margin-top:10px" xmlns="http://www.w3.org/2000/svg">';
    s += '<defs><linearGradient id="ibg" x1="0" y1="0" x2="0" y2="1">'
      + '<stop offset="0" stop-color="#FF5C1A" stop-opacity=".18"/>'
      + '<stop offset="1" stop-color="#FF5C1A" stop-opacity="0"/></linearGradient></defs>';
    [muLo, (muLo + muHi) / 2, muHi].forEach(function (v) {
      var y = ym(v);
      s += '<line x1="' + padL + '" y1="' + y.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + y.toFixed(1) + '" stroke="#2A2E33" stroke-width="1"/>';
      s += '<text x="' + (padL - 6) + '" y="' + (y + 3.5).toFixed(1) + '" text-anchor="end" font-family="Barlow Condensed,sans-serif" font-size="10" fill="#5C5952">' + (v % 1 ? v.toFixed(1) : v) + '</text>';
    });
    [faLo, faHi].forEach(function (v) {
      s += '<text x="' + (W - padR + 6) + '" y="' + (yf(v) + 3.5).toFixed(1) + '" text-anchor="start" font-family="Barlow Condensed,sans-serif" font-size="10" fill="#B0812E">' + v + '%</text>';
    });
    s += '<path d="' + areaPath + '" fill="url(#ibg)"/>';
    s += '<path d="' + smoothPath(fpts) + '" fill="none" stroke="#FFB02E" stroke-width="2" stroke-dasharray="5 4" opacity=".85"/>';
    s += '<path d="' + mPath + '" fill="none" stroke="#FF5C1A" stroke-width="2.6"/>';
    arr.forEach(function (d, i) {
      var last = i === n - 1;
      s += '<circle cx="' + x(i).toFixed(1) + '" cy="' + yf(d.fat).toFixed(1) + '" r="' + (last ? 3.4 : 2.6) + '" fill="#FFB02E" stroke="#141618" stroke-width="1.4"/>';
      s += '<circle cx="' + x(i).toFixed(1) + '" cy="' + ym(d.muscle).toFixed(1) + '" r="' + (last ? 4.4 : 3.2) + '" fill="#FF5C1A" stroke="#141618" stroke-width="1.6"/>';
    });
    s += '<text x="' + x(n - 1).toFixed(1) + '" y="' + (ym(mus[n - 1]) - 10).toFixed(1) + '" text-anchor="end" font-family="Barlow Condensed,sans-serif" font-size="14" font-weight="700" fill="#FF5C1A">' + mus[n - 1].toFixed(1) + 'kg</text>';
    s += '<text x="' + x(n - 1).toFixed(1) + '" y="' + (yf(fat[n - 1]) + 15).toFixed(1) + '" text-anchor="end" font-family="Barlow Condensed,sans-serif" font-size="12" font-weight="700" fill="#FFB02E">' + fat[n - 1].toFixed(1) + '%</text>';
    var lastYear = '';
    arr.forEach(function (d, i) {
      var y4 = d.date.slice(0, 4);
      if (y4 !== lastYear) {
        lastYear = y4;
        s += '<text x="' + x(i).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="10" fill="#5C5952">' + y4 + '</text>';
      } else if (i === n - 1) {
        s += '<text x="' + x(i).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="10" fill="#8F8A80">' + (+d.date.slice(5, 7)) + '/' + (+d.date.slice(8, 10)) + '</text>';
      }
    });
    return s + '</svg>';
  }

  /* ---------- 「プログラム」タブ（完全版） ---------- */
  function e1rmOf(rec) {
    if (rec.unit.indexOf('kg') !== 0) return null;
    if (/side|相当/.test(rec.unit + rec.reps)) return null;
    var w = parseFloat(rec.weight);
    var m = String(rec.reps).match(/×?\s*(\d+)/);
    if (!w || !m) return null;
    var reps = +m[1];
    return reps <= 1 ? w : Math.round(w * (1 + reps / 30));
  }
  function toggleSession(k) {
    var b = document.getElementById('rb-' + k), open = b.classList.contains('open');
    document.querySelectorAll('.rot-body.open').forEach(function (x) { x.classList.remove('open'); });
    document.querySelectorAll('.rot-h.open').forEach(function (x) { x.classList.remove('open'); });
    if (!open) {
      b.classList.add('open');
      document.getElementById('rh-' + k).classList.add('open');
      fxScan(); /* アコーディオン内のパネルにも出現演出をかける */
    }
  }

  function buildProgram() {
    var m = D.meta;
    var done = Math.max(0, Math.min(m.sessionsDone || 0, m.sessionsTotal || 36));
    var total = m.sessionsTotal || 36;
    var phaseSize = Math.max(1, Math.round(total / 3));
    var phaseNo = done >= total ? 3 : Math.min(3, Math.floor(done / phaseSize) + 1);
    var phaseNames = ['土台づくり', '重量を伸ばす', '仕上げと確認'];
    var phaseNotes = ['フォーム習得・基準づくり', '主役種目を少しずつ更新', '疲労を見ながら定着'];
    var cur = D.sessions[D.currentKey];

    var h = '<div class="simple-h fx"><div class="en">' + m.programName + '</div>'
      + '<div class="jp">' + m.splitName + ' ・ ' + m.phaseLabel + '</div></div>';

    /* 現在地マップ：巨大数字＋Phase 3分割トラック */
    h += secHead('01', 'Program Map', '現在地');
    h += '<div class="panel bracket fx"><div class="map-num">'
      + '<span class="big"><span data-cu="' + done + '">0</span></span><span class="of">/' + total + '回</span>'
      + '<span class="cap">Phase ' + phaseNo + ' ・ <b>' + phaseNames[phaseNo - 1] + '</b><br>次は<b>' + (done + 1) + '回目</b>、' + (cur ? cur.name : '') + '。</span>'
      + '</div><div class="pm-track">';
    for (var i = 1; i <= 3; i++) {
      var st = (i - 1) * phaseSize + 1, en = i === 3 ? total : i * phaseSize;
      var state = done >= en ? ' done' : (i === phaseNo ? ' now' : '');
      h += '<div class="pm-phase' + state + '"><span class="num">Phase ' + i + '</span>'
        + '<span class="name">' + phaseNames[i - 1] + '</span>'
        + '<span class="range">' + st + '–' + en + '回<br>' + phaseNotes[i - 1] + '</span></div>';
    }
    h += '</div></div>';

    /* ローテーション：タップで全メニュー展開 */
    h += secHead('02', 'Rotation', '4分割（タップで中身）');
    h += '<div class="panel fx" style="padding:2px 16px 8px">';
    D.rotation.forEach(function (k, i) {
      var s = D.sessions[k];
      h += '<div><button class="rot-h" id="rh-' + k + '" onclick="toggleSession(\'' + k + '\')">'
        + '<span class="no">' + (i + 1) + '</span>'
        + '<span class="nm">' + s.name + '</span><span class="jp2">' + s.titleJp + '</span>'
        + (k === D.currentKey ? '<span class="nextm">NEXT</span>' : '')
        + '<span class="chev">▼</span></button>'
        + '<div class="rot-body" id="rb-' + k + '"><div class="inner">'
        + '<p class="acc-lede">' + s.lede + '　／　目安 ' + s.minutes + '分</p>'
        + s.exercises.map(function (ex) { return exercisePanel(ex, false); }).join('')
        + '</div></div></div>';
    });
    h += '</div>';

    /* 主要種目の伸び */
    h += secHead('03', 'Progress', '主要種目の伸び');
    h += '<div class="panel fx" style="padding:4px 16px 12px">';
    (D.progress || []).forEach(function (p) {
      var gain = p.current - p.start;
      var pct = Math.max(0, Math.min(1, gain / (p.start * .5)));
      h += '<div class="lift-row"><div class="lift-top"><span class="n">' + p.lift + '</span>'
        + '<span class="v"><span class="fr">' + p.start + ' →</span> ' + p.current + p.unit
        + (gain > 0 ? '<span class="up">+' + gain + '</span>' : '') + '</span></div>'
        + '<div class="lift-bar"><i style="width:' + (pct * 100).toFixed(0) + '%"></i></div></div>';
    });
    h += '</div>';

    /* PRボード（日付・推定1RM付き） */
    h += secHead('04', 'Records', '自己ベスト');
    h += '<div class="panel fx" style="padding:4px 16px 12px">';
    (D.records || []).forEach(function (r) {
      var e1 = e1rmOf(r);
      h += '<div class="lift-row"><div class="lift-top"><span class="n">' + r.lift
        + (r.isNew ? ' <span style="color:var(--org);font-size:10px;font-weight:900;letter-spacing:.15em">NEW</span>' : '')
        + '<span class="rl-date">' + r.date.replace(/-/g, '/') + (e1 ? '　<span class="rl-e1rm">推定1RM ' + e1 + 'kg</span>' : '') + '</span>'
        + '</span><span class="v">' + r.weight + '<span class="fr">' + r.unit + '</span>'
        + '<span style="color:var(--dim);font-size:12px;font-weight:500;margin-left:6px">' + r.reps + '</span></span></div></div>';
    });

    /* InBody（体組成） */
    h += inbodySection();

    /* このプログラムについて */
    if (m.about && m.about.length) {
      h += secHead('06', 'About', 'このプログラムについて');
      h += '<div class="panel fx" style="padding:6px 16px 12px">';
      m.about.forEach(function (a) { h += '<div class="about-item"><span class="ai-h">' + a.h + '</span><p class="ai-p">' + a.p + '</p></div>'; });
      h += '</div>';
    }
    document.getElementById('view-program').innerHTML = h;
  }

  /* ---------- 「記録」タブ（月カレンダー＋その日の記録） ---------- */
  var CAL = { idx: 0, months: [], sel: null };
  var MON_LATIN = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  var LOGMAP = {}, ATTMAP = {};

  function calBuildMonths() {
    var map = {};
    (D.attendance || []).forEach(function (a) {
      var p = a.date.split('-'), key = p[0] + '-' + p[1];
      (map[key] = map[key] || {})[parseInt(p[2], 10)] = a.part;
    });
    var keys = Object.keys(map).sort(), now = new Date();
    var sy, sm, ey = now.getFullYear(), em = now.getMonth() + 1;
    if (keys.length) { var f = keys[0].split('-'); sy = +f[0]; sm = +f[1]; } else { sy = ey; sm = em; }
    if (keys.length) { var l = keys[keys.length - 1].split('-'); if (+l[0] > ey || (+l[0] === ey && +l[1] > em)) { ey = +l[0]; em = +l[1]; } }
    var list = [], y = sy, mth = sm;
    while (y < ey || (y === ey && mth <= em)) {
      list.push({ y: y, m: mth, t: map[y + '-' + pad2(mth)] || {} });
      mth++; if (mth > 12) { mth = 1; y++; }
    }
    return list;
  }
  function calRender() {
    var o = CAL.months[CAL.idx], now = new Date();
    var isCur = (o.y === now.getFullYear() && o.m === now.getMonth() + 1), todayD = now.getDate();
    var lead = new Date(o.y, o.m - 1, 1).getDay(), days = new Date(o.y, o.m, 0).getDate();
    document.getElementById('cal-mlabel').textContent = o.y + '年 ' + o.m + '月';
    document.getElementById('cal-mlatin').textContent = MON_LATIN[o.m - 1];
    document.getElementById('cal-prev').style.visibility = CAL.idx > 0 ? 'visible' : 'hidden';
    document.getElementById('cal-next').style.visibility = CAL.idx < CAL.months.length - 1 ? 'visible' : 'hidden';
    var g = '';
    for (var i = 0; i < lead; i++) g += '<div class="cal-cell blank"></div>';
    for (var d = 1; d <= days; d++) {
      var part = o.t[d], isToday = isCur && d === todayD, ds = o.y + '-' + pad2(o.m) + '-' + pad2(d);
      var cls = 'cal-cell' + (part ? ' went' : '') + (isToday ? ' today' : '') + (part && CAL.sel === ds ? ' sel' : '');
      var mk = part ? '<span class="part">' + (part === 'U' ? '上' : '下') + '</span>' : '';
      g += '<div class="' + cls + '"' + (part ? ' onclick="calPick(\'' + ds + '\')"' : '') + '>' + mk + d + '</div>';
    }
    document.getElementById('cal-grid').innerHTML = g;
    var cnt = 0; for (var key in o.t) if (o.t.hasOwnProperty(key)) cnt++;
    var weeks = (isCur ? todayD : days) / 7, avg = (cnt / weeks).toFixed(1);
    document.getElementById('cal-stats').innerHTML =
      '<div><div class="num">' + cnt + '</div><div class="lbl2">通った回数</div></div>'
      + '<div><div class="num">' + avg + '</div><div class="lbl2">週平均</div></div>';
  }
  function calStep(dir) {
    var n = CAL.idx + dir;
    if (n < 0 || n >= CAL.months.length) return;
    CAL.idx = n; calRender();
  }
  function calDetail(date) {
    var l = LOGMAP[date], part = ATTMAP[date];
    var name = (l && D.sessions[l.sessionKey]) ? D.sessions[l.sessionKey].name
      : (part === 'U' ? '上半身' : part === 'L' ? '下半身' : '—');
    var p = date.split('-');
    var h = '<div class="cal-det-head"><span class="cal-det-date">' + (+p[1]) + '/' + (+p[2]) + '</span>'
      + '<span class="cal-det-name">' + name + '</span></div>';
    if (l) {
      if (l.highlights) h += '<p class="cal-det-hl">' + l.highlights + '</p>';
      if (l.detail) h += '<div class="log-detail">' + l.detail + '</div>';
      if (l.coach) h += coachPanel(l.coach).replace('class="panel coach fx"', 'class="panel coach"');
    } else {
      h += '<p class="cal-det-none">この日はジムに通った記録のみ（詳細メモはありません）。</p>';
    }
    document.getElementById('cal-detail').innerHTML = h;
  }
  function calPick(date) {
    CAL.sel = date;
    calRender();
    calDetail(date);
  }
  function buildLog() {
    var h = '<div class="simple-h fx"><div class="en">Training Log</div>'
      + '<div class="jp">つづけた記録</div></div>';
    h += secHead('01', 'Continuity', '月カレンダー');
    h += '<div class="panel fx">'
      + '<div class="cal-nav"><button onclick="calStep(-1)" aria-label="前の月" id="cal-prev">‹</button>'
      + '<div><span class="mlabel" id="cal-mlabel"></span><span class="mlatin" id="cal-mlatin"></span></div>'
      + '<button onclick="calStep(1)" aria-label="次の月" id="cal-next">›</button></div>'
      + '<div class="cal-dow"><span class="sun">SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span class="sat">SAT</span></div>'
      + '<div class="cal-grid" id="cal-grid"></div>'
      + '<div class="cal-legend">'
      + '<span><span class="sw" style="background:#241610;border:1px solid rgba(255,92,26,.4)"></span>行った日</span>'
      + '<span><span class="sw" style="border:1px solid var(--org)"></span>今日</span>'
      + '<span style="color:var(--faint)">上＝上半身 / 下＝下半身</span></div>'
      + '<div class="cal-stats" id="cal-stats"></div></div>';
    h += secHead('02', 'Session Detail', 'その日の記録');
    h += '<div class="panel fx" id="cal-detail"></div>';
    document.getElementById('view-log').innerHTML = h;
    LOGMAP = {}; ATTMAP = {};
    (D.log || []).forEach(function (l) { LOGMAP[l.date] = l; });
    (D.attendance || []).forEach(function (a) { ATTMAP[a.date] = a.part; });
    CAL.months = calBuildMonths();
    CAL.idx = CAL.months.length - 1;
    var dates = Object.keys(ATTMAP).sort();
    CAL.sel = dates.length ? dates[dates.length - 1] : null;
    calRender();
    if (CAL.sel) calDetail(CAL.sel);
  }

  /* ---------- 今週の状況（トップバーの週セル） ---------- */
  function renderWeekbox() {
    var now = new Date();
    var wstart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
    var cnt = 0;
    (D.attendance || []).forEach(function (a) {
      var p = a.date.split('-');
      var d = new Date(+p[0], +p[1] - 1, +p[2]);
      if (d >= wstart && d <= now) cnt++;
    });
    var cells = '';
    for (var i = 0; i < 3; i++) cells += '<span class="c' + (i < cnt ? ' on' : '') + '"></span>';
    document.getElementById('weekbox').innerHTML =
      '<span class="wk-t">WEEK</span><span class="cells">' + cells + '</span>'
      + (cnt >= 3 ? '<b>DONE</b>' : '<span>あと<b>' + (3 - cnt) + '</b></span>');
  }

  /* ---------- タブ切替 ----------
     タブの記憶は sessionStorage 'ks_tab'（生成り版と共有。あちらは today を "next" と呼ぶので変換） */
  var VIEW_ORDER = ['program', 'today', 'log'];
  function showView(name) {
    if (VIEW_ORDER.indexOf(name) === -1) name = 'today';
    var vs = document.querySelectorAll('.view');
    for (var i = 0; i < vs.length; i++) vs[i].classList.remove('show');
    document.getElementById('view-' + name).classList.add('show');
    var btns = document.querySelectorAll('.tabbar button');
    for (var j = 0; j < btns.length; j++) btns[j].classList.toggle('active', btns[j].getAttribute('data-v') === name);
    try { sessionStorage.setItem('ks_tab', name === 'today' ? 'next' : name); } catch (e) {}
    window.scrollTo(0, 0);
    fxScan(); /* 切替後、見えている要素の出現演出をかけ直す */
  }

  /* ---------- 横スワイプでタブ移動（タップと区別するため移動量と方向で判定） ---------- */
  function setupSwipe() {
    var main = document.querySelector('main'), sw = null;
    if (!main) return;
    function blocked(el) { return !!(el && el.closest && el.closest('.tabbar, .rest, .veil, .act, a, input, textarea, select')); }
    main.addEventListener('touchstart', function (e) {
      if (!e.touches || e.touches.length !== 1) { sw = null; return; }
      var t = e.touches[0];
      sw = blocked(e.target) ? null : { x: t.clientX, y: t.clientY, dx: 0, dy: 0, dir: 0 };
    }, { passive: true });
    main.addEventListener('touchmove', function (e) {
      if (!sw || !e.touches || e.touches.length !== 1) return;
      var t = e.touches[0];
      sw.dx = t.clientX - sw.x; sw.dy = t.clientY - sw.y;
      if (!sw.dir) {
        if (Math.abs(sw.dy) > 12 && Math.abs(sw.dy) > Math.abs(sw.dx) * 1.15) { sw = null; return; }
        if (Math.abs(sw.dx) > 12 && Math.abs(sw.dx) > Math.abs(sw.dy) * 1.25) sw.dir = 1;
      }
      if (sw && sw.dir && e.cancelable) e.preventDefault();
    }, { passive: false });
    main.addEventListener('touchend', function () {
      if (!sw || !sw.dir) { sw = null; return; }
      var cur = document.querySelector('.tabbar button.active');
      var idx = VIEW_ORDER.indexOf(cur ? cur.getAttribute('data-v') : 'today');
      if (Math.abs(sw.dx) > 56) {
        var next = idx + (sw.dx < 0 ? 1 : -1);
        if (next >= 0 && next < VIEW_ORDER.length) showView(VIEW_ORDER[next]);
      }
      sw = null;
    }, { passive: true });
    main.addEventListener('touchcancel', function () { sw = null; }, { passive: true });
  }

  /* =========================================================================
     スクロール演出（このアプリのアイデンティティ）
     1) #sbar：読み進みゲージ（上端の橙ライン）
     2) .fx  ：一度だけ下からせり上がる出現
     3) data-cu：見えた瞬間に数字がカウントアップ（計器の針が回るイメージ）
     4) #ghost：ヒーロー背後の輪郭文字がゆっくり沈む視差
     reduced-motion 設定時はすべて無効（素の表示のまま）。
     ========================================================================= */
  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function countUp(el) {
    var target = +el.getAttribute('data-cu') || 0;
    var padTo = el.getAttribute('data-pad') ? 2 : 1;
    function show(v) { var s = String(v); while (s.length < padTo) s = '0' + s; el.textContent = s; }
    /* 動きを減らす設定・非表示タブ（rAFが止まる）では、即final値を出す */
    if (REDUCED || document.hidden) { show(target); return; }
    var t0 = performance.now(), dur = 900;
    function step(t) {
      var p = Math.min(1, (t - t0) / dur);
      var e = 1 - Math.pow(1 - p, 3); /* ease-out cubic：針が減速して止まる */
      show(Math.round(target * e));
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  var IO = null;
  function fxInit() {
    if (REDUCED || !('IntersectionObserver' in window)) {
      /* 動きなし環境：即座に表示・数字も最終値 */
      document.querySelectorAll('.fx').forEach(function (el) { el.classList.add('in'); });
      document.querySelectorAll('[data-cu]').forEach(function (el) { countUp(el); });
      return;
    }
    IO = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) {
        if (!en.isIntersecting) return;
        en.target.classList.add('in');
        en.target.querySelectorAll('[data-cu]').forEach(function (el) {
          if (!el.getAttribute('data-done')) { el.setAttribute('data-done', '1'); countUp(el); }
        });
        IO.unobserve(en.target);
      });
    }, { threshold: 0.12 });
    fxScan();
    /* 保険：何らかの理由でIntersectionObserverが一度も発火しない環境
       （バックグラウンド描画停止など）でも、2秒後には必ず表示する */
    setTimeout(function () {
      if (!document.querySelector('.fx.in')) {
        document.querySelectorAll('.fx').forEach(function (el) { el.classList.add('in'); });
        document.querySelectorAll('[data-cu]').forEach(function (el) {
          if (!el.getAttribute('data-done')) { el.setAttribute('data-done', '1'); countUp(el); }
        });
      }
    }, 2000);
  }
  function fxScan() {
    if (REDUCED) {
      document.querySelectorAll('.fx').forEach(function (el) { el.classList.add('in'); });
      document.querySelectorAll('[data-cu]').forEach(function (el) {
        if (!el.getAttribute('data-done')) { el.setAttribute('data-done', '1'); countUp(el); }
      });
      return;
    }
    if (!IO) return;
    document.querySelectorAll('.fx:not(.in)').forEach(function (el) { IO.observe(el); });
  }

  function onScroll() {
    if (REDUCED) return;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    var p = max > 0 ? window.scrollY / max : 0;
    document.getElementById('sbar').style.transform = 'scaleX(' + Math.max(0, Math.min(1, p)) + ')';
    var g = document.getElementById('ghost');
    if (g) g.style.transform = 'translateY(' + (window.scrollY * 0.28).toFixed(1) + 'px)';
  }

  /* ---------- 起動 ---------- */
  document.getElementById('veil').addEventListener('click', function (e) {
    if (!document.getElementById('psheet').contains(e.target)) this.hidden = true;
  });
  runLoad();
  buildToday();
  buildProgram();
  buildLog();
  renderWeekbox();
  setupSwipe();
  fxInit();
  if (!REDUCED) {
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }
  /* 前回開いていたタブを復元（生成り版の "next" は こちらの "today"） */
  var startTab = 'today';
  try {
    var saved = sessionStorage.getItem('ks_tab') || (D.meta && D.meta.defaultTab) || 'next';
    startTab = saved === 'next' ? 'today' : saved;
  } catch (e) {}
  showView(startTab);
</script>
</body>
