<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="manifest" href="card.webmanifest">
<!-- スマホの上部バーの色。スキン切替に合わせて JS で塗り替える（初期は紙の生成り） -->
<meta id="tcolor" name="theme-color" content="#F3EDE2">
<link rel="apple-touch-icon" href="icon-card-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="筋トレ">
<title>筋トレ｜セッションカード</title>

<!-- ▼この next-session.html は「土台（シェル）」ページです。
     中身のデザインは 2 つのファイルに分かれています：
       ・skin-paper.html         … 紙（生成り）スキン
       ・next-session-iron.html  … 鉄（IRON GAUGE）スキン
     土台はこの2つを iframe で重ねて置き、トグルを押したら「透明度のクロスフェード」で
     入れ替えます。ページを開き直さないので、URLの読み込みバーは出ず、瞬時に・なめらかに切り替わります。
     デザインを直したいときは、これまで通り上の2ファイルをそれぞれ編集すればOK（土台は触らなくてよい）。 -->

<script>
  /* 開いた瞬間にどちらのスキンを出すかを決める（端末の記憶。既定は紙）。
     iframe が描画される前に html の背景色をそのスキンの色で塗り、白いチラつきを防ぐ。 */
  (function () {
    try { window.__skin = (localStorage.getItem('ks_design') === 'iron') ? 'iron' : 'paper'; }
    catch (e) { window.__skin = 'paper'; }
    document.documentElement.style.background = (window.__skin === 'iron') ? '#0C0D0E' : '#F3EDE2';
  })();
</script>

<style>
  html, body { margin: 0; height: 100%; background: #F3EDE2; overflow: hidden; }
  /* 2つのスキンを画面いっぱいに重ねて置き、透明度でクロスフェードする。
     .on が付いた方だけ不透明＆操作可能。切替は opacity のトランジションでふわっと。 */
  .frame {
    position: fixed; inset: 0; width: 100%; height: 100%; border: 0;
    opacity: 0; pointer-events: none; background: transparent;
    transition: opacity .28s ease;
  }
  .frame.on { opacity: 1; pointer-events: auto; }
  /* 動きが苦手な設定の端末では、フェードせず即切替にする */
  @media (prefers-reduced-motion: reduce) { .frame { transition: none; } }
</style>
</head>
<body>
  <iframe id="f-paper" class="frame" title="紙スキン"></iframe>
  <iframe id="f-iron"  class="frame" title="鉄スキン"></iframe>

<script>
(function () {
  var SKINS = {
    paper: { el: document.getElementById('f-paper'), src: 'skin-paper.html',        bg: '#F3EDE2' },
    iron:  { el: document.getElementById('f-iron'),  src: 'next-session-iron.html', bg: '#0C0D0E' }
  };
  var tcolor = document.getElementById('tcolor');
  var cur = window.__skin || 'paper';

  /* 指定スキンを前面に出す（必要なら iframe をここで読み込む）。反対側は背面へ引っ込める。 */
  function show(name) {
    var other = (name === 'paper') ? 'iron' : 'paper';
    if (!SKINS[name].el.src) SKINS[name].el.src = SKINS[name].src;   // 未読み込みなら読み込む
    SKINS[name].el.classList.add('on');
    SKINS[other].el.classList.remove('on');
    document.documentElement.style.background = SKINS[name].bg;       // 背景色も合わせる（チラつき防止）
    if (tcolor) tcolor.setAttribute('content', SKINS[name].bg);       // 上部バーの色も合わせる
    cur = name;
  }

  function start() {
    show(cur);                                   // まず現在のスキンを表示
    setTimeout(function () {                      // もう片方を裏で先読み → 初回の切替も一瞬になる
      var other = (cur === 'paper') ? 'iron' : 'paper';
      if (!SKINS[other].el.src) SKINS[other].el.src = SKINS[other].src;
    }, 700);
  }

  /* 最新化：このセッションで初回だけ、GitHub Pages(CDN)の古いキャッシュを避けて
     土台が読み込む3点（紙・鉄・data.js）を取り直しておく。以降はブラウザキャッシュでOK。 */
  if (sessionStorage.getItem('ks_shell_v1')) {
    start();
  } else {
    Promise.all([
      fetch('skin-paper.html',        { cache: 'reload' }),
      fetch('next-session-iron.html', { cache: 'reload' }),
      fetch('src/data.js',            { cache: 'reload' })
    ]).then(function () {
      sessionStorage.setItem('ks_shell_v1', '1');
      start();
    }).catch(function () { start(); });          // 通信に失敗（オフライン等）でも普通に表示する
  }

  /* スキン内のトグルから届く合図を受けて、クロスフェードで切り替える（＝ページ遷移しない）。 */
  window.addEventListener('message', function (ev) {
    var d = ev.data;
    if (!d || d.t !== 'ks-skin') return;
    var to = (d.to === 'iron') ? 'iron' : 'paper';
    try { localStorage.setItem('ks_design', to); } catch (e) {}      // 次に開くときも同じスキンで
    show(to);
  });
})();
</script>
</body>
</html>
