<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="manifest" href="card.webmanifest">
<meta name="theme-color" content="#7C2A22">
<link rel="apple-touch-icon" href="icon-card-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="筋トレ">

<!-- 開くたびに1回だけ、CDN(Fastly)キャッシュを回避して本体と data.js の最新を取得する。
     本体と data.js の両方を cache:'reload' で先読みしてから location.replace で再表示する。 -->
<script>
  if (!sessionStorage.getItem('ks_v2')) {
    var base = location.pathname;
    Promise.all([
      fetch(base, { cache: 'reload' }),
      fetch('src/data.js', { cache: 'reload' })
    ]).then(function () {
      sessionStorage.setItem('ks_v2', '1');
      location.replace(base);
    }).catch(function () {});
  }
</script>
<title>筋トレ｜プログラム・次回・ログ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Serif+JP:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #F4EFE6; --ink: #211C17; --ink-soft: #6E655A; --ink-faint: #A89E90;
    --oxblood: #7C2A22; --oxblood-deep: #5E1F19; --rule: #DCD4C6; --rule-strong: #C3B9A8;
    --serif-latin: "Playfair Display", "Noto Serif JP", serif;
    --serif-jp: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --sans-jp: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper); color: var(--ink); font-family: var(--sans-jp);
    font-size: 15px; line-height: 1.7; font-feature-settings: "tnum" 1;
    -webkit-font-smoothing: antialiased;
    padding-bottom: calc(78px + env(safe-area-inset-bottom));
  }
  main { touch-action: pan-y; position: relative; overflow-x: hidden; }
  .panel { display: none; width: 100%; }
  .panel.show { display: block; }
  .panel.slide-layer { display: block; position: absolute; inset: 0 auto auto 0; width: 100%; will-change: transform, opacity; }
  .panel.slide-anim { transition: transform .28s cubic-bezier(.22,.61,.36,1), opacity .28s ease; }
  .sheet { max-width: 600px; margin: 0 auto; padding: 26px 22px 28px; }
  .kicker { font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--oxblood); }

  /* 題字 */
  .masthead { margin-bottom: 26px; }
  .masthead-top { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 9px; border-bottom: 2px solid var(--ink); }
  .masthead-top .date { font-family: var(--serif-latin); font-size: 13px; font-style: italic; color: var(--ink-soft); }
  .title { font-family: var(--serif-latin); font-weight: 700; font-size: 54px; line-height: 1.02; letter-spacing: -.01em; margin: 14px 0 2px; }
  .title.sm { font-size: 30px; line-height: 1.12; }
  .title-jp { font-family: var(--serif-jp); font-weight: 600; font-size: 19px; letter-spacing: .04em; color: var(--ink); }
  .lede { font-family: var(--serif-jp); font-size: 13.5px; color: var(--ink-soft); margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--rule); }
  .lede .min { color: var(--oxblood); font-weight: 600; }

  /* 仕上がり予告 */
  .payoff { margin: 22px 0 6px; }
  .payoff .k { display: block; margin-bottom: 10px; }
  .payoff-item { display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: baseline; padding: 9px 0; border-top: 1px solid var(--rule); }
  .po-target { font-family: var(--serif-jp); font-weight: 600; font-size: 17px; color: var(--oxblood); white-space: nowrap; }
  .po-text { font-size: 13.5px; line-height: 1.65; color: var(--ink); }

  /* 進行ルール */
  .rulenote { margin: 20px 0 6px; padding-left: 14px; border-left: 2px solid var(--oxblood); }
  .rulenote .k { display: block; margin-bottom: 2px; }
  .rulenote p { font-size: 13.5px; color: var(--ink); }
  .rulenote strong { font-weight: 700; }

  /* 種目 */
  .exercise { padding: 22px 0 18px; border-top: 1px solid var(--rule); }
  .exercise:first-of-type { border-top: 2px solid var(--ink); }
  .ex-head { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
  .ex-no { font-family: var(--serif-latin); font-weight: 700; font-size: 40px; line-height: .9; color: var(--oxblood); flex-shrink: 0; min-width: 52px; }
  .ex-titles { flex: 1; padding-top: 2px; }
  .ex-name { font-family: var(--serif-jp); font-weight: 600; font-size: 20px; line-height: 1.3; letter-spacing: .01em; }
  .ex-tag { display: inline-block; margin-top: 4px; font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); }
  .ex-tag::before { content: "— "; color: var(--rule-strong); }
  .sets { margin-left: 66px; }
  @media (max-width: 360px) { .sets { margin-left: 0; } }
  .set { display: grid; grid-template-columns: 56px 1fr auto; align-items: baseline; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--rule); }
  .set:last-child { border-bottom: none; }
  .set-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--ink-soft); }
  .set-label.warm { color: var(--ink-faint); }
  .set-detail { font-size: 16px; font-weight: 500; }
  .set-detail .x { color: var(--ink-faint); font-weight: 400; }
  .set-detail .reps { color: var(--ink-soft); font-weight: 400; }
  .accent { color: var(--oxblood); font-weight: 700; letter-spacing: .06em; }
  .set-rest { font-family: var(--serif-latin); font-style: italic; font-size: 12.5px; color: var(--ink-soft); white-space: nowrap; }
  .tip { margin: 12px 0 0 66px; padding-left: 13px; border-left: 1px solid var(--oxblood); font-family: var(--serif-jp); font-size: 13px; line-height: 1.75; color: var(--ink-soft); }
  @media (max-width: 360px) { .tip { margin-left: 0; } }
  .why { margin: 12px 0 0 66px; font-size: 12.5px; line-height: 1.75; color: var(--ink-soft); }
  @media (max-width: 360px) { .why { margin-left: 0; } }
  .why .lbl { font-size: 10px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--oxblood); margin-right: 8px; }
  .ss-flow { margin: 4px 0 14px 66px; padding: 13px 16px; border: 1px solid var(--rule-strong); }
  @media (max-width: 360px) { .ss-flow { margin-left: 0; } }
  .ss-flow .step { font-family: var(--serif-jp); font-weight: 600; font-size: 14.5px; }
  .ss-flow .arrow { display: block; font-size: 11px; letter-spacing: .1em; color: var(--oxblood); margin: 3px 0; }
  .subhead { margin: 14px 0 2px 66px; font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--oxblood); }
  @media (max-width: 360px) { .subhead { margin-left: 0; } }
  .subhead + .sets { margin-top: 4px; }

  /* 奥付 */
  .colophon { margin-top: 34px; padding-top: 16px; border-top: 2px solid var(--ink); }
  .colophon .k { display: block; margin-bottom: 10px; }
  .colo-hl { font-size: 14px; font-weight: 500; line-height: 1.7; }
  .colophon .next { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--rule); font-family: var(--serif-jp); font-size: 13px; color: var(--ink-soft); }
  .colophon .next b { color: var(--oxblood); font-weight: 700; }

  @media (prefers-reduced-motion: reduce) {
    .panel.slide-anim { transition: none; }
  }

  /* このプログラムについて */
  .about { margin: 8px 0 4px; }
  .about .k { display: block; margin-bottom: 8px; }
  .about-item { padding: 10px 0; border-top: 1px solid var(--rule); }
  .ai-h { font-family: var(--serif-jp); font-weight: 600; font-size: 14px; color: var(--oxblood); display: block; margin-bottom: 2px; }
  .ai-p { font-size: 13px; line-height: 1.7; color: var(--ink); }

  /* 今のプログラム進捗（3タブ共通） */
  .program-progress { margin: 20px 0 26px; }
  .pp-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px 14px; flex-wrap: wrap; }
  .pp-phase { font-size: 11px; font-weight: 700; letter-spacing: .12em; color: var(--oxblood); text-align: right; }
  .pp-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px 12px; margin-top: 10px; flex-wrap: wrap; }
  .pp-label { font-family: var(--serif-jp); font-size: 13.5px; color: var(--ink-soft); }
  .pp-count { font-family: var(--serif-latin); font-size: 15px; color: var(--ink-soft); white-space: nowrap; }
  .pp-count b { font-size: 27px; font-weight: 700; color: var(--oxblood); }
  .pp-dots { display: flex; flex-wrap: wrap; gap: 7px 8px; margin: 12px 0 10px; }
  .pp-week { display: inline-flex; gap: 3px; }
  .pp-dot { width: 7px; height: 15px; border-radius: 3px; border: 1.5px solid var(--rule-strong); background: transparent; box-sizing: border-box; }
  .pp-dot.done { border-color: var(--oxblood); background: var(--oxblood); }
  .pp-dot.next { border-color: var(--oxblood); background: var(--paper); box-shadow: 0 0 0 2px rgba(124, 42, 34, .14); }
  .pp-note { font-size: 12.5px; color: var(--ink-soft); line-height: 1.7; }
  @media (max-width: 360px) {
    .pp-row { align-items: flex-start; }
    .pp-dots { gap: 6px 7px; }
    .pp-dot { width: 6.5px; height: 14px; }
  }

  /* ローテーション＝アコーディオン */
  .rot-list { margin: 6px 0 26px; border-top: 2px solid var(--ink); }
  .rot-h { width: 100%; display: flex; align-items: center; gap: 8px; border: 0; border-bottom: 1px solid var(--rule); background: none; cursor: pointer; padding: 15px 2px; text-align: left; color: var(--ink); }
  .rot-h .rn { flex: 1; font-family: var(--serif-jp); font-weight: 600; font-size: 18px; }
  .rot-h .rj { font-family: var(--sans-jp); font-weight: 400; font-size: 12px; color: var(--ink-soft); margin-left: 8px; }
  .rot-h .rmark { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--paper); background: var(--oxblood); padding: 2px 8px; border-radius: 4px; }
  .rot-h .chev { color: var(--oxblood); font-size: 12px; transition: transform .3s; }
  .rot-h.open .chev { transform: rotate(180deg); }
  .rot-body { max-height: 0; overflow: hidden; transition: max-height .4s ease; border-bottom: 1px solid var(--rule); }
  .rot-body.open { max-height: 8000px; }
  .rot-body .inner { padding: 4px 2px 20px; }
  .acc-lede { font-family: var(--serif-jp); font-size: 13px; color: var(--ink-soft); margin: 8px 0 4px; }

  /* 主要種目の伸び */
  .growth { margin-top: 8px; }
  .growth .k { display: block; margin-bottom: 4px; }
  .grow-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 0; border-top: 1px solid var(--rule); }
  .gl { font-family: var(--serif-jp); font-size: 15px; }
  .gv { font-size: 15px; }
  .gv .from { color: var(--ink-faint); font-size: 13px; }
  .gv b { font-weight: 600; }
  .gv .up { color: var(--oxblood); font-weight: 700; font-size: 13px; margin-left: 5px; }

  /* ログ＝アコーディオン */
  .logs { border-top: 2px solid var(--ink); margin-top: 4px; }
  .log-item { border-bottom: 1px solid var(--rule); }
  .log-h { width: 100%; display: flex; justify-content: space-between; align-items: baseline; gap: 10px; border: 0; background: none; cursor: pointer; padding: 13px 2px 4px; text-align: left; color: var(--ink); }
  .log-h .ld { font-family: var(--serif-jp); font-weight: 600; font-size: 15px; }
  .log-h .lm { font-family: var(--serif-latin); font-style: italic; font-size: 12.5px; color: var(--ink-soft); white-space: nowrap; }
  .log-h .chev { color: var(--oxblood); font-size: 11px; transition: transform .3s; display: inline-block; margin-left: 6px; }
  .log-h.open .chev { transform: rotate(180deg); }
  .log-sum { font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; padding: 0 2px 12px; }
  .log-body { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
  .log-body.open { max-height: 1600px; }
  .log-body .inner { padding: 2px 2px 14px; }
  .log-detail { font-size: 13px; line-height: 1.85; color: var(--ink); }
  .log-assess { margin-top: 10px; padding-left: 12px; border-left: 2px solid var(--oxblood); font-family: var(--serif-jp); font-size: 12.5px; line-height: 1.8; color: var(--ink-soft); }
  .log-assess b { color: var(--oxblood); font-weight: 700; margin-right: 8px; font-family: var(--sans-jp); font-size: 10px; letter-spacing: .14em; }

  /* トレーナーのコメント（アバター付き吹き出し） */
  .coach { display: flex; gap: 12px; align-items: flex-start; margin: 18px 0 8px; padding: 14px 15px; background: #EFE9DD; border-radius: 12px; }
  .coach-av { flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%; overflow: hidden; background: var(--oxblood); }
  .coach-av img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .coach-bubble { flex: 1; }
  .coach-name { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--oxblood); margin-bottom: 4px; }
  .coach-bubble p { font-size: 13px; line-height: 1.8; color: var(--ink); }
  .coach-bubble p b { color: var(--oxblood); font-weight: 700; }
  .coach-bubble p + p { margin-top: 9px; }
  .coach-bubble .coach-h { color: var(--oxblood); font-weight: 700; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; margin-top: 12px; }
  .coach-bubble .coach-h::before { content: "— "; }
  .coach-bubble .coach-h + p { margin-top: 2px; }

  /* 継続カレンダー（ログタブ上部） */
  .cal { margin: 4px 0 30px; }
  .cal .program-progress { margin-top: 10px; }
  .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; border-bottom: 2px solid var(--ink); padding-bottom: 8px; }
  .cal-nav button { border: 0; background: none; cursor: pointer; color: var(--oxblood); font-size: 22px; line-height: 1; padding: 2px 12px; }
  .cal-nav .mlabel { font-family: var(--serif-jp); font-weight: 600; font-size: 19px; }
  .cal-nav .mlatin { font-family: var(--serif-latin); font-style: italic; font-size: 12px; color: var(--ink-soft); margin-left: 6px; }
  .cal-week { align-items: center; gap: 8px; margin-top: 12px; font-family: var(--sans-jp); font-size: 11px; color: var(--ink-soft); }
  .cal-week .dots { display: inline-flex; gap: 4px; }
  .cal-week .dot { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid var(--oxblood); box-sizing: border-box; }
  .cal-week .dot.on { background: var(--oxblood); }
  .cal-week .left { color: var(--oxblood); font-weight: 700; }
  .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 12px; font-family: var(--sans-jp); font-size: 10px; text-align: center; color: var(--ink-faint); }
  .cal-dow .sun { color: #B98A82; }
  .cal-dow .sat { color: #8AA0A6; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 5px; }
  .cal-cell { position: relative; aspect-ratio: 1; min-height: 42px; display: flex; align-items: center; justify-content: center; font-family: var(--serif-latin); font-size: 14px; border-radius: 7px; color: var(--ink-faint); }
  .cal-cell.went { background: #EAD7CF; color: var(--oxblood-deep); }
  .cal-cell.today { border: 2px solid var(--oxblood); }
  .cal-cell .part { position: absolute; top: 3px; right: 5px; font-family: var(--serif-jp); font-size: 9px; color: #9C5A50; }
  .cal-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 14px; font-family: var(--sans-jp); font-size: 10.5px; color: var(--ink-soft); }
  .cal-legend .sw { width: 13px; height: 13px; border-radius: 4px; display: inline-block; vertical-align: -2px; margin-right: 5px; box-sizing: border-box; }
  .cal-stats { display: flex; gap: 22px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--rule); font-family: var(--sans-jp); }
  .cal-stats .num { font-size: 22px; font-weight: 700; color: var(--oxblood); line-height: 1.1; }
  .cal-stats .lbl2 { font-size: 10px; color: var(--ink-soft); }
  .cal-cell.went { cursor: pointer; }
  .cal-cell.sel { box-shadow: inset 0 0 0 2px var(--oxblood); }
  .cal-cell.today.sel { box-shadow: inset 0 0 0 2px var(--oxblood); }

  /* その日の記録（カレンダー下の詳細） */
  .cal-detail { margin-top: 6px; }
  .cal-det-head { display: flex; align-items: baseline; gap: 12px; border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 12px; }
  .cal-det-date { font-family: var(--serif-latin); font-weight: 700; font-size: 26px; color: var(--oxblood); line-height: 1; }
  .cal-det-name { font-family: var(--serif-jp); font-weight: 600; font-size: 16px; }
  .cal-det-hl { font-size: 13px; line-height: 1.7; color: var(--ink); margin-bottom: 4px; }
  .cal-det-none { font-family: var(--serif-jp); font-size: 13px; color: var(--ink-soft); padding: 2px 0; }

  /* ② 前回実績（種目の下に表示） */
  .ex-last { margin: 2px 0 4px 66px; font-family: var(--sans-jp); font-size: 11.5px; color: var(--ink-soft); }
  @media (max-width: 360px) { .ex-last { margin-left: 0; } }
  .ex-last .lbl { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--oxblood); margin-right: 7px; }
  .ex-last b { font-family: var(--serif-jp); font-weight: 600; color: var(--ink); }

  /* ① 自己ベスト（PRボード） */
  .records { margin: 8px 0 26px; }
  .records .k { display: block; margin-bottom: 4px; }
  .rec-row { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 2px; border-top: 1px solid var(--rule); }
  .rec-row:first-of-type { border-top: 2px solid var(--ink); }
  .rec-l .rl-name { font-family: var(--serif-jp); font-weight: 600; font-size: 16px; }
  .rec-l .rl-new { font-size: 9px; font-weight: 700; letter-spacing: .12em; color: var(--paper); background: var(--oxblood); padding: 2px 7px; border-radius: 4px; margin-left: 6px; vertical-align: 2px; }
  .rec-l .rl-date { font-family: var(--serif-latin); font-style: italic; font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
  .rec-v { text-align: right; white-space: nowrap; }
  .rec-v .rv-num { font-family: var(--serif-latin); font-weight: 700; font-size: 23px; color: var(--oxblood); }
  .rec-v .rv-num small { font-size: 12px; }
  .rec-v .rv-reps { font-size: 12px; color: var(--ink-soft); }

  /* ④ InBody 推移 */
  .inbody { margin: 8px 0 26px; }
  .inbody .k { display: block; margin-bottom: 6px; }
  .ib-legend { display: flex; gap: 16px; margin-top: 6px; font-family: var(--sans-jp); font-size: 11px; color: var(--ink-soft); }
  .ib-sw { display: inline-block; width: 14px; height: 3px; vertical-align: 3px; margin-right: 5px; }

  /* 下タブバー（固定） */
  .tabbar { position: fixed; left: 0; right: 0; bottom: 0; display: flex; background: var(--paper); border-top: 1px solid var(--rule-strong); padding-bottom: env(safe-area-inset-bottom); z-index: 50; }
  .tabbar button { flex: 1; border: 0; background: none; color: var(--ink-faint); cursor: pointer; padding: 9px 0 7px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: var(--sans-jp); }
  .tabbar button .lbl { font-size: 11px; letter-spacing: .06em; }
  .tabbar button.active { color: var(--oxblood); box-shadow: inset 0 2px 0 var(--oxblood); }
  .tabbar svg { display: block; }

  /* 折りたたみ：開いた大画面 */
  @media (min-width: 760px) {
    .sheet { max-width: 720px; }
    .payoff { display: grid; grid-template-columns: 1fr 1fr; column-gap: 30px; }
    .payoff .k { grid-column: 1 / -1; }
    .about { display: grid; grid-template-columns: 1fr 1fr; column-gap: 30px; }
    .about .k { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<main>
  <section id="tab-program" class="panel"><div class="sheet" id="prog-sheet"></div></section>
  <section id="tab-next" class="panel"><div class="sheet" id="next-sheet"></div></section>
  <section id="tab-log" class="panel"><div class="sheet" id="log-sheet"></div></section>
</main>

<nav class="tabbar">
  <button data-tab="program" onclick="showTab('program')" aria-label="プログラム">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="7" x2="18" y2="7"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="6" y1="17" x2="13" y2="17"/></svg>
    <span class="lbl">プログラム</span>
  </button>
  <button data-tab="next" onclick="showTab('next')" aria-label="メニュー">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><circle cx="12" cy="6" r="2.4"/><path d="M6 10 Q12 8.4 18 10 L15.5 19 Q12 19.8 8.5 19 Z"/></svg>
    <span class="lbl">メニュー</span>
  </button>
  <button data-tab="log" onclick="showTab('log')" aria-label="ログ">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5 V12 l3 2"/></svg>
    <span class="lbl">ログ</span>
  </button>
</nav>

<script src="src/data.js"></script>
<script>
  var D = window.KINTORE_DATA;

  /* 専属トレーナー感が出るように、kaikaiくんの顔だけを丸く表示する。 */
  var COACH_AVATAR = '<img src="coach-kaikai.png" width="42" height="42" alt="" aria-hidden="true">';
  /* トレーナーのコメントは3つの書き方を許す（後方互換）：
       ① 文字列            … 従来どおり1段落
       ② 配列              … 各要素が1段落（やる意味を分けて読みやすく）
       ③ 配列の中の {h,p}  … h＝小見出し（「なぜ」等）、p＝本文 */
  function coachBlock(text) {
    var items = Array.isArray(text) ? text : [text];
    var body = items.map(function (it) {
      if (it && typeof it === 'object') return '<p class="coach-h">' + it.h + '</p><p>' + it.p + '</p>';
      return '<p>' + it + '</p>';
    }).join('');
    return '<div class="coach"><div class="coach-av">' + COACH_AVATAR + '</div>'
      + '<div class="coach-bubble"><div class="coach-name">kaikaiくん</div>' + body + '</div></div>';
  }

  function setRow(s) {
    return '<div class="set">'
      + '<span class="set-label' + (s.warm ? ' warm' : '') + '">' + s.label + '</span>'
      + '<span class="set-detail">' + (s.weight ? s.weight + ' <span class="x">×</span> ' : '')
      + '<span class="' + (s.accent ? 'accent' : 'reps') + '">' + s.reps + '</span></span>'
      + '<span class="set-rest">' + (s.rest || '') + '</span></div>';
  }
  function setsBlock(sets) { return '<div class="sets">' + sets.map(setRow).join('') + '</div>'; }

  function renderExercise(ex) {
    var h = '<article class="exercise"><div class="ex-head"><div class="ex-no">' + ex.no + '</div>'
      + '<div class="ex-titles"><div class="ex-name">' + ex.name + '</div>'
      + (ex.tag ? '<span class="ex-tag">' + ex.tag + '</span>' : '') + '</div></div>';
    if (ex.last) h += '<div class="ex-last"><span class="lbl">前回</span><b>' + ex.last + '</b>　← 今日はこれを超える</div>';
    if (ex.superset) {
      h += '<div class="ss-flow"><span class="step">' + ex.superset.steps[0] + '</span>'
        + '<span class="arrow">↓　休まずそのまま</span>'
        + '<span class="step">' + ex.superset.steps[1] + '</span>'
        + '<span class="arrow">↓　' + ex.superset.note + '</span></div>';
    }
    if (ex.subgroups) {
      ex.subgroups.forEach(function (sg) {
        h += '<div class="subhead">' + sg.subhead + '</div>' + setsBlock(sg.sets);
        if (sg.tip) h += '<p class="tip">' + sg.tip + '</p>';
      });
    } else if (ex.sets) { h += setsBlock(ex.sets); }
    if (ex.why) h += '<p class="why"><span class="lbl">なぜ</span>' + ex.why + '</p>';
    if (ex.tip) h += '<p class="tip">' + ex.tip + '</p>';
    return h + '</article>';
  }

  function masthead(s) {
    return '<header class="masthead"><div class="masthead-top">'
      + '<span class="kicker">Menu</span><span class="date">' + s.name.replace('-', ' / ') + '</span></div>'
      + '<h1 class="title">' + s.name + '</h1><div class="title-jp">' + s.titleJp + '</div>'
      + '<p class="lede">' + s.lede + '　／　目安 <span class="min">' + s.minutes + '分</span></p></header>';
  }
  function sessionInner(s) {
    var h = '';
    if (s.rule) h += '<div class="rulenote"><span class="kicker k">2-up rule</span><p>' + s.rule + '</p></div>';
    s.exercises.forEach(function (ex) { h += renderExercise(ex); });
    return h;
  }
  function renderSession(s) { return masthead(s) + sessionInner(s); }

  function fmtDate(d) { var p = d.split('-'); return (+p[1]) + '/' + (+p[2]); }

  /* 36回分の進捗を3タブで同じ見た目にする。数字の真実源は src/data.js の meta。 */
  function programProgress() {
    var m = D.meta, done = m.sessionsDone || 0, total = m.sessionsTotal || 0, next = done + 1;
    var status = done >= total ? '全' + total + '回完了です。' : '全' + total + '回中' + done + '回完了。次は' + next + '回目です。';
    var dots = '';
    for (var i = 1; i <= total; i++) {
      if ((i - 1) % 3 === 0) dots += '<span class="pp-week" aria-hidden="true">';
      dots += '<span class="pp-dot' + (i <= done ? ' done' : (i === next ? ' next' : '')) + '"></span>';
      if (i % 3 === 0 || i === total) dots += '</span>';
    }
    return '<section class="program-progress" aria-label="今のプログラム進捗">'
      + '<div class="pp-head"><span class="kicker">Current Program</span><span class="pp-phase">' + m.phaseLabel + '</span></div>'
      + '<div class="pp-row"><span class="pp-label">今のプログラム（週3 × 12週）</span>'
      + '<span class="pp-count"><b>' + done + '</b> / ' + total + ' 回</span></div>'
      + '<div class="pp-dots" aria-label="' + status + '">' + dots + '</div>'
      + '<p class="pp-note">' + m.phaseNote + '</p></section>';
  }

  /* 次回タブ */
  function buildNext() {
    var cur = D.sessions[D.currentKey];
    var h = masthead(cur) + programProgress() + (cur.coachIntro ? coachBlock(cur.coachIntro) : '')
      + sessionInner(cur);
    var last = D.log && D.log[0];
    if (last) {
      var i = D.rotation.indexOf(D.currentKey);
      var nn = D.sessions[D.rotation[(i + 1) % D.rotation.length]];
      var lastName = D.sessions[last.sessionKey] ? D.sessions[last.sessionKey].name : last.sessionKey;
      h += '<footer class="colophon">'
        + '<span class="kicker k">前号の記録 ・ Last Session — ' + lastName + '（' + last.date + '）</span>'
        + '<p class="colo-hl">' + last.highlights + '</p>'
        + '<p class="next">次の次は <b>' + nn.name + '</b>（' + nn.titleJp + '）</p></footer>';
    }
    document.getElementById('next-sheet').innerHTML = h;
  }

  /* プログラムタブ */
  function buildProgram() {
    var m = D.meta;
    var h = '<header class="masthead"><div class="masthead-top">'
      + '<span class="kicker">Program</span><span class="date">' + m.phaseLabel + '</span></div>'
      + '<h1 class="title sm">プログラム</h1><div class="title-jp">' + m.splitName + '</div>'
      + '<p class="lede">' + m.overview + '</p></header>';

    h += programProgress();

    if (m.about && m.about.length) {
      h += '<section class="about"><span class="kicker k">このプログラムについて</span>';
      m.about.forEach(function (a) { h += '<div class="about-item"><span class="ai-h">' + a.h + '</span><p class="ai-p">' + a.p + '</p></div>'; });
      h += '</section>';
    }

    h += '<span class="kicker">ローテーション（タップで開く）</span><div class="rot-list">';
    D.rotation.forEach(function (k) {
      var s = D.sessions[k], now = (k === D.currentKey);
      h += '<button class="rot-h" id="rh-' + k + '" onclick="toggleSession(\'' + k + '\')">'
        + '<span class="rn">' + s.name + '<span class="rj">' + s.titleJp + '</span></span>'
        + (now ? '<span class="rmark">次</span>' : '')
        + '<span class="chev">▾</span></button>'
        + '<div class="rot-body" id="rb-' + k + '"><div class="inner">'
        + '<p class="acc-lede">' + s.lede + '　／　目安 ' + s.minutes + '分</p>'
        + sessionInner(s) + '</div></div>';
    });
    h += '</div>';

    h += '<div class="growth"><span class="kicker k">主要種目の伸び（開始 → 現在）</span>';
    D.progress.forEach(function (p) {
      var up = (p.current > p.start) ? ' <span class="up">+' + (p.current - p.start) + '</span>' : '';
      h += '<div class="grow-row"><span class="gl">' + p.lift + '</span>'
        + '<span class="gv"><span class="from">' + p.start + ' →</span> <b>' + p.current + p.unit + '</b>' + up + '</span></div>';
    });
    h += '</div>';

    if (D.records && D.records.length) {
      h += '<div class="records"><span class="kicker k">自己ベスト ・ Personal Records</span>';
      D.records.forEach(function (r) {
        h += '<div class="rec-row"><div class="rec-l"><div class="rl-name">' + r.lift
          + (r.isNew ? '<span class="rl-new">NEW</span>' : '') + '</div>'
          + '<div class="rl-date">' + r.date.replace(/-/g, ' / ') + '</div></div>'
          + '<div class="rec-v"><span class="rv-num">' + r.weight + '<small>' + r.unit + '</small></span>'
          + ' <span class="rv-reps">' + r.reps + '</span></div></div>';
      });
      h += '</div>';
    }

    if (D.inbody && D.inbody.length > 1) {
      h += '<div class="inbody"><span class="kicker k">体組成の推移 ・ InBody</span>' + inbodySVG(D.inbody)
        + '<div class="ib-legend"><span><span class="ib-sw" style="background:var(--oxblood)"></span>骨格筋量 (kg)</span>'
        + '<span><span class="ib-sw" style="border-top:2px dashed var(--ink-faint)"></span>体脂肪率 (%)</span></div></div>';
    }

    document.getElementById('prog-sheet').innerHTML = h;
  }

  /* InBody 推移の折れ線（骨格筋量↑＝オックスブラッド実線／体脂肪率↓＝淡い破線）。
     2指標は別スケールで、それぞれ最小〜最大をプロット帯いっぱいに伸ばして見せる。 */
  function inbodySVG(arr) {
    var W = 340, H = 188, padL = 16, padR = 16, padT = 30, padB = 32, plotH = H - padT - padB;
    var n = arr.length;
    var mus = arr.map(function (d) { return d.muscle; }), fat = arr.map(function (d) { return d.fat; });
    var muMin = Math.min.apply(null, mus), muMax = Math.max.apply(null, mus);
    var faMin = Math.min.apply(null, fat), faMax = Math.max.apply(null, fat);
    var ts = arr.map(function (d) { return new Date(d.date).getTime(); });
    var t0 = ts[0], t1 = ts[n - 1];
    function x(i) { return padL + (W - padL - padR) * (n === 1 || t1 === t0 ? 0.5 : (ts[i] - t0) / (t1 - t0)); }
    function ym(v) { return (H - padB) - ((v - muMin) / ((muMax - muMin) || 1)) * plotH; }
    function yf(v) { return padT + ((faMax - v) / ((faMax - faMin) || 1)) * plotH; }
    var mp = arr.map(function (d, i) { return x(i).toFixed(1) + ',' + ym(d.muscle).toFixed(1); }).join(' ');
    var fp = arr.map(function (d, i) { return x(i).toFixed(1) + ',' + yf(d.fat).toFixed(1); }).join(' ');
    var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;margin-top:4px" xmlns="http://www.w3.org/2000/svg">';
    s += '<polyline fill="none" stroke="#A89E90" stroke-width="2" stroke-dasharray="4 3" points="' + fp + '"/>';
    s += '<polyline fill="none" stroke="#7C2A22" stroke-width="2.6" points="' + mp + '"/>';
    arr.forEach(function (d, i) {
      s += '<circle cx="' + x(i).toFixed(1) + '" cy="' + ym(d.muscle).toFixed(1) + '" r="' + (i === n - 1 ? 3.4 : 3) + '" fill="#7C2A22"/>';
      s += '<circle cx="' + x(i).toFixed(1) + '" cy="' + yf(d.fat).toFixed(1) + '" r="' + (i === n - 1 ? 3.4 : 3) + '" fill="#A89E90"/>';
    });
    s += '<text x="' + x(n - 1).toFixed(1) + '" y="' + (ym(mus[n - 1]) - 9).toFixed(1) + '" text-anchor="end" font-family="Playfair Display,Georgia,serif" font-size="13" font-weight="700" fill="#7C2A22">' + mus[n - 1].toFixed(1) + 'kg ↑</text>';
    s += '<text x="' + x(n - 1).toFixed(1) + '" y="' + (yf(fat[n - 1]) + 16).toFixed(1) + '" text-anchor="end" font-family="Playfair Display,Georgia,serif" font-size="13" font-weight="700" fill="#6E655A">' + fat[n - 1].toFixed(1) + '% ↓</text>';
    s += '<text x="' + x(0).toFixed(1) + '" y="' + (ym(mus[0]) + 16).toFixed(1) + '" text-anchor="start" font-family="Playfair Display,Georgia,serif" font-size="11" fill="#9C5A50">' + mus[0].toFixed(1) + '</text>';
    s += '<text x="' + x(0).toFixed(1) + '" y="' + (yf(fat[0]) - 8).toFixed(1) + '" text-anchor="start" font-family="Playfair Display,Georgia,serif" font-size="11" fill="#A89E90">' + fat[0].toFixed(1) + '</text>';
    s += '<g font-family="Noto Sans JP,sans-serif" font-size="10" fill="#A89E90" text-anchor="middle">';
    arr.forEach(function (d, i) { s += '<text x="' + x(i).toFixed(1) + '" y="' + (H - 10) + '">' + d.date.slice(2, 7).replace('-', '.') + '</text>'; });
    s += '</g></svg>';
    return s;
  }

  /* 継続カレンダー（ログタブ上部） */
  var CAL = { idx: 0, months: [] };
  var MON_LATIN = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

  function calBuildMonths() {
    var map = {};
    (D.attendance || []).forEach(function (a) {
      var p = a.date.split('-'), key = p[0] + '-' + p[1];
      (map[key] = map[key] || {})[parseInt(p[2], 10)] = a.part;
    });
    var keys = Object.keys(map).sort(), now = new Date();
    var sy, sm, ey = now.getFullYear(), em = now.getMonth() + 1;
    if (keys.length) { var f = keys[0].split('-'); sy = +f[0]; sm = +f[1]; } else { sy = ey; sm = em; }
    if (keys.length) { var l = keys[keys.length - 1].split('-'); if (+l[0] > ey || (+l[0] === ey && +l[1] > em)) { ey = +l[0]; em = +l[1]; } }
    var list = [], y = sy, m = sm;
    while (y < ey || (y === ey && m <= em)) {
      list.push({ y: y, m: m, t: map[y + '-' + (m < 10 ? '0' + m : m)] || {} });
      m++; if (m > 12) { m = 1; y++; }
    }
    return list;
  }

  function calShell() {
    return '<section class="cal">'
      + '<span class="kicker">Continuity ・ つづけた記録</span>'
      + programProgress()
      + '<div class="cal-nav"><button onclick="calStep(-1)" aria-label="前の月" id="cal-prev">‹</button>'
      + '<div><span class="mlabel" id="cal-mlabel"></span><span class="mlatin" id="cal-mlatin"></span></div>'
      + '<button onclick="calStep(1)" aria-label="次の月" id="cal-next">›</button></div>'
      + '<div class="cal-week" id="cal-week" style="display:none"></div>'
      + '<div class="cal-dow"><span class="sun">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="sat">土</span></div>'
      + '<div class="cal-grid" id="cal-grid"></div>'
      + '<div class="cal-legend">'
      + '<span><span class="sw" style="background:#EAD7CF"></span>行った日</span>'
      + '<span><span class="sw" style="border:2px solid var(--oxblood)"></span>今日</span>'
      + '<span style="color:var(--ink-faint)">上＝上半身 / 下＝下半身</span></div>'
      + '<div class="cal-stats" id="cal-stats"></div></section>';
  }

  function calRender() {
    var o = CAL.months[CAL.idx], now = new Date();
    var isCur = (o.y === now.getFullYear() && o.m === now.getMonth() + 1), todayD = now.getDate();
    var lead = new Date(o.y, o.m - 1, 1).getDay(), days = new Date(o.y, o.m, 0).getDate();

    document.getElementById('cal-mlabel').textContent = o.y + '年 ' + o.m + '月';
    document.getElementById('cal-mlatin').textContent = MON_LATIN[o.m - 1];
    document.getElementById('cal-prev').style.visibility = CAL.idx > 0 ? 'visible' : 'hidden';
    document.getElementById('cal-next').style.visibility = CAL.idx < CAL.months.length - 1 ? 'visible' : 'hidden';

    var g = '', pad = function (x) { return x < 10 ? '0' + x : '' + x; };
    for (var i = 0; i < lead; i++) g += '<div></div>';
    for (var d = 1; d <= days; d++) {
      var part = o.t[d], isToday = isCur && d === todayD, ds = o.y + '-' + pad(o.m) + '-' + pad(d);
      var cls = 'cal-cell' + (part ? ' went' : '') + (isToday ? ' today' : '') + (part && CAL.sel === ds ? ' sel' : '');
      var mk = part ? '<span class="part">' + (part === 'U' ? '上' : '下') + '</span>' : '';
      g += '<div class="' + cls + '"' + (part ? ' onclick="calPick(\'' + ds + '\')"' : '') + '>' + mk + d + '</div>';
    }
    document.getElementById('cal-grid').innerHTML = g;

    var cnt = 0; for (var key in o.t) if (o.t.hasOwnProperty(key)) cnt++;
    var weeks = (isCur ? todayD : days) / 7, avg = (cnt / weeks).toFixed(1);
    document.getElementById('cal-stats').innerHTML =
      '<div><div class="num">' + cnt + '</div><div class="lbl2">通った 回</div></div>'
      + '<div><div class="num">' + avg + '</div><div class="lbl2">週平均 回</div></div>';

    var wk = document.getElementById('cal-week');
    if (isCur) {
      var ws = todayD - now.getDay(), wc = 0;
      for (var kk in o.t) { var dd = +kk; if (dd >= ws && dd <= ws + 6) wc++; }
      var dots = ''; for (var j = 0; j < 3; j++) dots += '<span class="dot' + (j < wc ? ' on' : '') + '"></span>';
      var left = Math.max(0, 3 - wc);
      wk.innerHTML = '<span>今週</span><span class="dots">' + dots + '</span><span class="left">' + (left > 0 ? 'あと' + left + '回' : '週3達成！') + '</span>';
      wk.style.display = 'flex';
    } else { wk.style.display = 'none'; }
  }

  function calStep(dir) {
    var n = CAL.idx + dir;
    if (n < 0 || n >= CAL.months.length) return;
    CAL.idx = n; calRender();
  }

  /* 日付 → ログ／出席のひき当て表 */
  var LOGMAP = {}, ATTMAP = {};
  function calBuildMaps() {
    LOGMAP = {}; ATTMAP = {};
    (D.log || []).forEach(function (l) { LOGMAP[l.date] = l; });
    (D.attendance || []).forEach(function (a) { ATTMAP[a.date] = a.part; });
  }

  /* カレンダーで選んだ日の詳細をカレンダー下に表示する */
  function calDetail(date) {
    var l = LOGMAP[date], part = ATTMAP[date];
    var name = (l && D.sessions[l.sessionKey]) ? D.sessions[l.sessionKey].name
      : (part === 'U' ? '上半身' : part === 'L' ? '下半身' : '—');
    var h = '<div class="cal-det-head"><span class="cal-det-date">' + fmtDate(date) + '</span>'
      + '<span class="cal-det-name">' + name + '</span></div>';
    if (l) {
      if (l.highlights) h += '<p class="cal-det-hl">' + l.highlights + '</p>';
      if (l.detail) h += '<div class="log-detail">' + l.detail + '</div>';
      if (l.coach) h += coachBlock(l.coach);
    } else {
      h += '<p class="cal-det-none">この日はジムに通った記録のみ（詳細メモはありません）。</p>';
    }
    document.getElementById('cal-detail').innerHTML = h;
  }

  /* カレンダーの日付タップ：選択を移して詳細を出す */
  function calPick(date) {
    CAL.sel = date;
    calRender();
    calDetail(date);
  }

  /* ログタブ＝カレンダー＋（タップで）その日の記録 */
  function buildLog() {
    var h = calShell()
      + '<span class="kicker" style="display:block;margin-top:26px">Session detail ・ その日の記録</span>'
      + '<div class="cal-detail" id="cal-detail"></div>';
    document.getElementById('log-sheet').innerHTML = h;
    calBuildMaps();
    CAL.months = calBuildMonths();
    CAL.idx = CAL.months.length - 1;
    var dates = Object.keys(ATTMAP).sort();
    CAL.sel = dates.length ? dates[dates.length - 1] : null;
    calRender();
    if (CAL.sel) calDetail(CAL.sel);
  }

  var TAB_ORDER = ['program', 'next', 'log'];
  var currentTab = 'next';
  var isTabAnimating = false;

  function tabIndex(name) { return TAB_ORDER.indexOf(name); }

  function setTabButton(name) {
    var btns = document.querySelectorAll('.tabbar button');
    for (var j = 0; j < btns.length; j++) btns[j].classList.toggle('active', btns[j].getAttribute('data-tab') === name);
  }

  function resetPanel(p) {
    p.classList.remove('show', 'slide-layer', 'slide-anim');
    p.style.transform = '';
    p.style.opacity = '';
  }

  function settleTab(panel, name) {
    var panels = document.querySelectorAll('.panel');
    for (var i = 0; i < panels.length; i++) resetPanel(panels[i]);
    panel.classList.add('show');
    document.querySelector('main').style.minHeight = '';
    currentTab = name;
    setTabButton(name);
    try { sessionStorage.setItem('ks_tab', name); } catch (e) {}
    window.scrollTo(0, 0);
    isTabAnimating = false;
  }

  /* タブ切替 */
  function showTab(name) {
    if (TAB_ORDER.indexOf(name) === -1) name = 'next';
    if (name === currentTab && document.getElementById('tab-' + name).classList.contains('show')) return;
    if (isTabAnimating) return;
    var oldName = currentTab;
    var oldPanel = document.getElementById('tab-' + oldName);
    var newPanel = document.getElementById('tab-' + name);
    var oldIndex = tabIndex(oldName), newIndex = tabIndex(name);
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var canAnimate = oldPanel && oldPanel.classList.contains('show') && oldIndex !== -1 && newIndex !== -1 && !reduceMotion;
    currentTab = name;
    setTabButton(name);
    try { sessionStorage.setItem('ks_tab', name); } catch (e) {}
    if (canAnimate) {
      isTabAnimating = true;
      var dir = newIndex > oldIndex ? 1 : -1;
      var main = document.querySelector('main');
      newPanel.classList.add('show', 'slide-layer');
      oldPanel.classList.add('show', 'slide-layer');
      main.style.minHeight = Math.max(oldPanel.scrollHeight, newPanel.scrollHeight) + 'px';
      oldPanel.style.transform = 'translateX(0)';
      oldPanel.style.opacity = '1';
      newPanel.style.transform = 'translateX(' + (dir * 100) + '%)';
      newPanel.style.opacity = '.98';
      requestAnimationFrame(function () {
        oldPanel.classList.add('slide-anim');
        newPanel.classList.add('slide-anim');
        oldPanel.style.transform = 'translateX(' + (-dir * 42) + '%)';
        oldPanel.style.opacity = '.25';
        newPanel.style.transform = 'translateX(0)';
        newPanel.style.opacity = '1';
      });
      window.setTimeout(function () { settleTab(newPanel, name); }, 310);
      return;
    }
    var panels = document.querySelectorAll('.panel');
    for (var i = 0; i < panels.length; i++) resetPanel(panels[i]);
    document.getElementById('tab-' + name).classList.add('show');
    window.scrollTo(0, 0);
  }

  function stepTab(dir) {
    var i = TAB_ORDER.indexOf(currentTab);
    if (i === -1) i = 1;
    var next = Math.max(0, Math.min(TAB_ORDER.length - 1, i + dir));
    if (next !== i) showTab(TAB_ORDER[next]);
  }

  function isSwipeBlockedTarget(el) {
    return !!(el && el.closest && el.closest('.tabbar, button, a, input, textarea, select, [onclick], [role="button"]'));
  }

  /* 横スワイプでタブを移動。縦スクロールと誤爆しないよう、横移動が明確な時だけ反応する。 */
  function setupSwipeTabs() {
    var main = document.querySelector('main'), swipe = null;
    if (!main) return;
    var useTouchEvents = ('ontouchstart' in window) || (window.navigator && window.navigator.maxTouchPoints > 0);
    function startSwipe(x, y, target, id) {
      swipe = { x: x, y: y, id: id, blocked: isSwipeBlockedTarget(target) };
    }
    function finishSwipe(x, y) {
      if (!swipe || swipe.blocked) return;
      var dx = x - swipe.x, dy = y - swipe.y;
      var ax = Math.abs(dx), ay = Math.abs(dy);
      swipe = null;
      if (ax < 60 || ax < ay * 1.5 || ay > 90) return;
      stepTab(dx < 0 ? 1 : -1);
    }

    if (window.PointerEvent && !useTouchEvents) {
      main.addEventListener('pointerdown', function (e) {
        if (swipe && e.pointerId !== swipe.id) { swipe = null; return; }
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        startSwipe(e.clientX, e.clientY, e.target, e.pointerId);
      }, { passive: true });
      main.addEventListener('pointerup', function (e) {
        if (!swipe || e.pointerId !== swipe.id) return;
        finishSwipe(e.clientX, e.clientY);
      }, { passive: true });
      main.addEventListener('pointercancel', function (e) {
        if (!swipe || e.pointerId === swipe.id) swipe = null;
      }, { passive: true });
      return;
    }

    main.addEventListener('touchstart', function (e) {
      if (!e.touches || e.touches.length !== 1) { swipe = null; return; }
      var t = e.touches[0];
      startSwipe(t.clientX, t.clientY, e.target, 'touch');
    }, { passive: true });
    main.addEventListener('touchmove', function (e) {
      if (swipe && e.touches && e.touches.length !== 1) swipe = null;
    }, { passive: true });
    main.addEventListener('touchend', function (e) {
      if (!swipe || !e.changedTouches || e.changedTouches.length !== 1) return;
      var t = e.changedTouches[0];
      finishSwipe(t.clientX, t.clientY);
    }, { passive: true });
    main.addEventListener('touchcancel', function () { swipe = null; }, { passive: true });
  }

  /* ローテーション：その場で開閉（同時に開くのは1つ） */
  function toggleSession(k) {
    var b = document.getElementById('rb-' + k), open = b.classList.contains('open');
    document.querySelectorAll('.rot-body.open').forEach(function (x) { x.classList.remove('open'); });
    document.querySelectorAll('.rot-h.open').forEach(function (x) { x.classList.remove('open'); });
    if (!open) { b.classList.add('open'); document.getElementById('rh-' + k).classList.add('open'); }
  }

  /* 起動 */
  buildNext();
  buildProgram();
  buildLog();
  setupSwipeTabs();
  var start = 'next';
  try { start = sessionStorage.getItem('ks_tab') || D.meta.defaultTab || 'next'; } catch (e) { start = D.meta.defaultTab || 'next'; }
  showTab(start);
</script>
</body>
</html>
